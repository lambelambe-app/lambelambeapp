<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo de Lula · Conexões via EBC e Wikipédia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f7e8 0%, #e0ecd6 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            color: #1a3a1a;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #1a5a1a, #3a8a3a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero h1 span {
            background: #ffdd77;
            color: #1a5a1a;
            border-radius: 60px;
            padding: 0 12px;
            font-size: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }
        .search-area {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .search-input {
            flex: 3;
            padding: 0.9rem 1.2rem;
            border: 2px solid #cfdec7;
            border-radius: 60px;
            font-size: 1rem;
        }
        .search-input:focus {
            border-color: #2b7a2b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(43,122,43,0.2);
        }
        .search-btn {
            background: #1a5a1a;
            color: white;
            border: none;
            padding: 0 2rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-btn:hover { background: #0e3a0e; transform: scale(0.97); }
        .result-card {
            background: white;
            border-radius: 1.2rem;
            padding: 1.5rem;
            border-left: 5px solid #2b7a2b;
        }
        .degrees {
            font-size: 2rem;
            font-weight: 800;
            color: #1a5a1a;
        }
        .path {
            background: #f4f9ef;
            padding: 1rem;
            border-radius: 1rem;
            font-family: monospace;
            margin: 1rem 0;
            word-break: break-word;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ccc;
            border-top-color: #2b7a2b;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .badge {
            background: #eef3ea;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5a7350;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🌿 Oráculo de Lula <span>6º</span></h1>
        <p>Busca em tempo real na EBC (Agência Brasil) + Wikipédia</p>
    </div>
    <div class="card">
        <div class="search-area">
            <input type="text" id="personName" class="search-input" placeholder="Ex: Joe Biden, Papa Francisco, Neymar">
            <button id="searchBtn" class="search-btn">✨ Consultar</button>
        </div>
        <div id="result">🔍 Aguardando consulta...</div>
    </div>
    <footer>🌍 Fonte: Agência Brasil (busca oficial) e Wikipédia. Caminhos de até 5 graus.</footer>
</div>

<script>
    // ================= CONFIGURAÇÕES =================
    const LULA = "Luiz Inácio Lula da Silva";
    const MAX_DEG = 5;
    
    // Cache para evitar consultas repetidas
    const wikiNeighborsCache = new Map();
    const ebcNeighborsCache = new Map();
    const labelCache = new Map();
    
    // Propriedades Wikidata para conexões entre pessoas
    const WIKI_PROPS = [
        "wdt:P39", "wdt:P102", "wdt:P108", "wdt:P26", "wdt:P40", "wdt:P3373",
        "wdt:P737", "wdt:P1416", "wdt:P1344", "wdt:P793", "wdt:P155", "wdt:P156",
        "wdt:P22", "wdt:P25", "wdt:P106", "wdt:P463", "wdt:P410"
    ];
    const WIKI_PROPS_LIST = WIKI_PROPS.join(", ");
    
    // ========== FUNÇÕES AUXILIARES ==========
    async function sparqlWikidata(query, timeout=3000) {
        const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(query)}`;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const resp = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            return await resp.json();
        } catch {
            clearTimeout(id);
            return null;
        }
    }
    
    async function getQidFromName(name) {
        if (labelCache.has(name)) return labelCache.get(name);
        const url = `https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(name)}&language=pt&format=json&origin=*&limit=5`;
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.search && data.search.length) {
                for (let item of data.search) {
                    const entityUrl = `https://www.wikidata.org/wiki/Special:EntityData/${item.id}.json`;
                    const eResp = await fetch(entityUrl);
                    const eData = await eResp.json();
                    const claims = eData.entities[item.id].claims;
                    if (claims.P31 && claims.P31.some(p => p.mainsnak.datavalue?.value?.id === 'Q5')) {
                        labelCache.set(name, item.id);
                        return item.id;
                    }
                }
                const fallback = data.search[0].id;
                labelCache.set(name, fallback);
                return fallback;
            }
            return null;
        } catch { return null; }
    }
    
    async function getWikidataLabel(qid) {
        if (labelCache.has(qid)) return labelCache.get(qid);
        const url = `https://www.wikidata.org/wiki/Special:EntityData/${qid}.json`;
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            const entity = data.entities[qid];
            let label = qid;
            if (entity.labels?.pt) label = entity.labels.pt.value;
            else if (entity.labels?.en) label = entity.labels.en.value;
            labelCache.set(qid, label);
            return label;
        } catch { return qid; }
    }
    
    async function getWikidataNeighbors(qid) {
        const cacheKey = `wiki:${qid}`;
        if (wikiNeighborsCache.has(cacheKey)) return wikiNeighborsCache.get(cacheKey);
        const query = `
            SELECT DISTINCT ?neighbor WHERE {
              { wd:${qid} ?prop ?neighbor . ?neighbor wdt:P31 wd:Q5 . FILTER(?prop IN (${WIKI_PROPS_LIST})) }
              UNION
              { ?neighbor ?prop wd:${qid} . ?neighbor wdt:P31 wd:Q5 . FILTER(?prop IN (${WIKI_PROPS_LIST})) }
            }
            LIMIT 30
        `;
        const data = await sparqlWikidata(query);
        let neighbors = [];
        if (data?.results?.bindings) {
            neighbors = data.results.bindings.map(b => b.neighbor.value.split('/').pop());
            neighbors = [...new Set(neighbors)];
        }
        const enriched = neighbors.map(nbQid => ({ id: nbQid, type: 'wikidata' }));
        wikiNeighborsCache.set(cacheKey, enriched);
        return enriched;
    }
    
    // ========== BUSCA NA EBC (Agência Brasil) ==========
    async function searchEBC(query) {
        const cacheKey = `ebc:${query}`;
        if (ebcNeighborsCache.has(cacheKey)) return ebcNeighborsCache.get(cacheKey);
        
        // Usa a busca do próprio site da EBC
        const url = `https://agenciabrasil.ebc.com.br/search/node?keys=${encodeURIComponent(query)}`;
        // Usa um proxy CORS para evitar bloqueios
        const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        try {
            const resp = await fetch(proxy);
            const html = await resp.text();
            // Extrai os títulos das notícias
            const matches = [...html.matchAll(/<a[^>]+href="[^"]+"[^>]*>([^<]+)<\/a>/g)];
            const titles = matches.map(m => m[1]).filter(t => t && t.length > 10);
            // Extrai nomes mencionados nos títulos (palavras com pelo menos 2 letras maiúsculas)
            const namePattern = /\b[A-ZÀ-Ú][a-zà-ú]+(?:\s+[A-ZÀ-Ú][a-zà-ú]+)+\b/g;
            const names = new Set();
            for (let title of titles) {
                const found = title.match(namePattern);
                if (found) found.forEach(n => names.add(n));
            }
            const result = Array.from(names).slice(0, 10);
            ebcNeighborsCache.set(cacheKey, result);
            return result;
        } catch (err) {
            console.error("Erro na busca EBC:", err);
            return [];
        }
    }
    
    // ========== BUSCA HÍBRIDA (Wikidata + EBC) ==========
    async function hybridBFS(startLabel, targetLabel, maxDeg = MAX_DEG) {
        const visited = new Set();
        const queue = [{ label: startLabel, path: [startLabel] }];
        visited.add(startLabel);
        
        while (queue.length) {
            const current = queue.shift();
            if (current.path.length > maxDeg) continue;
            
            if (current.label === targetLabel) return current.path;
            
            // Obtém vizinhos do nó atual
            let neighbors = [];
            
            // 1. Vizinhos via Wikidata
            const qid = await getQidFromName(current.label);
            if (qid) {
                const wikiNeighbors = await getWikidataNeighbors(qid);
                for (let nb of wikiNeighbors) {
                    const nbLabel = await getWikidataLabel(nb.id);
                    neighbors.push(nbLabel);
                }
            }
            
            // 2. Vizinhos via EBC (busca por notícias)
            const ebcResults = await searchEBC(current.label);
            for (let nb of ebcResults) {
                neighbors.push(nb);
            }
            
            // Expande a busca
            for (let nb of neighbors) {
                if (visited.has(nb)) continue;
                visited.add(nb);
                queue.push({ label: nb, path: [...current.path, nb] });
            }
        }
        return null;
    }
    
    // ========== CONSULTA PRINCIPAL ==========
    async function consultar() {
        const input = document.getElementById('personName');
        const nome = input.value.trim();
        if (!nome) return;
        
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `<div class="result-card"><div class="loading"></div> Buscando conexões entre ${nome} e Lula...</div>`;
        
        const caminho = await hybridBFS(nome, LULA, MAX_DEG);
        
        if (!caminho || caminho.length < 2) {
            resultDiv.innerHTML = `<div class="result-card">⚠️ Nenhum caminho encontrado entre ${nome} e Lula com até ${MAX_DEG} graus. Tente outro nome.</div>`;
            return;
        }
        
        const distancia = caminho.length - 1;
        const html = `
            <div class="result-card">
                <div><span class="badge">🎯 Número de Lula = ${distancia}</span></div>
                <div class="path">🔗 ${caminho.join(' → ')}</div>
                <div style="font-size:0.8rem; margin-top:0.5rem;">✅ Caminho encontrado com ${distancia} grau${distancia !== 1 ? 's' : ''} de separação.</div>
            </div>
        `;
        resultDiv.innerHTML = html;
    }
    
    // Eventos
    document.getElementById('searchBtn').addEventListener('click', consultar);
    document.getElementById('personName').addEventListener('keypress', e => { if (e.key === 'Enter') consultar(); });
</script>
</body>
</html>
