<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo de Lula</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Alinha ao topo */
            min-height: 100vh; /* Altura mínima para centralizar verticalmente se houver pouco conteúdo */
        }
        .container {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #0056b3;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }
        input[type="text"] {
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            flex-grow: 1;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus {
            border-color: #007bff;
        }
        button {
            padding: 12px 25px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
            outline: none;
        }
        button:hover {
            background-color: #0056b3;
        }
        #results {
            margin-top: 30px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .result-item {
            background-color: #e9ecef;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            border-left: 5px solid #007bff;
            text-align: center;
        }
        .result-item strong {
            color: #0056b3;
        }
        .no-results {
            color: #6c757d;
            font-style: italic;
        }
        .loading {
            font-style: italic;
            color: #6c757d;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oráculo de Lula</h1>
        <p>Descubra as conexões de qualquer pessoa com o Presidente Luiz Inácio Lula da Silva, baseadas em relações oficiais e notícias.</p>

        <div class="search-box">
            <input type="text" id="nameInput" placeholder="Digite um nome...">
            <button onclick="searchConnection()">Buscar Conexão</button>
        </div>

        <div id="results">
            <p class="no-results">Digite um nome acima e clique em "Buscar Conexão" para ver os resultados.</p>
        </div>
    </div>

    <script>
        // Simulação de uma base de dados de conexões
        // Em uma aplicação real, isso viria de APIs de notícias, sites oficiais, etc.
        const connectionsDatabase = {
            "joao silva": [
                { type: "Notícia", description: "Participou de reunião em Brasília em 2023.", source: "G1" },
                { type: "Evento Oficial", description: "Compareceu à posse presidencial em 2023.", source: "Agência Brasil" }
            ],
            "maria ferreira": [
                { type: "Notícia", description: "Mencionada em reportagem sobre o setor cultural em 2022.", source: "Folha de S.Paulo" },
                { type: "Evento Oficial", description: "Recebeu homenagem em evento do governo em 2021." }
            ],
            "pedro almeida": [
                { type: "Notícia", description: "Entrevistado em programa de TV sobre política em 2024.", source: "CNN Brasil" },
                { type: "Rede Social (Simulado)", description: "Comentou em postagem oficial do presidente em 2023." }
            ],
            "ana souza": [
                 { type: "Notícia", description: "Participou de debate sobre economia em 2023.", source: "Valor Econômico" }
            ],
            "presidente lula": [ // Para evitar loop infinito ou mostrar a própria conexão
                { type: "Auto-referência", description: "O próprio Presidente Luiz Inácio Lula da Silva." }
            ]
        };

        // Simulação de conexões de segundo grau (quem esteve com pessoas que estiveram com Lula)
        // Esta é uma simplificação extrema. Em um grafo real, isso seria calculado dinamicamente.
        const secondDegreeConnections = {
            "joao silva": [
                { name: "ana souza", type: "Notícia", description: "Ana Souza foi vista em reunião com João Silva em 2023.", source: "Estadão" },
                { name: "pedro almeida", type: "Notícia", description: "Pedro Almeida comentou sobre a reunião de João Silva em 2023.", source: "UOL Notícias" }
            ]
        };

        function searchConnection() {
            const nameInput = document.getElementById('nameInput');
            const resultsDiv = document.getElementById('results');
            const searchTerm = nameInput.value.trim().toLowerCase();

            resultsDiv.innerHTML = '<p class="loading">Buscando conexões...</p>';

            // Simula um pequeno atraso para dar a sensação de busca
            setTimeout(() => {
                if (searchTerm === "") {
                    resultsDiv.innerHTML = '<p class="no-results">Por favor, digite um nome para buscar.</p>';
                    return;
                }

                let foundConnections = [];

                // Verifica conexões de primeiro grau (diretamente com Lula)
                if (connectionsDatabase[searchTerm]) {
                    foundConnections.push({ person: searchTerm, connections: connectionsDatabase[searchTerm] });
                }

                // Verifica conexões de segundo grau (com pessoas que tiveram contato com Lula)
                // Esta parte é uma simulação MUITO simplificada. Em um grafo real, seria uma busca em profundidade ou largura.
                if (secondDegreeConnections[searchTerm]) {
                    foundConnections.push({ person: searchTerm, connections: secondDegreeConnections[searchTerm] });
                } else {
                    // Tenta encontrar quem tem conexão com Lula e essa pessoa tem conexão com o termo buscado
                    for (const knownPerson in connectionsDatabase) {
                        if (knownPerson !== searchTerm && connectionsDatabase[knownPerson].length > 0) {
                            // Simula se o searchTerm teve alguma relação com 'knownPerson'
                            // Em um sistema real, isso seria uma consulta a um banco de dados ou API
                            if (knownPerson === "joao silva" && searchTerm === "maria ferreira") {
                                foundConnections.push({ person: searchTerm, connections: [{ type: "Conexão Indireta (Simulada)", description: "Maria Ferreira foi mencionada em notícias que também citaram João Silva, que esteve com Lula.", source: "Simulação" }] });
                            }
                        }
                    }
                }


                if (foundConnections.length > 0) {
                    resultsDiv.innerHTML = ''; // Limpa a mensagem de carregamento
                    foundConnections.forEach(connectionInfo => {
                        const person = connectionInfo.person;
                        const connections = connectionInfo.connections;

                        if (person === "presidente lula") {
                            resultsDiv.innerHTML += `
                                <div class="result-item">
                                    <p><strong>${person.toUpperCase()}</strong></p>
                                    <p>${connections[0].description}</p>
                                </div>
                            `;
                        } else {
                            resultsDiv.innerHTML += `
                                <div class="result-item">
                                    <p><strong>${person.toUpperCase()}</strong></p>
                                    <p>Relações com o Presidente Lula:</p>
                                    <ul>
                                        ${connections.map(conn => `<li>${conn.type}: ${conn.description} (${conn.source || 'Fonte não especificada'})</li>`).join('')}
                                    </ul>
                                </div>
                            `;
                        }
                    });
                } else {
                    resultsDiv.innerHTML = '<p class="no-results">Nenhuma conexão direta ou indireta encontrada para "' + searchTerm + '".</p>';
                }
            }, 500); // Simula 0.5 segundos de latência
        }
    </script>
</body>
</html>
