<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo de Lula · Busca por Eventos (Wikidata + EBC)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f7e8 0%, #e0ecd6 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            color: #1a3a1a;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #1a5a1a, #3a8a3a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero h1 span {
            background: #ffdd77;
            color: #1a5a1a;
            border-radius: 60px;
            padding: 0 12px;
            font-size: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }
        .search-area {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .search-input {
            flex: 3;
            padding: 0.9rem 1.2rem;
            border: 2px solid #cfdec7;
            border-radius: 60px;
            font-size: 1rem;
        }
        .search-input:focus {
            border-color: #2b7a2b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(43,122,43,0.2);
        }
        .search-btn {
            background: #1a5a1a;
            color: white;
            border: none;
            padding: 0 2rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-btn:hover { background: #0e3a0e; transform: scale(0.97); }
        .result-card {
            background: white;
            border-radius: 1.2rem;
            padding: 1.5rem;
            border-left: 5px solid #2b7a2b;
        }
        .path {
            background: #f4f9ef;
            padding: 1rem;
            border-radius: 1rem;
            font-family: monospace;
            margin: 1rem 0;
            word-break: break-word;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ccc;
            border-top-color: #2b7a2b;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .badge {
            background: #eef3ea;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
        }
        .progress {
            font-size: 0.8rem;
            color: #2b7a2b;
            margin-top: 0.5rem;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5a7350;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🌿 Oráculo de Lula <span>6º</span></h1>
        <p>Busca por eventos, cargos e notícias (Wikidata + EBC)</p>
    </div>
    <div class="card">
        <div class="search-area">
            <input type="text" id="personName" class="search-input" placeholder="Ex: Joe Biden, Papa Francisco, Jair Bolsonaro, Zeca Pagodinho">
            <button id="searchBtn" class="search-btn">✨ Consultar</button>
        </div>
        <div id="result">🔍 Aguardando consulta...</div>
    </div>
    <footer>🌍 Inclui participação em eventos (debates, shows, encontros). Caminhos de até 5 graus.</footer>
</div>

<script>
    // ================= CONFIGURAÇÕES =================
    const LULA = "Luiz Inácio Lula da Silva";
    const MAX_DEG = 5;
    const TIMEOUT_WIKI = 4000;
    const TIMEOUT_EBC = 4000;
    
    // Caches
    const neighborsCache = new Map();   // chave: "tipo:id" -> array de {id, tipo, label?}
    const qidCache = new Map();
    const labelCache = new Map();
    
    let currentAbortController = null;
    
    // Propriedades para conexões diretas (pessoa-pessoa)
    const DIRECT_PROPS = [
        "wdt:P39", "wdt:P102", "wdt:P108", "wdt:P26", "wdt:P40", "wdt:P3373",
        "wdt:P737", "wdt:P1416", "wdt:P155", "wdt:P156", "wdt:P22", "wdt:P25",
        "wdt:P106", "wdt:P463", "wdt:P410"
    ];
    const DIRECT_PROPS_LIST = DIRECT_PROPS.join(", ");
    
    // Propriedades para eventos: P1344 (participante de), P793 (evento significativo)
    // Vamos buscar eventos dos quais a pessoa participa, e depois os participantes desses eventos.
    const EVENT_PROPS = ["wdt:P1344", "wdt:P793"];
    const EVENT_PROPS_LIST = EVENT_PROPS.join(", ");
    
    // ========== FUNÇÕES WIKIDATA ==========
    async function sparqlWikidata(query, timeout) {
        const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(query)}`;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const resp = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            return await resp.json();
        } catch {
            clearTimeout(id);
            return null;
        }
    }
    
    async function getQidFromName(name) {
        const key = name.toLowerCase();
        if (qidCache.has(key)) return qidCache.get(key);
        const url = `https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(name)}&language=pt&format=json&origin=*&limit=5`;
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.search && data.search.length) {
                for (let item of data.search) {
                    const entityUrl = `https://www.wikidata.org/wiki/Special:EntityData/${item.id}.json`;
                    const eResp = await fetch(entityUrl);
                    const eData = await eResp.json();
                    const claims = eData.entities[item.id].claims;
                    if (claims.P31 && claims.P31.some(p => p.mainsnak.datavalue?.value?.id === 'Q5')) {
                        qidCache.set(key, item.id);
                        return item.id;
                    }
                }
                const fallback = data.search[0].id;
                qidCache.set(key, fallback);
                return fallback;
            }
            return null;
        } catch { return null; }
    }
    
    async function getWikidataLabel(qid) {
        if (labelCache.has(qid)) return labelCache.get(qid);
        const url = `https://www.wikidata.org/wiki/Special:EntityData/${qid}.json`;
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            const entity = data.entities[qid];
            let label = qid;
            if (entity.labels?.pt) label = entity.labels.pt.value;
            else if (entity.labels?.en) label = entity.labels.en.value;
            labelCache.set(qid, label);
            return label;
        } catch { return qid; }
    }
    
    // Busca vizinhos de um QID: pessoas diretamente conectadas + pessoas via eventos
    async function getWikidataNeighbors(qid) {
        const cacheKey = `wiki:${qid}`;
        if (neighborsCache.has(cacheKey)) return neighborsCache.get(cacheKey);
        
        // 1. Vizinhos diretos (pessoa-pessoa)
        const directQuery = `
            SELECT DISTINCT ?neighbor WHERE {
              { wd:${qid} ?prop ?neighbor . ?neighbor wdt:P31 wd:Q5 . FILTER(?prop IN (${DIRECT_PROPS_LIST})) }
              UNION
              { ?neighbor ?prop wd:${qid} . ?neighbor wdt:P31 wd:Q5 . FILTER(?prop IN (${DIRECT_PROPS_LIST})) }
            }
            LIMIT 30
        `;
        const directData = await sparqlWikidata(directQuery, TIMEOUT_WIKI);
        let neighbors = new Set();
        if (directData?.results?.bindings) {
            directData.results.bindings.forEach(b => {
                const nb = b.neighbor.value.split('/').pop();
                neighbors.add(nb);
            });
        }
        
        // 2. Vizinhos via eventos: pessoa -> evento -> outra pessoa
        // Primeiro, busca eventos dos quais a pessoa participa
        const eventQuery = `
            SELECT DISTINCT ?event WHERE {
              wd:${qid} ?prop ?event .
              FILTER(?prop IN (${EVENT_PROPS_LIST}))
            }
            LIMIT 20
        `;
        const eventData = await sparqlWikidata(eventQuery, TIMEOUT_WIKI);
        if (eventData?.results?.bindings) {
            const events = eventData.results.bindings.map(b => b.event.value.split('/').pop());
            // Para cada evento, buscar participantes
            for (let ev of events) {
                const participantsQuery = `
                    SELECT DISTINCT ?participant WHERE {
                      { wd:${ev} ?prop ?participant . ?participant wdt:P31 wd:Q5 . FILTER(?prop IN (${EVENT_PROPS_LIST})) }
                      UNION
                      { ?participant ?prop wd:${ev} . ?participant wdt:P31 wd:Q5 . FILTER(?prop IN (${EVENT_PROPS_LIST})) }
                    }
                    LIMIT 30
                `;
                const partData = await sparqlWikidata(participantsQuery, TIMEOUT_WIKI);
                if (partData?.results?.bindings) {
                    partData.results.bindings.forEach(b => {
                        const p = b.participant.value.split('/').pop();
                        if (p !== qid) neighbors.add(p);
                    });
                }
                // Pequeno delay para não sobrecarregar
                await new Promise(r => setTimeout(r, 50));
            }
        }
        
        const result = Array.from(neighbors).slice(0, 25).map(nb => ({ id: nb, type: 'wikidata' }));
        neighborsCache.set(cacheKey, result);
        setTimeout(() => neighborsCache.delete(cacheKey), 3600000);
        return result;
    }
    
    // ========== BUSCA NA EBC (extrai nomes de títulos de notícias) ==========
    async function searchEBC(query) {
        const cacheKey = `ebc:${query}`;
        if (neighborsCache.has(cacheKey)) return neighborsCache.get(cacheKey);
        const searchUrl = `https://agenciabrasil.ebc.com.br/search/node?keys=${encodeURIComponent(query)}`;
        const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`;
        try {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), TIMEOUT_EBC);
            const resp = await fetch(proxy, { signal: controller.signal });
            clearTimeout(id);
            const html = await resp.text();
            const titleRegex = /<a[^>]+href="[^"]+"[^>]*>([^<]+)<\/a>/gi;
            const titles = [];
            let match;
            while ((match = titleRegex.exec(html)) !== null) {
                let text = match[1].trim();
                if (text && text.length > 10 && text.length < 200) titles.push(text);
            }
            const namePattern = /\b[A-ZÀ-Ú][a-zà-ú]+(?:\s+[A-ZÀ-Ú][a-zà-ú]+)+\b/g;
            const namesSet = new Set();
            for (let title of titles) {
                const found = title.match(namePattern);
                if (found) found.forEach(n => namesSet.add(n));
            }
            const result = Array.from(namesSet).slice(0, 8).map(name => ({ id: name, type: 'ebc' }));
            neighborsCache.set(cacheKey, result);
            setTimeout(() => neighborsCache.delete(cacheKey), 3600000);
            return result;
        } catch (err) {
            return [];
        }
    }
    
    // ========== BFS HÍBRIDO ==========
    async function hybridBFS(startLabel, targetLabel, maxDeg, onProgress) {
        const visited = new Set();
        // Fila: cada nó tem { label, path }
        const queue = [{ label: startLabel, path: [startLabel] }];
        visited.add(startLabel);
        
        while (queue.length) {
            if (currentAbortController?.signal.aborted) return null;
            const current = queue.shift();
            if (current.path.length > maxDeg) continue;
            if (current.label === targetLabel) return current.path;
            if (onProgress) onProgress(`🔍 ${current.label}...`);
            
            // Obtém vizinhos: primeiro tenta Wikidata (se for uma pessoa real)
            let neighbors = [];
            const qid = await getQidFromName(current.label);
            if (qid) {
                const wikiNeighbors = await getWikidataNeighbors(qid);
                for (let nb of wikiNeighbors) {
                    const label = await getWikidataLabel(nb.id);
                    neighbors.push(label);
                }
            }
            // Depois EBC
            const ebcNeighbors = await searchEBC(current.label);
            for (let nb of ebcNeighbors) {
                neighbors.push(nb.id);
            }
            // Remove duplicatas
            const unique = [...new Set(neighbors)];
            for (let nb of unique) {
                if (!visited.has(nb)) {
                    visited.add(nb);
                    queue.push({ label: nb, path: [...current.path, nb] });
                }
            }
        }
        return null;
    }
    
    // ========== CONSULTA PRINCIPAL ==========
    async function consultar() {
        const input = document.getElementById('personName');
        const nome = input.value.trim();
        if (!nome) return;
        
        if (currentAbortController) currentAbortController.abort();
        currentAbortController = new AbortController();
        
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `<div class="result-card"><div class="loading"></div> Buscando conexões entre ${nome} e Lula...<div class="progress"></div></div>`;
        
        const start = Date.now();
        let lastProgress = "";
        const caminho = await hybridBFS(nome, LULA, MAX_DEG, (msg) => {
            if (msg !== lastProgress) {
                lastProgress = msg;
                const progDiv = resultDiv.querySelector('.progress');
                if (progDiv) progDiv.innerText = msg;
            }
        });
        
        if (currentAbortController.signal.aborted) return;
        const elapsed = ((Date.now() - start) / 1000).toFixed(1);
        
        if (!caminho || caminho.length < 2) {
            resultDiv.innerHTML = `<div class="result-card">⚠️ Nenhum caminho encontrado entre ${nome} e Lula (${elapsed}s). Tente outro nome.</div>`;
            return;
        }
        
        const distancia = caminho.length - 1;
        resultDiv.innerHTML = `
            <div class="result-card">
                <div><span class="badge">🎯 Número de Lula = ${distancia}</span></div>
                <div class="path">🔗 ${caminho.join(' → ')}</div>
                <div style="font-size:0.8rem; margin-top:0.5rem;">✅ Encontrado em ${elapsed}s com ${distancia} grau${distancia !== 1 ? 's' : ''} de separação.</div>
            </div>
        `;
    }
    
    // Eventos com debounce
    let debounce;
    function handleSearch() {
        if (debounce) clearTimeout(debounce);
        debounce = setTimeout(() => consultar(), 300);
    }
    document.getElementById('searchBtn').addEventListener('click', handleSearch);
    document.getElementById('personName').addEventListener('keypress', e => { if (e.key === 'Enter') handleSearch(); });
</script>
</body>
</html>
