<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo de Lula · Graus de Separação (Wikidata + EventKG)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f0f7e8 0%, #e0ecd6 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            color: #1a3a1a;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #1a5a1a, #3a8a3a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero h1 span {
            background: #ffdd77;
            color: #1a5a1a;
            border-radius: 60px;
            padding: 0 12px;
            font-size: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }
        .search-area {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .search-input {
            flex: 3;
            padding: 0.9rem 1.2rem;
            border: 2px solid #cfdec7;
            border-radius: 60px;
            font-size: 1rem;
        }
        .search-input:focus {
            border-color: #2b7a2b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(43,122,43,0.2);
        }
        .search-btn {
            background: #1a5a1a;
            color: white;
            border: none;
            padding: 0 2rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-btn:hover { background: #0e3a0e; transform: scale(0.97); }
        .result-card {
            background: white;
            border-radius: 1.2rem;
            padding: 1.5rem;
            border-left: 5px solid #2b7a2b;
        }
        .degrees {
            font-size: 2rem;
            font-weight: 800;
            color: #1a5a1a;
        }
        .path {
            background: #f4f9ef;
            padding: 1rem;
            border-radius: 1rem;
            font-family: monospace;
            margin: 1rem 0;
            word-break: break-word;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ccc;
            border-top-color: #2b7a2b;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .badge {
            background: #eef3ea;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5a7350;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🌿 Oráculo de Lula <span>6º</span></h1>
        <p>Wikidata + EventKG · Caminhos de até 5 graus</p>
    </div>
    <div class="card">
        <div class="search-area">
            <input type="text" id="personName" class="search-input" placeholder="Ex: Joe Biden, Papa Francisco, Neymar, Dilma Rousseff">
            <button id="searchBtn" class="search-btn">✨ Consultar</button>
        </div>
        <div id="result">🔍 Aguardando consulta...</div>
    </div>
    <footer>Base: Wikidata (cargos, partidos, parentesco) + EventKG (eventos, reuniões). Busca unificada em tempo real.</footer>
</div>

<script>
    // ================= CONFIGURAÇÕES =================
    const LULA_QID = 'Q37181';                // Wikidata ID de Lula
    const LULA_URI = 'http://dbpedia.org/resource/Luiz_Inácio_Lula_da_Silva'; // EventKG URI
    const MAX_DEG = 5;
    
    // Caches
    const qidCache = new Map();                // nome -> QID
    const uriCache = new Map();                // nome -> URI (EventKG)
    const labelCache = new Map();              // QID ou URI -> nome legível
    const neighborCache = new Map();           // QID ou URI -> lista de {id, type, label?}
    
    // Propriedades Wikidata para conexões entre pessoas
    const WIKI_PROPS = [
        "wdt:P39", "wdt:P102", "wdt:P108", "wdt:P26", "wdt:P40", "wdt:P3373",
        "wdt:P737", "wdt:P1416", "wdt:P1344", "wdt:P793", "wdt:P155", "wdt:P156",
        "wdt:P22", "wdt:P25", "wdt:P106", "wdt:P463", "wdt:P410"
    ];
    const WIKI_PROPS_LIST = WIKI_PROPS.join(", ");
    
    // ========== FUNÇÕES WIKIDATA ==========
    async function sparqlWikidata(query, timeout=3000) {
        const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(query)}`;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const resp = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            return await resp.json();
        } catch {
            clearTimeout(id);
            return null;
        }
    }
    
    async function getQidFromName(name) {
        const key = name.toLowerCase();
        if (qidCache.has(key)) return qidCache.get(key);
        const url = `https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(name)}&language=pt&format=json&origin=*&limit=5`;
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.search && data.search.length) {
                for (let item of data.search) {
                    // Verifica se é pessoa (Q5)
                    const entityUrl = `https://www.wikidata.org/wiki/Special:EntityData/${item.id}.json`;
                    const eResp = await fetch(entityUrl);
                    const eData = await eResp.json();
                    const claims = eData.entities[item.id].claims;
                    if (claims.P31 && claims.P31.some(p => p.mainsnak.datavalue?.value?.id === 'Q5')) {
                        qidCache.set(key, item.id);
                        return item.id;
                    }
                }
                const fallback = data.search[0].id;
                qidCache.set(key, fallback);
                return fallback;
            }
            return null;
        } catch { return null; }
    }
    
    async function getWikidataLabel(qid) {
        if (labelCache.has(qid)) return labelCache.get(qid);
        const url = `https://www.wikidata.org/wiki/Special:EntityData/${qid}.json`;
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            const entity = data.entities[qid];
            let label = qid;
            if (entity.labels?.pt) label = entity.labels.pt.value;
            else if (entity.labels?.en) label = entity.labels.en.value;
            labelCache.set(qid, label);
            return label;
        } catch { return qid; }
    }
    
    async function getWikidataNeighbors(qid) {
        const cacheKey = `wiki:${qid}`;
        if (neighborCache.has(cacheKey)) return neighborCache.get(cacheKey);
        const query = `
            SELECT DISTINCT ?neighbor WHERE {
              { wd:${qid} ?prop ?neighbor . ?neighbor wdt:P31 wd:Q5 . FILTER(?prop IN (${WIKI_PROPS_LIST})) }
              UNION
              { ?neighbor ?prop wd:${qid} . ?neighbor wdt:P31 wd:Q5 . FILTER(?prop IN (${WIKI_PROPS_LIST})) }
            }
            LIMIT 30
        `;
        const data = await sparqlWikidata(query);
        let neighbors = [];
        if (data?.results?.bindings) {
            neighbors = data.results.bindings.map(b => b.neighbor.value.split('/').pop());
            neighbors = [...new Set(neighbors)];
        }
        const enriched = neighbors.map(nbQid => ({ id: nbQid, type: 'wikidata' }));
        neighborCache.set(cacheKey, enriched);
        return enriched;
    }
    
    // ========== FUNÇÕES EVENTKG ==========
    async function sparqlEventKG(query, timeout=5000) {
        const endpoint = 'https://eventkg.l3s.uni-hannover.de/sparql/eventkg';
        const url = `${endpoint}?format=json&query=${encodeURIComponent(query)}`;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const resp = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            return await resp.json();
        } catch {
            clearTimeout(id);
            return null;
        }
    }
    
    async function getPersonUri(name) {
        const key = name.toLowerCase();
        if (uriCache.has(key)) return uriCache.get(key);
        const searchUrl = `https://lookup.dbpedia.org/api/search/KeywordSearch?QueryString=${encodeURIComponent(name)}&MaxHits=3&Format=json`;
        try {
            const resp = await fetch(searchUrl);
            const data = await resp.json();
            if (data.docs && data.docs.length) {
                for (let doc of data.docs) {
                    if (doc.resource && (doc.type?.includes('person') || doc.type?.includes('politician'))) {
                        uriCache.set(key, doc.resource);
                        return doc.resource;
                    }
                }
                const fallback = data.docs[0].resource;
                uriCache.set(key, fallback);
                return fallback;
            }
            return null;
        } catch { return null; }
    }
    
    async function getEventKGNeighbors(uri) {
        const cacheKey = `event:${uri}`;
        if (neighborCache.has(cacheKey)) return neighborCache.get(cacheKey);
        const query = `
            PREFIX sem: <http://semanticweb.cs.vu.nl/2009/11/sem/>
            SELECT DISTINCT ?related WHERE {
              { ?event sem:hasParticipant <${uri}> ; sem:hasParticipant ?related . }
              UNION
              { ?rel sem:subject <${uri}> ; sem:object ?related . }
              UNION
              { ?rel sem:object <${uri}> ; sem:subject ?related . }
              FILTER(?related != <${uri}>)
            }
            LIMIT 20
        `;
        const data = await sparqlEventKG(query);
        let neighbors = [];
        if (data?.results?.bindings) {
            neighbors = data.results.bindings.map(b => b.related.value).filter(v => v && v !== uri);
            neighbors = [...new Set(neighbors)];
        }
        const enriched = neighbors.map(nbUri => ({ id: nbUri, type: 'eventkg' }));
        neighborCache.set(cacheKey, enriched);
        return enriched;
    }
    
    // ========== OBTENÇÃO DE LABEL PARA QUALQUER ID ==========
    async function getLabel(id, type) {
        if (labelCache.has(id)) return labelCache.get(id);
        let label = id;
        if (type === 'wikidata') {
            label = await getWikidataLabel(id);
        } else {
            // Extrai nome amigável da URI
            let raw = id.split('/').pop().replace(/_/g, ' ');
            label = decodeURIComponent(raw);
        }
        labelCache.set(id, label);
        return label;
    }
    
    // ========== BFS UNIFICADO (Wikidata + EventKG) ==========
    async function unifiedBFS(startQid, startUri, targetQid, targetUri) {
        // Fila de nós: cada nó tem { id, type, path }
        const queue = [];
        const visited = new Set(); // guarda "type:id"
        
        // Adiciona ponto de partida (Lula) nos dois formatos
        if (startQid) {
            queue.push({ id: startQid, type: 'wikidata', path: [startQid] });
            visited.add(`wikidata:${startQid}`);
        }
        if (startUri) {
            queue.push({ id: startUri, type: 'eventkg', path: [startUri] });
            visited.add(`eventkg:${startUri}`);
        }
        
        while (queue.length) {
            const current = queue.shift();
            if (current.path.length > MAX_DEG) continue;
            
            // Verifica se atingiu o alvo (qualquer formato)
            if ((current.type === 'wikidata' && current.id === targetQid) ||
                (current.type === 'eventkg' && current.id === targetUri)) {
                return current.path;
            }
            
            // Obtém vizinhos conforme o tipo
            let neighbors = [];
            if (current.type === 'wikidata') {
                neighbors = await getWikidataNeighbors(current.id);
            } else {
                neighbors = await getEventKGNeighbors(current.id);
            }
            
            for (let nb of neighbors) {
                const visitKey = `${nb.type}:${nb.id}`;
                if (visited.has(visitKey)) continue;
                visited.add(visitKey);
                queue.push({
                    id: nb.id,
                    type: nb.type,
                    path: [...current.path, nb.id]
                });
            }
        }
        return null;
    }
    
    // ========== CONSULTA PRINCIPAL ==========
    async function consultar() {
        const input = document.getElementById('personName');
        const nome = input.value.trim();
        if (!nome) return;
        
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `<div class="result-card"><div class="loading"></div> Buscando identificadores e conectando Wikidata + EventKG...</div>`;
        
        // Obtém QID e URI da pessoa
        const [qid, uri] = await Promise.all([
            getQidFromName(nome),
            getPersonUri(nome)
        ]);
        
        if (!qid && !uri) {
            resultDiv.innerHTML = `<div class="result-card">❌ Não foi possível encontrar "${nome}" nas bases. Tente outro nome.</div>`;
            return;
        }
        
        resultDiv.innerHTML = `<div class="result-card"><div class="loading"></div> Buscando caminho de até ${MAX_DEG} graus...</div>`;
        
        const caminhoIds = await unifiedBFS(LULA_QID, LULA_URI, qid, uri);
        
        if (!caminhoIds || caminhoIds.length < 2) {
            resultDiv.innerHTML = `<div class="result-card">⚠️ Nenhum caminho encontrado entre ${nome} e Lula com até ${MAX_DEG} graus. Tente outro nome.</div>`;
            return;
        }
        
        // Converte IDs para rótulos
        const labels = [];
        for (let id of caminhoIds) {
            const type = /^Q\d+$/.test(id) ? 'wikidata' : 'eventkg';
            const label = await getLabel(id, type);
            labels.push(label);
        }
        
        const distancia = caminhoIds.length - 1;
        const html = `
            <div class="result-card">
                <div><span class="badge">🎯 Número de Lula = ${distancia}</span></div>
                <div class="path">🔗 ${labels.join(' → ')}</div>
                <div style="font-size:0.8rem; margin-top:0.5rem;">✅ Caminho encontrado com ${distancia} grau${distancia !== 1 ? 's' : ''} de separação.</div>
            </div>
        `;
        resultDiv.innerHTML = html;
    }
    
    // Eventos
    document.getElementById('searchBtn').addEventListener('click', consultar);
    document.getElementById('personName').addEventListener('keypress', e => { if (e.key === 'Enter') consultar(); });
</script>
</body>
</html>
