<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CrossBlock · Entrelace Modular</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }

        /* Container principal estilo app */
        .app-container {
            max-width: 650px;
            width: 100%;
            background: rgba(12, 20, 30, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 20px 20px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(72, 187, 255, 0.25);
        }

        /* Canvas responsivo */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            border-radius: 32px;
            background: #010a15;
            padding: 8px;
            box-shadow: inset 0 0 8px #00000030, 0 12px 24px rgba(0,0,0,0.3);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        /* Painel inferior */
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 24px;
            padding: 0 8px;
        }

        .score-card {
            background: #03060cee;
            border-radius: 48px;
            padding: 8px 22px;
            border: 1px solid #2dd4bfaa;
            backdrop-filter: blur(4px);
            text-align: center;
            min-width: 130px;
        }
        .score-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #7bc5f0;
            font-weight: 500;
            text-transform: uppercase;
        }
        .score-value {
            font-size: 2.6rem;
            font-weight: 800;
            line-height: 1;
            color: #f0fcff;
            text-shadow: 0 0 6px #00ccff;
        }

        .piece-selector {
            display: flex;
            gap: 14px;
            background: #0b111fcc;
            padding: 6px 12px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
        }
        .piece-btn {
            background: #1e2b3c;
            border: none;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px black;
        }
        .piece-btn.active {
            background: #0e7c8c;
            box-shadow: 0 0 14px #00ddff;
            transform: scale(0.96);
            border: 1px solid #b2f0ff;
        }
        .piece-btn.cube { background: #2c5270; }
        .piece-btn.connector { background: #1f6e5c; }

        .reset-btn {
            background: #c2410cbb;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .reset-btn:active { transform: scale(0.96); background: #e25822; }

        .victory-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00e5ffdd;
            backdrop-filter: blur(28px);
            color: #001d2b;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap;
            font-family: monospace;
            transition: 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        @media (max-width: 550px) {
            .app-container { padding: 14px; }
            .piece-btn { padding: 6px 16px; font-size: 1rem; }
            .score-value { font-size: 2rem; }
            .reset-btn { padding: 6px 16px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@2.6.2/phaser.js"></script>
</head>
<body>
<div class="app-container">
    <div class="canvas-wrapper">
        <div id="gameCanvasContainer"></div>
    </div>
    <div class="info-panel">
        <div class="score-card">
            <div class="score-label">ENTRELACE</div>
            <div class="score-value" id="scoreDisplay">0</div>
        </div>
        <div class="piece-selector">
            <button id="btnCube" class="piece-btn cube active">🧊 CUBO</button>
            <button id="btnConnector" class="piece-btn connector">⚡ CONECTOR</button>
        </div>
        <button id="resetGame" class="reset-btn">⟳ REINICIAR</button>
    </div>
</div>
<div id="victoryMessage" class="victory-toast" style="display: none;">🎲 DADO GIGANTE! VITÓRIA 🎉</div>

<script>
    (function(){
        // ---------- CONFIGURAÇÕES ----------
        const GRID_SIZE = 7;
        const CELL_SIZE = 70;       // 70px cada célula → 490x490 board
        const BOARD_WIDTH = GRID_SIZE * CELL_SIZE;
        const BOARD_HEIGHT = GRID_SIZE * CELL_SIZE;

        // Estado do jogo
        let currentPieceType = 'cube';   // 'cube' ou 'connector'
        let score = 0;
        let board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));

        // Elementos DOM
        const scoreSpan = document.getElementById('scoreDisplay');
        const victoryDiv = document.getElementById('victoryMessage');
        let gameInstance = null;
        let graphicsLayer = null;

        // Funções auxiliares
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }

        function showVictory() {
            victoryDiv.style.display = 'block';
            victoryDiv.style.opacity = '1';
            setTimeout(() => {
                victoryDiv.style.opacity = '0';
                setTimeout(() => {
                    victoryDiv.style.display = 'none';
                    victoryDiv.style.opacity = '1';
                }, 500);
            }, 2500);
        }

        // Contar vizinhos ortogonais (conexões reais)
        function countNeighbors(x, y) {
            let count = 0;
            const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
            for(let [dx,dy] of dirs) {
                let nx = x+dx, ny = y+dy;
                if(nx>=0 && nx<GRID_SIZE && ny>=0 && ny<GRID_SIZE && board[nx][ny] !== null) count++;
            }
            return count;
        }

        // Detectar conflito de "cruzamento" entre conectores nas diagonais
        function hasCrossConflict(x, y, pieceType) {
            if(pieceType !== 'connector') return false;
            const diagOff = [[-1,-1],[-1,1],[1,-1],[1,1]];
            for(let [dx,dy] of diagOff) {
                let nx = x+dx, ny = y+dy;
                if(nx>=0 && nx<GRID_SIZE && ny>=0 && ny<GRID_SIZE && board[nx][ny] === 'connector') {
                    return true;   // dois conectores em diagonal = cabos cruzados
                }
            }
            return false;
        }

        // Colocar peça (lógica de pontuação e atualização)
        function tryPlacePiece(row, col) {
            if(row<0 || row>=GRID_SIZE || col<0 || col>=GRID_SIZE) return false;
            if(board[row][col] !== null) return false;

            let neighbors = countNeighbors(row, col);
            let isolated = (neighbors === 0);
            let conflict = hasCrossConflict(row, col, currentPieceType);

            let delta = 0;
            if(isolated) {
                delta = -5;   // cabo solto
            } else {
                delta = 10;   // conexão bem sucedida
            }
            if(conflict) {
                delta -= 15;  // cruzamento indevido
            }

            // Aplica mudança
            board[row][col] = currentPieceType;
            score += delta;
            updateScoreUI();

            // Redesenha o tabuleiro via Phaser
            redrawBoard();

            // Verifica vitória (estrutura principal com tamanho >=10)
            checkVictoryCondition();
            return true;
        }

        // Verifica o maior componente conectado (BFS/DFS)
        function getLargestClusterSize() {
            let visited = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(false));
            let maxSize = 0;
            for(let i=0; i<GRID_SIZE; i++) {
                for(let j=0; j<GRID_SIZE; j++) {
                    if(board[i][j] !== null && !visited[i][j]) {
                        let queue = [[i,j]];
                        visited[i][j] = true;
                        let compSize = 0;
                        while(queue.length) {
                            let [x,y] = queue.shift();
                            compSize++;
                            const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                            for(let [dx,dy] of dirs) {
                                let nx = x+dx, ny = y+dy;
                                if(nx>=0 && nx<GRID_SIZE && ny>=0 && ny<GRID_SIZE && board[nx][ny] !== null && !visited[nx][ny]) {
                                    visited[nx][ny] = true;
                                    queue.push([nx,ny]);
                                }
                            }
                        }
                        if(compSize > maxSize) maxSize = compSize;
                    }
                }
            }
            return maxSize;
        }

        function checkVictoryCondition() {
            let biggest = getLargestClusterSize();
            if(biggest >= 10) {
                showVictory();
            }
        }

        // Reiniciar jogo
        function resetGame() {
            board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
            score = 0;
            updateScoreUI();
            redrawBoard();
            victoryDiv.style.display = 'none';
            victoryDiv.style.opacity = '1';
        }

        // ---------- RENDERIZAÇÃO PHASER 2 (ULTRA PROFISSIONAL) ----------
        function redrawBoard() {
            if(!graphicsLayer) return;
            graphicsLayer.clear();
            // fundo da grade
            for(let i=0; i<GRID_SIZE; i++) {
                for(let j=0; j<GRID_SIZE; j++) {
                    let x = j * CELL_SIZE;
                    let y = i * CELL_SIZE;
                    graphicsLayer.lineStyle(1.2, 0x2c4f7a, 0.7);
                    graphicsLayer.fillStyle(0x0a1220, 0.85);
                    graphicsLayer.fillRect(x, y, CELL_SIZE-1, CELL_SIZE-1);
                    graphicsLayer.strokeRect(x, y, CELL_SIZE-1, CELL_SIZE-1);

                    let piece = board[i][j];
                    if(piece === 'cube') {
                        // Cubo 3D estilizado
                        graphicsLayer.fillStyle(0x3b82f6, 0.95);
                        graphicsLayer.fillRect(x+8, y+6, CELL_SIZE-16, CELL_SIZE-16);
                        graphicsLayer.fillStyle(0x60a5fa, 0.8);
                        graphicsLayer.fillRect(x+12, y+10, CELL_SIZE-24, CELL_SIZE-24);
                        graphicsLayer.fillStyle(0xa5f0ff, 0.5);
                        graphicsLayer.fillRect(x+14, y+12, 8, 8);
                        // textura
                        graphicsLayer.fillStyle(0xffffff30);
                        graphicsLayer.fillRect(x+22, y+18, 12, 4);
                    } else if(piece === 'connector') {
                        let cx = x + CELL_SIZE/2;
                        let cy = y + CELL_SIZE/2;
                        graphicsLayer.lineStyle(6, 0x2dd4bf, 1);
                        graphicsLayer.moveTo(cx-22, cy);
                        graphicsLayer.lineTo(cx+22, cy);
                        graphicsLayer.moveTo(cx, cy-22);
                        graphicsLayer.lineTo(cx, cy+22);
                        // conectores dourados
                        graphicsLayer.fillStyle(0xf5b042, 1);
                        graphicsLayer.fillCircle(cx-20, cy, 5);
                        graphicsLayer.fillCircle(cx+20, cy, 5);
                        graphicsLayer.fillCircle(cx, cy-20, 5);
                        graphicsLayer.fillCircle(cx, cy+20, 5);
                        graphicsLayer.fillStyle(0x88ccff, 0.9);
                        graphicsLayer.fillCircle(cx, cy, 8);
                    }
                }
            }
            // borda neon
            graphicsLayer.lineStyle(2.5, 0x2dd4bf, 0.7);
            graphicsLayer.strokeRect(2,2, BOARD_WIDTH-4, BOARD_HEIGHT-4);
        }

        // Inicialização Phaser e eventos
        window.onload = () => {
            // Cria o jogo Phaser
            gameInstance = new Phaser.Game(BOARD_WIDTH, BOARD_HEIGHT, Phaser.CANVAS, 'gameCanvasContainer', {
                create: function() {
                    graphicsLayer = this.add.graphics(0, 0);
                    redrawBoard();

                    // Input: clique/toque no canvas
                    this.input.onDown.add((pointer) => {
                        // coordenadas relativas ao canvas
                        let canvasElem = this.canvas;
                        let rect = canvasElem.getBoundingClientRect();
                        let scaleX = canvasElem.width / rect.width;
                        let scaleY = canvasElem.height / rect.height;
                        let clickX = (pointer.clientX - rect.left) * scaleX;
                        let clickY = (pointer.clientY - rect.top) * scaleY;
                        let col = Math.floor(clickX / CELL_SIZE);
                        let row = Math.floor(clickY / CELL_SIZE);
                        if(row>=0 && row<GRID_SIZE && col>=0 && col<GRID_SIZE) {
                            tryPlacePiece(row, col);
                        }
                    });
                },
                render: function() {
                    // garantia de redraw se necessário
                }
            });

            // Botões UI
            const cubeBtn = document.getElementById('btnCube');
            const connectorBtn = document.getElementById('btnConnector');
            const resetBtn = document.getElementById('resetGame');

            cubeBtn.addEventListener('click', () => {
                currentPieceType = 'cube';
                cubeBtn.classList.add('active');
                connectorBtn.classList.remove('active');
            });
            connectorBtn.addEventListener('click', () => {
                currentPieceType = 'connector';
                connectorBtn.classList.add('active');
                cubeBtn.classList.remove('active');
            });
            resetBtn.addEventListener('click', () => {
                resetGame();
            });
        };
    })();
</script>
</body>
</html>
