<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Autobiografia dos Muros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: monospace;
            z-index: 100;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        .info {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            color: #ffd966;
            font-size: 12px;
            font-family: monospace;
            z-index: 20;
            pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<div id="game-container"></div>
<div id="loading">
    <div style="text-align:center">🎨 Carregando cidade...</div>
</div>
<div class="info">📱 Toque nos murais | 📖 Autobiografia da Cidade</div>

<script>
    (function() {
        // Nome da sua imagem
        const IMAGEM_USUARIO = 'Muros.jpg';
        
        // Dados dos murais (posições percentuais)
        const muraisData = [
            { id: 0, x: 0.25, y: 0.55, texto: "Os muros são as páginas da autobiografia de uma cidade que muitos insistem em não ler.", autor: "Anônimo", cor: "#e8b45e" },
            { id: 1, x: 0.72, y: 0.68, texto: "Aqui, em 1922, a poesia virou concreto e as paredes aprenderam a gritar.", autor: "Poeta Urbano", cor: "#c44536" },
            { id: 2, x: 0.45, y: 0.28, texto: "Esta praça já foi um rio. As paredes ainda sussurram histórias de água e peixes.", autor: "Memória das Águas", cor: "#3a86a5" },
            { id: 3, x: 0.82, y: 0.22, texto: "O asfalto esqueceu, mas o muro guarda o nome de cada pessoa que passou.", autor: "Caminhante", cor: "#7d5d42" }
        ];
        
        let totalLidos = 0;
        let dialogoAtivo = false;
        
        class CenaPrincipal extends Phaser.Scene {
            constructor() {
                super({ key: 'CenaPrincipal' });
            }
            
            preload() {
                // Tenta carregar a imagem do usuário
                this.load.image('mural_usuario', IMAGEM_USUARIO);
                // Carrega uma imagem simples para os outros murais (usaremos retângulos coloridos)
                // Na verdade, vamos criar texturas via canvas para evitar dependências
            }
            
            create() {
                const { width, height } = this.cameras.main;
                
                // --- Fundo simples (céu gradiente manual) ---
                const graphics = this.add.graphics();
                graphics.fillGradientStyle(0x1a2a40, 0x1a2a40, 0x2c3e5c, 0x2c3e5c, 1);
                graphics.fillRect(0, 0, width, height);
                
                // --- Chão ---
                this.add.rectangle(0, height - 60, width, 60, 0x3e2a2f).setOrigin(0,0);
                // Linhas do chão
                for(let i=0; i<10; i++) {
                    this.add.line(0, height - 60 + i*6, width, height - 60 + i*6, 0xaa8c64).setAlpha(0.4);
                }
                
                // --- Prédios simples ---
                const coresPredios = [0x2c3e50, 0x34495e, 0x4a5b66];
                for(let i=0; i<8; i++) {
                    const w = 45 + Math.random() * 35;
                    const h = 80 + Math.random() * 100;
                    const x = i * 100 + 20;
                    const y = height - 60 - h;
                    const pred = this.add.rectangle(x, y, w, h, coresPredios[i % coresPredios.length]);
                    pred.setStrokeStyle(1, 0xffd966, 0.3);
                    // janelas
                    for(let j=0; j<3; j++) {
                        this.add.rectangle(x + 8 + j*12, y + 15, 5, 8, 0xf1c40f, 0.5);
                    }
                }
                
                // --- Preparar texturas dos murais (fallback) ---
                // Criar texturas coloridas para os murais que não são o principal
                this.criarTexturaColorida('mural_fallback_1', '#2c1e16', '#e07a5f');
                this.criarTexturaColorida('mural_fallback_2', '#1a3b47', '#48cae4');
                this.criarTexturaColorida('mural_fallback_3', '#3e2a2f', '#d4a373');
                
                // Verificar se a imagem do usuário carregou
                let texturaPrincipal = 'mural_usuario';
                if (!this.textures.exists('mural_usuario')) {
                    console.warn("Imagem Muros.jpg não encontrada. Usando fallback.");
                    this.criarTexturaColorida('mural_usuario', '#5a3e2b', '#c49a6c');
                    texturaPrincipal = 'mural_usuario';
                }
                
                // --- Grupo de murais ---
                this.murais = [];
                
                // Função auxiliar para criar um mural
                const criarMural = (data, idx, texturaKey) => {
                    const posX = data.x * width;
                    const posY = data.y * height;
                    const largura = Math.min(180, width * 0.22);
                    const altura = largura * 1.33;
                    
                    const sprite = this.add.image(posX, posY, texturaKey)
                        .setDisplaySize(largura, altura)
                        .setInteractive({ useHandCursor: true, cursor: 'pointer' });
                    
                    sprite.setStrokeStyle(4, Phaser.Display.Color.HexStringToColor(data.cor).color, 0.9);
                    sprite.setShadow(2, 2, '#000000', 0.6);
                    
                    sprite.setData('texto', data.texto);
                    sprite.setData('autor', data.autor);
                    sprite.setData('lido', false);
                    sprite.setData('idx', idx);
                    
                    // Efeito de flutuação
                    this.tweens.add({
                        targets: sprite,
                        y: posY - 5,
                        duration: 2000,
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });
                    
                    // Eventos
                    sprite.on('pointerover', () => {
                        this.tweens.add({ targets: sprite, scaleX: 1.05, scaleY: 1.05, duration: 100 });
                    });
                    sprite.on('pointerout', () => {
                        this.tweens.add({ targets: sprite, scaleX: 1, scaleY: 1, duration: 100 });
                    });
                    sprite.on('pointerdown', () => {
                        if (!dialogoAtivo) this.lerMural(sprite);
                    });
                    
                    this.murais.push(sprite);
                };
                
                // Criar os 4 murais: o primeiro com a imagem do usuário, os outros com fallbacks
                criarMural(muraisData[0], 0, texturaPrincipal);
                criarMural(muraisData[1], 1, 'mural_fallback_1');
                criarMural(muraisData[2], 2, 'mural_fallback_2');
                criarMural(muraisData[3], 3, 'mural_fallback_3');
                
                // --- Contador UI ---
                this.contador = this.add.text(15, 15, `📖 ${totalLidos}/${muraisData.length} lidos`, {
                    fontSize: '16px',
                    fontFamily: 'monospace',
                    fontWeight: 'bold',
                    color: '#f8f3e2',
                    backgroundColor: '#000000aa',
                    padding: { x: 10, y: 5 },
                    borderRadius: 20
                }).setScrollFactor(0);
                
                // --- Remover loading com segurança ---
                const loadingDiv = document.getElementById('loading');
                if (loadingDiv) {
                    loadingDiv.style.opacity = '0';
                    setTimeout(() => loadingDiv.style.display = 'none', 500);
                }
            }
            
            criarTexturaColorida(key, cor1, cor2) {
                if (this.textures.exists(key)) return;
                const canvas = document.createElement('canvas');
                canvas.width = 300;
                canvas.height = 400;
                const ctx = canvas.getContext('2d');
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, cor1);
                grad.addColorStop(1, cor2);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // adiciona textura de pincelada
                ctx.fillStyle = 'rgba(255,245,200,0.3)';
                for(let i=0;i<200;i++) {
                    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
                }
                ctx.strokeStyle = '#ffd966';
                ctx.lineWidth = 6;
                ctx.strokeRect(10, 10, canvas.width-20, canvas.height-20);
                this.textures.addCanvas(key, canvas);
            }
            
            lerMural(mural) {
                const jaLido = mural.getData('lido');
                if (!jaLido) {
                    mural.setData('lido', true);
                    totalLidos++;
                    this.contador.setText(`📖 ${totalLidos}/${muraisData.length} lidos`);
                    
                    // Efeito de vibração (se suportado)
                    if (navigator.vibrate) navigator.vibrate(50);
                    this.cameras.main.shake(80, 0.005);
                    
                    // Efeito de glitter simples
                    const x = mural.x;
                    const y = mural.y;
                    const glitter = this.add.particles(x, y, 'mural_usuario', {
                        speed: { min: -30, max: 30 },
                        angle: { min: 0, max: 360 },
                        scale: { start: 0.2, end: 0 },
                        lifespan: 500,
                        quantity: 6,
                        tint: 0xffcc66
                    });
                    this.time.delayedCall(300, () => glitter.destroy());
                }
                
                this.exibirDialogo(mural.getData('texto'), mural.getData('autor'));
                
                if (totalLidos === muraisData.length) {
                    this.finalEpico();
                }
            }
            
            exibirDialogo(texto, autor) {
                if (dialogoAtivo) return;
                dialogoAtivo = true;
                const { width, height } = this.cameras.main;
                const larg = width * 0.85;
                const alt = 150;
                const xCentro = width/2;
                const yPos = height - 90;
                
                const bg = this.add.rectangle(xCentro, yPos, larg, alt, 0x0a0a14, 0.95)
                    .setStrokeStyle(3, 0xffcc88)
                    .setInteractive();
                
                const txt = this.add.text(xCentro, yPos-10, `“${texto}”`, {
                    fontSize: '15px',
                    fontFamily: 'monospace',
                    color: '#fae6cf',
                    align: 'center',
                    wordWrap: { width: larg - 40 }
                }).setOrigin(0.5);
                
                const autorTxt = this.add.text(xCentro, yPos+35, `— ${autor}`, {
                    fontSize: '13px',
                    fontFamily: 'monospace',
                    color: '#e0b081',
                    fontStyle: 'italic'
                }).setOrigin(0.5);
                
                const closeBtn = this.add.text(xCentro + larg/2 - 30, yPos - alt/2 + 15, '✕', {
                    fontSize: '20px',
                    color: '#fff',
                    backgroundColor: '#aa7744',
                    padding: { x: 8, y: 4 },
                    borderRadius: 30
                }).setInteractive({ useHandCursor: true });
                
                const fechar = () => {
                    bg.destroy();
                    txt.destroy();
                    autorTxt.destroy();
                    closeBtn.destroy();
                    dialogoAtivo = false;
                };
                
                bg.on('pointerdown', fechar);
                closeBtn.on('pointerdown', fechar);
                
                this.time.delayedCall(5000, () => {
                    if (dialogoAtivo) fechar();
                });
            }
            
            finalEpico() {
                const { width, height } = this.cameras.main;
                const msg = this.add.text(width/2, height/2, 
                    "✨ PARABÉNS! ✨\nVocê leu a autobiografia completa da cidade.\nOs muros agora sorriem para você.",
                    { fontSize: '22px', fontFamily: 'monospace', color: '#ffeaac', backgroundColor: '#000000aa', padding: 20, align: 'center', borderRadius: 25 }
                ).setOrigin(0.5).setDepth(20);
                
                // efeito de partículas coloridas
                const particles = this.add.particles(0, 0, 'mural_usuario', {
                    x: { min: 0, max: width },
                    y: { min: 0, max: height },
                    lifespan: 2000,
                    frequency: 30,
                    scale: { start: 0.3, end: 0 },
                    tint: [0xffaa66, 0xff66cc, 0x66ffaa]
                });
                this.time.delayedCall(4500, () => {
                    msg.destroy();
                    particles.destroy();
                });
            }
            
            update() {
                // Ajusta posições dos murais quando a tela redimensionar (mobile)
                const { width, height } = this.cameras.main;
                if (this.murais) {
                    this.murais.forEach((mural, idx) => {
                        const data = muraisData[idx];
                        if (data) {
                            mural.x = data.x * width;
                            mural.y = data.y * height;
                        }
                    });
                }
                if (this.contador) this.contador.setPosition(15, 15);
            }
        }
        
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: window.innerWidth,
            height: window.innerHeight,
            scene: CenaPrincipal,
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            input: { touch: true, activePointers: 1 },
            render: { antialias: true },
            backgroundColor: '#0a0f1e'
        };
        
        window.addEventListener('load', () => {
            new Phaser.Game(config);
            // Fallback para sumir com loading em 2 segundos (caso algo dê erro)
            setTimeout(() => {
                const ld = document.getElementById('loading');
                if (ld && ld.style.display !== 'none') {
                    ld.style.opacity = '0';
                    setTimeout(() => ld.style.display = 'none', 300);
                }
            }, 2000);
        });
        
        // Previne zoom por pinça
        document.addEventListener('touchmove', (e) => {
            if (e.scale && e.scale !== 1) e.preventDefault();
        }, { passive: false });
    })();
</script>
</body>
</html>
