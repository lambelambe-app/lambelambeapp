<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Symbol One - Jogo com Símbolos do Teclado</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 25px 20px 20px 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .game-panel {
            background: #2c3e2f;
            border-radius: 32px;
            padding: 20px;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin: 0 0 15px 0;
            font-size: 1.9rem;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h1 span {
            font-size: 2rem;
            background: none;
            color: #FFD966;
            text-shadow: 0 0 6px #ff9900;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            background-color: #1e2a22;
            border: 3px solid #c9a87b;
            border-radius: 12px;
            overflow: hidden;
            width: min(65vw, 65vh, 550px);
            height: min(65vw, 65vh, 550px);
            margin: 0 auto;
            box-shadow: 0 8px 18px black;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            font-weight: bold;
            font-family: 'Courier New', 'Fira Code', monospace;
            background-color: #fef7e0;
            border: 1px solid #bbaa82;
            cursor: pointer;
            transition: 0.07s linear;
            color: #2c3e2f;
            text-shadow: 0 0 2px white;
        }

        .cell.preset {
            background-color: #e6d5b8;
            color: #3b2a1f;
            font-weight: 800;
            cursor: default;
        }

        .cell.selected {
            background-color: #ffe5a3;
            box-shadow: inset 0 0 0 3px #f39c12, 0 0 0 2px #f1c40f;
            transform: scale(1.01);
            z-index: 2;
            position: relative;
        }

        .cell.highlight {
            background-color: #ffecb3;
        }

        .cell.error {
            background-color: #f8d7da;
            color: #c0392b;
            text-decoration: line-through;
            text-decoration-thickness: 2px;
        }

        .symbol-palette {
            margin-top: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            background: #2b3b2e;
            padding: 15px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .symbol-btn {
            background: #f4e5c2;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            width: 60px;
            height: 60px;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            transition: 0.1s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            color: #2d3e2b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .symbol-btn:hover {
            transform: scale(1.08);
            background: #ffde9c;
        }

        .symbol-btn.active-tool {
            background: #ffb347;
            box-shadow: 0 0 0 3px white, 0 0 0 6px #ff9900;
            color: black;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button.action {
            background: #4a6741;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 22px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-family: 'Segoe UI', monospace;
            transition: 0.1s;
            letter-spacing: 1px;
            box-shadow: 0 2px 6px black;
        }

        button.action:active {
            transform: scale(0.96);
        }

        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #1f2c1bcc;
            border-radius: 30px;
            padding: 8px;
            color: #FFE484;
            backdrop-filter: blur(8px);
        }

        @media (max-width: 550px) {
            .symbol-btn {
                width: 48px;
                height: 48px;
                font-size: 1.6rem;
            }
            .sudoku-grid {
                width: 85vw;
                height: 85vw;
            }
            .cell {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="game-panel">
            <h1>
                <span>⌨️</span> SYMBOL ONE <span>⚙️</span>
            </h1>
            <div class="sudoku-grid" id="sudokuGrid"></div>

            <div class="symbol-palette" id="symbolPalette">
                <!-- símbolos gerados via js -->
            </div>

            <div class="controls">
                <button class="action" id="clearBtn">🗑️ LIMPAR</button>
                <button class="action" id="newGameBtn">🔄 NOVO JOGO</button>
                <button class="action" id="checkBtn">✅ VERIFICAR</button>
            </div>
            <div class="status" id="statusMsg">Clique em uma célula e depois num símbolo</div>
        </div>
    </div>
</div>

<script>
    // ---------- CONJUNTO DE 9 SÍMBOLOS NÃO NUMÉRICOS (TECLADO/SÍMBOLOS) ----------
    const SYMBOLS = ["@", "#", "$", "%", "&", "?", "*", "+", "~"];
    // Mapeamento reverso para checagem
    const SYMBOL_SET = new Set(SYMBOLS);

    // Tamanho do grid
    const SIZE = 9;
    const BOX_SIZE = 3;

    // Estruturas do jogo
    let board = Array(SIZE).fill().map(() => Array(SIZE).fill(""));   // estado atual (preenchido pelo jogador)
    let solution = Array(SIZE).fill().map(() => Array(SIZE).fill("")); // solução completa
    let fixedCells = Array(SIZE).fill().map(() => Array(SIZE).fill(false)); // células pré-definidas (imutáveis)
    
    let selectedRow = -1, selectedCol = -1;
    let currentGameOver = false;
    let gameGridElement = document.getElementById("sudokuGrid");
    let statusDiv = document.getElementById("statusMsg");
    let symbolPalette = document.getElementById("symbolPalette");

    // ---------- FUNÇÕES AUXILIARES DE VALIDAÇÃO DE SUDOKU (COM SÍMBOLOS) ----------
    function isValidPlacement(boardTemp, row, col, symbol) {
        // Verifica linha
        for (let c = 0; c < SIZE; c++) {
            if (c !== col && boardTemp[row][c] === symbol) return false;
        }
        // Verifica coluna
        for (let r = 0; r < SIZE; r++) {
            if (r !== row && boardTemp[r][col] === symbol) return false;
        }
        // Verifica quadrante 3x3
        const startRow = Math.floor(row / BOX_SIZE) * BOX_SIZE;
        const startCol = Math.floor(col / BOX_SIZE) * BOX_SIZE;
        for (let r = startRow; r < startRow + BOX_SIZE; r++) {
            for (let c = startCol; c < startCol + BOX_SIZE; c++) {
                if ((r !== row || c !== col) && boardTemp[r][c] === symbol) return false;
            }
        }
        return true;
    }

    // Algoritmo de backtracking para gerar uma solução completa aleatória (preenche grid)
    function solveSudoku(boardArr) {
        const emptySpot = findEmpty(boardArr);
        if (!emptySpot) return true;
        const [row, col] = emptySpot;
        // Embaralhar símbolos para gerar grids diferentes
        const shuffledSymbols = [...SYMBOLS];
        for (let i = shuffledSymbols.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledSymbols[i], shuffledSymbols[j]] = [shuffledSymbols[j], shuffledSymbols[i]];
        }
        for (let sym of shuffledSymbols) {
            if (isValidPlacement(boardArr, row, col, sym)) {
                boardArr[row][col] = sym;
                if (solveSudoku(boardArr)) return true;
                boardArr[row][col] = "";
            }
        }
        return false;
    }

    function findEmpty(boardArr) {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                if (boardArr[i][j] === "") return [i, j];
            }
        }
        return null;
    }

    // Gera um novo puzzle baseado em solução completa, removendo células conforme dificuldade
    function generateNewPuzzle() {
        // 1. Criar um grid vazio
        let fullSolution = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        // Preencher com backtracking para ter uma solução válida completa
        if (!solveSudoku(fullSolution)) {
            // fallback manual: caso raro de falha, reinicializar com símbolos fixos
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    fullSolution[i][j] = SYMBOLS[(i * 3 + j) % SYMBOLS.length];
                }
            }
            solveSudoku(fullSolution);
        }
        // Copiar solução
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                solution[i][j] = fullSolution[i][j];
            }
        }
        
        // Inicializar board com a solução completa e depois remover células
        let puzzleBoard = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                puzzleBoard[i][j] = solution[i][j];
            }
        }
        
        // Quantidade de células a remover (entre 40 e 55 para desafio médio/difícil)
        const cellsToRemove = 48 + Math.floor(Math.random() * 12); // 48~59 remoções
        let removed = 0;
        while (removed < cellsToRemove) {
            const row = Math.floor(Math.random() * SIZE);
            const col = Math.floor(Math.random() * SIZE);
            if (puzzleBoard[row][col] !== "") {
                puzzleBoard[row][col] = "";
                removed++;
            }
        }
        
        // Atualizar board e fixedCells
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                board[i][j] = puzzleBoard[i][j];
                fixedCells[i][j] = (puzzleBoard[i][j] !== "");
            }
        }
        
        currentGameOver = false;
        selectedRow = -1;
        selectedCol = -1;
        updateStatusMessage("Jogo iniciado! Selecione uma célula e um símbolo.");
        renderGrid();
    }

    // Verifica se o board atual está completamente preenchido e válido (vitória)
    function checkVictory() {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") return false;
                // Verificar se na posição atual, o símbolo é válido considerando o tabuleiro completo
                // Mas podemos fazer checagem de conflito total: se algum símbolo repete na linha/coluna/bloco
                if (!isValidPlacement(board, i, j, val)) {
                    return false;
                }
            }
        }
        return true;
    }
    
    // Atualizar mensagem e verificar vitória
    function updateGameStatus() {
        if (checkVictory()) {
            currentGameOver = true;
            statusDiv.innerHTML = "🎉✨ VITÓRIA! ✨🎉  Você completou todos os símbolos!";
            statusDiv.style.color = "#f9e45b";
            statusDiv.style.fontSize = "1.3rem";
            renderGrid(); // re-render para possivelmente desabilitar interações extras? mas manterá.
        } else {
            statusDiv.style.color = "#FFE484";
            statusDiv.style.fontSize = "1.2rem";
            if (!currentGameOver) statusDiv.innerHTML = "📌 Jogo em andamento. Clique célula + símbolo.";
        }
    }
    
    function updateStatusMessage(msg) {
        if (!currentGameOver) statusDiv.innerHTML = msg;
        else statusDiv.innerHTML = "🎉 Vitória! Clique em 'Novo Jogo' para continuar desafiando! 🎉";
    }

    // Colocar símbolo na célula selecionada
    function placeSymbol(symbol) {
        if (currentGameOver) {
            updateStatusMessage("Jogo finalizado! Clique em NOVO JOGO.");
            return;
        }
        if (selectedRow === -1 || selectedCol === -1) {
            updateStatusMessage("Primeiro, clique em uma célula vazia ou editável.");
            return;
        }
        const row = selectedRow;
        const col = selectedCol;
        if (fixedCells[row][col]) {
            updateStatusMessage(`Célula fixa (${board[row][col]}) não pode ser alterada.`);
            return;
        }
        
        // Colocar símbolo
        board[row][col] = symbol;
        
        // Verificar se isso viola regras para feedback visual
        const isValidMove = isValidPlacement(board, row, col, symbol);
        if (!isValidMove) {
            // Não impede o jogador, mas mostra aviso de conflito (estilo de erro visual)
            updateStatusMessage(`⚠️ Conflito! O símbolo ${symbol} está em conflito na linha/coluna/bloco.`);
        } else {
            updateStatusMessage(`Símbolo ${symbol} inserido na posição (${row+1},${col+1})`);
        }
        
        // Checar vitória depois da jogada
        renderGrid();
        if (checkVictory()) {
            updateGameStatus();
            renderGrid(); // para aplicar estilo de vitória
        } else {
            // apenas manter
        }
    }
    
    // Limpar célula selecionada (remover símbolo)
    function clearSelectedCell() {
        if (currentGameOver) {
            updateStatusMessage("Jogo já vencido, inicie um novo!");
            return;
        }
        if (selectedRow === -1 || selectedCol === -1) {
            updateStatusMessage("Selecione uma célula para limpar.");
            return;
        }
        if (fixedCells[selectedRow][selectedCol]) {
            updateStatusMessage("Célula fixa original não pode ser limpa!");
            return;
        }
        if (board[selectedRow][selectedCol] !== "") {
            board[selectedRow][selectedCol] = "";
            updateStatusMessage(`Célula (${selectedRow+1},${selectedCol+1}) limpa.`);
            renderGrid();
            if (checkVictory()) updateGameStatus();
        } else {
            updateStatusMessage("Célula já está vazia.");
        }
    }
    
    // renderização completa do grid com highlights e erros
    function renderGrid() {
        gameGridElement.innerHTML = "";
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const cellValue = board[i][j];
                const isFixed = fixedCells[i][j];
                const isSelected = (selectedRow === i && selectedCol === j);
                // Detectar se célula tem conflito (para dar borda de erro)
                let hasConflict = false;
                if (cellValue !== "") {
                    // Teste temporário de conflito
                    if (!isValidPlacement(board, i, j, cellValue)) {
                        hasConflict = true;
                    }
                }
                
                const cellDiv = document.createElement("div");
                cellDiv.className = "cell";
                if (isFixed) cellDiv.classList.add("preset");
                if (isSelected) cellDiv.classList.add("selected");
                if (hasConflict && !isFixed && cellValue !== "") cellDiv.classList.add("error");
                // adicional highlight para linha/coluna da selecionada
                if (selectedRow !== -1 && selectedCol !== -1) {
                    if (i === selectedRow || j === selectedCol) {
                        if (!isSelected) cellDiv.style.backgroundColor = "#faf0cf";
                    }
                    // também destaque do bloco 3x3 do selecionado
                    const sRowBlock = Math.floor(selectedRow / BOX_SIZE) * BOX_SIZE;
                    const sColBlock = Math.floor(selectedCol / BOX_SIZE) * BOX_SIZE;
                    if (i >= sRowBlock && i < sRowBlock+BOX_SIZE && j >= sColBlock && j < sColBlock+BOX_SIZE) {
                        if (!isSelected && !(i === selectedRow || j === selectedCol)) {
                            cellDiv.style.backgroundColor = "#efe0bd";
                        }
                    }
                }
                
                cellDiv.textContent = cellValue === "" ? "·" : cellValue;
                if (cellValue === "") cellDiv.style.color = "#8b7a5b";
                else cellDiv.style.fontWeight = "bold";
                
                cellDiv.addEventListener("click", (function(row, col) {
                    return function() {
                        if (currentGameOver) {
                            updateStatusMessage("Jogo concluído! Comece uma nova partida.");
                            return;
                        }
                        // Se for célula fixa, não selecionamos para edição? podemos permitir selecionar mas não editar
                        if (fixedCells[row][col]) {
                            selectedRow = row;
                            selectedCol = col;
                            updateStatusMessage(`Célula fixa: ${board[row][col]} (não editável)`);
                            renderGrid();
                        } else {
                            selectedRow = row;
                            selectedCol = col;
                            updateStatusMessage(`Célula (${row+1},${col+1}) selecionada. Clique num símbolo para inserir.`);
                            renderGrid();
                        }
                    };
                })(i, j));
                
                gameGridElement.appendChild(cellDiv);
            }
        }
        // Após render, se vitória, aplica efeito visual extra
        if (currentGameOver) {
            statusDiv.innerHTML = "🏆 VITÓRIA ABSOLUTA! Parabéns! 🏆";
        }
    }
    
    // Cria a paleta de símbolos interativos
    function buildSymbolPalette() {
        symbolPalette.innerHTML = "";
        SYMBOLS.forEach(sym => {
            const btn = document.createElement("button");
            btn.textContent = sym;
            btn.classList.add("symbol-btn");
            btn.addEventListener("click", () => {
                if (currentGameOver) {
                    updateStatusMessage("O jogo já acabou. Clique em NOVO JOGO para continuar.");
                    return;
                }
                placeSymbol(sym);
                // efeito visual de clique ativo temporário
                btn.classList.add("active-tool");
                setTimeout(() => btn.classList.remove("active-tool"), 200);
            });
            symbolPalette.appendChild(btn);
        });
        // botão de apagar célula na paleta? já temos no controle, mas pode adicionar ícone de borracha
        const eraseBtn = document.createElement("button");
        eraseBtn.textContent = "⌫";
        eraseBtn.classList.add("symbol-btn");
        eraseBtn.style.background = "#c9ab85";
        eraseBtn.addEventListener("click", () => {
            clearSelectedCell();
        });
        symbolPalette.appendChild(eraseBtn);
    }
    
    // Reiniciar novo jogo
    function newGame() {
        generateNewPuzzle();
        selectedRow = -1;
        selectedCol = -1;
        currentGameOver = false;
        renderGrid();
        updateStatusMessage("Novo desafio gerado! Use os símbolos para preencher.");
    }
    
    // Verificar se há conflitos e destacar células problemáticas (modo verificação)
    function checkBoardAndHighlightErrors() {
        if (currentGameOver) {
            updateStatusMessage("Já venceu! Reinicie para testar outro.");
            return;
        }
        let hasAnyEmpty = false;
        let conflictCount = 0;
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") hasAnyEmpty = true;
                else if (!isValidPlacement(board, i, j, val)) {
                    conflictCount++;
                }
            }
        }
        if (conflictCount === 0 && !hasAnyEmpty) {
            statusDiv.innerHTML = "🎉✨ Perfeito! Você completou corretamente! Vitória! ✨🎉";
            currentGameOver = true;
            renderGrid();
        } else if (conflictCount === 0 && hasAnyEmpty) {
            statusDiv.innerHTML = "✅ Nenhum conflito encontrado! Continue preenchendo as células vazias.";
        } else {
            statusDiv.innerHTML = `⚠️ Atenção: ${conflictCount} células em conflito! (linha/coluna/bloco repetido) ⚠️`;
        }
        renderGrid(); // atualiza células com classe .error
    }
    
    // Event listeners e inicialização
    document.getElementById("newGameBtn").addEventListener("click", () => {
        newGame();
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
        clearSelectedCell();
    });
    document.getElementById("checkBtn").addEventListener("click", () => {
        checkBoardAndHighlightErrors();
    });
    
    function init() {
        buildSymbolPalette();
        generateNewPuzzle();
        renderGrid();
    }
    
    init();
</script>
</body>
</html>
