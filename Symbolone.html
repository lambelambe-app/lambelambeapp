<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="rating" content="General">
    <meta name="audience" content="Everyone">
    <meta name="child-directed" content="true">
    <meta name="max-ad-content-rating" content="G">
    <title>Symbolum - Sudoku de Símbolos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px 12px;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
        }

        .game-panel {
            background: #ffffff;
            border-radius: 40px;
            padding: 16px 10px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: #2c3e2f;
            margin-bottom: 6px;
        }

        .status-area {
            background: #f8f9fa;
            border-radius: 50px;
            padding: 6px 12px;
            margin: 4px 0 14px 0;
            text-align: center;
        }

        .status {
            font-size: 0.8rem;
            font-weight: 600;
            color: #2c3e2f;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            background-color: #dee2e6;
            gap: 1px;
            width: 100%;
            aspect-ratio: 1 / 1;
            margin: 0 auto 16px auto;
            border-radius: 16px;
            overflow: hidden;
            outline: none;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.85rem, 4.5vw, 1.3rem);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            background: #ffffff;
            color: #2c3e2f;
            cursor: pointer;
            transition: all 0.05s ease;
        }

        .cell.preset {
            background: #f1f0e8;
            color: #5a3e1b;
        }

        .cell.selected {
            background: #ffe0a3;
            box-shadow: inset 0 0 0 2px #f39c12;
        }

        .cell.error {
            background: #ffe0e0;
            color: #c0392b;
            text-decoration: line-through;
        }

        .symbol-palette {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin: 8px 0 18px 0;
            flex-wrap: nowrap;
        }

        .symbol-btn {
            background: #f0f2f5;
            border: 1px solid #e0e4e8;
            font-size: 1.1rem;
            font-weight: bold;
            width: 38px;
            height: 38px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            color: #2c3e2f;
            box-shadow: 0 2px 0 #d0d4d8;
            transition: 0.05s linear;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            touch-action: manipulation;
        }

        .symbol-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #d0d4d8;
        }

        .symbol-btn.active-tool {
            background: #ffb347;
            border-color: #ff9f1c;
            color: white;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: nowrap;
            margin-top: 4px;
        }

        button.action {
            background: #4a6741;
            border: none;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 36px;
            color: white;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            transition: 0.1s;
            box-shadow: 0 2px 0 #2c3e2f;
            flex: 1;
            text-align: center;
            white-space: nowrap;
        }

        button.action:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #2c3e2f;
        }

        #clearBtn {
            background: #8b5a2b;
            box-shadow: 0 2px 0 #5a3a1a;
        }

        .confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .symbol-confetti {
            position: absolute;
            font-size: 0.9rem;
            font-weight: bold;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 520px) {
            .symbol-btn { width: 34px; height: 34px; font-size: 0.95rem; }
            .controls { gap: 8px; }
            button.action { padding: 6px 10px; font-size: 0.7rem; }
            h1 { font-size: 1.7rem; }
        }

        @media (max-width: 450px) {
            .symbol-btn { width: 30px; height: 30px; font-size: 0.85rem; }
            .symbol-palette { gap: 3px; }
        }

        /* Acessibilidade: foco visível para teclado */
        .cell:focus-visible, .symbol-btn:focus-visible, button.action:focus-visible {
            outline: 3px solid #f39c12;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <h1>SYMBOLUM</h1>
        <div class="status-area">
            <div class="status" id="statusMsg" role="status" aria-live="polite">✨ Toque numa célula e num símbolo ✨</div>
        </div>
        <div class="sudoku-grid" id="sudokuGrid" role="grid" aria-label="Tabuleiro Sudoku de símbolos"></div>
        <div class="symbol-palette" id="symbolPalette" role="toolbar" aria-label="Paleta de símbolos"></div>
        <div class="controls">
            <button class="action" id="clearBtn" aria-label="Limpar célula selecionada">🗑️ LIMPAR</button>
            <button class="action" id="newGameBtn" aria-label="Novo jogo">🔄 NOVO</button>
            <button class="action" id="checkBtn" aria-label="Verificar conflitos">✅ CHECAR</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== CONFIGURAÇÃO DE SEGURANÇA ==========
        window.google_tag_for_child_directed_treatment = 1;
        window.google_max_ad_content_rating = "G";
        window.SYMBOLUM_CHILD_SAFE = true;

        // ========== CONSTANTES ==========
        const SYMBOLS = ["@", "#", "$", "%", "&", "?", "*", "+", "~"];
        const SIZE = 9;
        const BOX_SIZE = 3;
        
        // ========== ESTADO PRIVADO ==========
        let board = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        let fixed = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
        let selectedRow = -1, selectedCol = -1;
        let gameOver = false;
        
        // Elementos DOM
        const gridContainer = document.getElementById("sudokuGrid");
        const statusDiv = document.getElementById("statusMsg");
        const paletteDiv = document.getElementById("symbolPalette");
        
        // ========== FUNÇÕES AUXILIARES (VALIDAÇÃO) ==========
        function isValidPlacement(boardTemp, row, col, symbol) {
            // Linha
            for (let c = 0; c < SIZE; c++) {
                if (c !== col && boardTemp[row][c] === symbol) return false;
            }
            // Coluna
            for (let r = 0; r < SIZE; r++) {
                if (r !== row && boardTemp[r][col] === symbol) return false;
            }
            // Bloco 3x3
            const startRow = Math.floor(row / BOX_SIZE) * BOX_SIZE;
            const startCol = Math.floor(col / BOX_SIZE) * BOX_SIZE;
            for (let r = startRow; r < startRow + BOX_SIZE; r++) {
                for (let c = startCol; c < startCol + BOX_SIZE; c++) {
                    if ((r !== row || c !== col) && boardTemp[r][c] === symbol) return false;
                }
            }
            return true;
        }
        
        function isBoardComplete() {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    const val = board[i][j];
                    if (val === "") return false;
                    if (!isValidPlacement(board, i, j, val)) return false;
                }
            }
            return true;
        }
        
        // ========== GERADOR DE PUZZLE COM SOLUÇÃO ÚNICA ==========
        // Algoritmo: gera solução completa via backtracking, depois remove células simetricamente
        function solveFull(boardArr) {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (boardArr[i][j] === "") {
                        const shuffled = [...SYMBOLS];
                        for (let k = shuffled.length - 1; k > 0; k--) {
                            const l = Math.floor(Math.random() * (k + 1));
                            [shuffled[k], shuffled[l]] = [shuffled[l], shuffled[k]];
                        }
                        for (let sym of shuffled) {
                            if (isValidPlacement(boardArr, i, j, sym)) {
                                boardArr[i][j] = sym;
                                if (solveFull(boardArr)) return true;
                                boardArr[i][j] = "";
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }
        
        function countSolutions(boardArr, limit = 2) {
            let solutions = 0;
            function backtrack() {
                if (solutions >= limit) return;
                for (let i = 0; i < SIZE; i++) {
                    for (let j = 0; j < SIZE; j++) {
                        if (boardArr[i][j] === "") {
                            for (let sym of SYMBOLS) {
                                if (isValidPlacement(boardArr, i, j, sym)) {
                                    boardArr[i][j] = sym;
                                    backtrack();
                                    boardArr[i][j] = "";
                                    if (solutions >= limit) return;
                                }
                            }
                            return;
                        }
                    }
                }
                solutions++;
            }
            backtrack();
            return solutions;
        }
        
        function generateUniquePuzzle() {
            // 1. Gerar solução completa aleatória
            let full = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
            if (!solveFull(full)) {
                // Fallback extremamente raro: preencher com padrão e resolver
                for (let i = 0; i < SIZE; i++)
                    for (let j = 0; j < SIZE; j++)
                        full[i][j] = SYMBOLS[(i * 3 + j) % SYMBOLS.length];
                solveFull(full);
            }
            
            // 2. Copiar para o puzzle e remover células simetricamente
            let puzzle = full.map(row => [...row]);
            const totalCells = SIZE * SIZE;
            const targetRemoved = 48 + Math.floor(Math.random() * 12); // entre 48 e 59 removidos
            let removed = 0;
            // Lista de posições em ordem aleatória
            let positions = [];
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE; j++)
                    positions.push([i, j]);
            for (let i = positions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [positions[i], positions[j]] = [positions[j], positions[i]];
            }
            
            for (let [r, c] of positions) {
                if (removed >= targetRemoved) break;
                const backup = puzzle[r][c];
                puzzle[r][c] = "";
                // Verifica se ainda tem solução única
                const testBoard = puzzle.map(row => [...row]);
                const solCount = countSolutions(testBoard, 2);
                if (solCount !== 1) {
                    puzzle[r][c] = backup; // recoloca
                } else {
                    removed++;
                }
            }
            
            return { puzzle, solution: full };
        }
        
        function newPuzzle() {
            const { puzzle, solution: sol } = generateUniquePuzzle();
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    board[i][j] = puzzle[i][j];
                    fixed[i][j] = (puzzle[i][j] !== "");
                }
            }
            gameOver = false;
            selectedRow = -1;
            selectedCol = -1;
            updateStatus("🎲 Novo desafio! Escolha uma célula.");
            renderGrid();
        }
        
        // ========== CONFETES ==========
        function launchConfetti() {
            const old = document.querySelector('.confetti-canvas');
            if (old) old.remove();
            const container = document.createElement('div');
            container.className = 'confetti-canvas';
            document.body.appendChild(container);
            for (let i = 0; i < 70; i++) {
                const sym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                const el = document.createElement('div');
                el.className = 'symbol-confetti';
                el.textContent = sym;
                el.style.fontSize = (0.7 + Math.random() * 1) + 'rem';
                el.style.left = Math.random() * 100 + '%';
                el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                el.style.animationDelay = (Math.random() * 0.5) + 's';
                el.style.color = `hsl(${Math.random() * 360}, 85%, 65%)`;
                container.appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }
            setTimeout(() => container.remove(), 4500);
        }
        
        // ========== INTERFACE E ATUALIZAÇÕES ==========
        function updateStatus(msg) {
            if (!gameOver) statusDiv.textContent = msg;
            else statusDiv.textContent = "🏆 Vitória! Clique em NOVO.";
            statusDiv.style.color = "#2c3e2f";
        }
        
        function renderGrid() {
            gridContainer.innerHTML = "";
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    const val = board[i][j];
                    const isFixed = fixed[i][j];
                    const isSelected = (selectedRow === i && selectedCol === j);
                    let hasError = false;
                    if (val !== "" && !isValidPlacement(board, i, j, val)) hasError = true;
                    
                    const cell = document.createElement("div");
                    cell.className = "cell";
                    if (isFixed) cell.classList.add("preset");
                    if (isSelected) cell.classList.add("selected");
                    if (hasError && !isFixed) cell.classList.add("error");
                    
                    // Destaques de linha/coluna/bloco
                    if (selectedRow !== -1 && selectedCol !== -1 && !isSelected) {
                        if (i === selectedRow || j === selectedCol) cell.style.backgroundColor = "#fef9e6";
                        const br = Math.floor(selectedRow / 3) * 3;
                        const bc = Math.floor(selectedCol / 3) * 3;
                        if (i >= br && i < br+3 && j >= bc && j < bc+3) cell.style.backgroundColor = "#faf5e0";
                    }
                    
                    cell.textContent = val === "" ? "·" : val;
                    if (val === "") cell.style.color = "#8b7a5b";
                    
                    cell.setAttribute("role", "gridcell");
                    cell.setAttribute("aria-label", `Linha ${i+1}, coluna ${j+1}: ${val === "" ? "vazio" : val}`);
                    cell.tabIndex = (isSelected) ? 0 : -1;
                    
                    cell.addEventListener("click", (function(row, col) {
                        return () => {
                            if (gameOver) { updateStatus("Jogo encerrado. NOVO jogo."); return; }
                            if (fixed[row][col]) {
                                selectedRow = row; selectedCol = col;
                                updateStatus(`🔷 Célula fixa: ${board[row][col]}`);
                            } else {
                                selectedRow = row; selectedCol = col;
                                updateStatus("🎯 Célula selecionada. Toque num símbolo.");
                            }
                            renderGrid();
                            // Foco para acessibilidade
                            const focusedCell = document.querySelector(`.cell.selected`);
                            if (focusedCell) focusedCell.focus();
                        };
                    })(i, j));
                    
                    gridContainer.appendChild(cell);
                }
            }
            if (gameOver) statusDiv.textContent = "🏆 VITÓRIA! Parabéns! 🏆";
        }
        
        function placeSymbol(symbol) {
            if (gameOver) { updateStatus("Jogo finalizado! Comece um novo."); return; }
            if (selectedRow === -1 || selectedCol === -1) { updateStatus("🔍 Primeiro, toque numa célula."); return; }
            const row = selectedRow, col = selectedCol;
            if (fixed[row][col]) { updateStatus("🔒 Célula fixa!"); return; }
            
            board[row][col] = symbol;
            const ok = isValidPlacement(board, row, col, symbol);
            updateStatus(ok ? `✅ ${symbol} inserido!` : `⚠️ Conflito! ${symbol} inválido.`);
            renderGrid();
            
            if (isBoardComplete()) {
                gameOver = true;
                statusDiv.textContent = "🎉✨ VITÓRIA! ✨🎉";
                launchConfetti();
                renderGrid();
            }
        }
        
        function clearSelected() {
            if (gameOver) { updateStatus("Jogo vencido, inicie novo."); return; }
            if (selectedRow === -1 || selectedCol === -1) { updateStatus("Selecione uma célula."); return; }
            if (fixed[selectedRow][selectedCol]) { updateStatus("Célula fixa não pode ser limpa!"); return; }
            if (board[selectedRow][selectedCol] !== "") {
                board[selectedRow][selectedCol] = "";
                updateStatus("🧹 Célula limpa.");
                renderGrid();
                if (isBoardComplete()) {
                    gameOver = true;
                    statusDiv.textContent = "🎉✨ VITÓRIA! ✨🎉";
                    launchConfetti();
                    renderGrid();
                }
            } else {
                updateStatus("Célula já vazia.");
            }
        }
        
        function checkBoard() {
            if (gameOver) { updateStatus("Já venceu! Comece um novo."); return; }
            let empty = false, conflicts = 0;
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    const v = board[i][j];
                    if (v === "") empty = true;
                    else if (!isValidPlacement(board, i, j, v)) conflicts++;
                }
            }
            if (conflicts === 0 && !empty) {
                statusDiv.textContent = "🎉✨ PERFEITO! VITÓRIA! ✨🎉";
                gameOver = true;
                launchConfetti();
                renderGrid();
            } else if (conflicts === 0 && empty) {
                statusDiv.textContent = "✅ Nenhum conflito! Continue preenchendo.";
            } else {
                statusDiv.textContent = `⚠️ ${conflicts} célula(s) em conflito!`;
            }
            renderGrid();
        }
        
        function buildPalette() {
            paletteDiv.innerHTML = "";
            SYMBOLS.forEach(sym => {
                const btn = document.createElement("button");
                btn.textContent = sym;
                btn.className = "symbol-btn";
                btn.setAttribute("aria-label", `Inserir símbolo ${sym}`);
                btn.addEventListener("click", () => {
                    if (gameOver) { updateStatus("Partida encerrada. NOVO jogo."); return; }
                    placeSymbol(sym);
                    btn.classList.add("active-tool");
                    setTimeout(() => btn.classList.remove("active-tool"), 150);
                });
                paletteDiv.appendChild(btn);
            });
            const erase = document.createElement("button");
            erase.textContent = "⌫";
            erase.className = "symbol-btn";
            erase.setAttribute("aria-label", "Apagar símbolo da célula selecionada");
            erase.addEventListener("click", () => clearSelected());
            paletteDiv.appendChild(erase);
        }
        
        function newGame() {
            newPuzzle();
            selectedRow = -1;
            selectedCol = -1;
            gameOver = false;
            renderGrid();
            updateStatus("✨ Novo jogo! Divirta-se.");
        }
        
        // ========== INICIALIZAÇÃO ==========
        function init() {
            buildPalette();
            newPuzzle();
            renderGrid();
            // Atalhos de teclado (opcional)
            window.addEventListener("keydown", (e) => {
                if (gameOver) return;
                const key = e.key;
                if (SYMBOLS.includes(key)) {
                    placeSymbol(key);
                    e.preventDefault();
                } else if (key === "Delete" || key === "Backspace") {
                    clearSelected();
                    e.preventDefault();
                }
            });
        }
        
        // Conectar botões
        document.getElementById("newGameBtn").addEventListener("click", newGame);
        document.getElementById("clearBtn").addEventListener("click", clearSelected);
        document.getElementById("checkBtn").addEventListener("click", checkBoard);
        
        init();
    })();
</script>
</body>
</html>
