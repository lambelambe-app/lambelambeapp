<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <!-- Metadados de segurança para crianças (mantidos) -->
    <meta name="rating" content="General">
    <meta name="distribution" content="Global">
    <meta name="audience" content="Everyone">
    <meta name="content-language" content="pt-br">
    <meta name="googlebot" content="index, follow">
    <meta name="age-rating" content="General Audiences">
    <meta name="category" content="Puzzle Game">
    <meta name="suitable-for-children" content="yes">
    <meta name="child-directed" content="true">
    <meta name="max-ad-content-rating" content="G">
    
    <title>Symbolum - Sudoku de Símbolos</title>
    
    <!-- Google Fonts para tipografia moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* FUNDO BRANCO TOTAL */
        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* alinhar no topo */
            padding: 20px 16px;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Container principal */
        .game-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: transparent;
        }

        /* Painel do jogo - sem fundo escuro, apenas leve elevação */
        .game-panel {
            background: #ffffff;
            border-radius: 48px;
            padding: 20px 16px 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #f0f0f0;
        }

        /* Título moderno, sem ícones, com cor escura */
        h1 {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #2c3e2f;
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            text-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        /* Área de status – agora no topo, perto do título */
        .status-area {
            background: #f8f9fa;
            border-radius: 60px;
            padding: 12px 20px;
            margin: 8px 0 20px 0;
            text-align: center;
            border: 1px solid #e9ecef;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .status {
            font-size: 0.95rem;
            font-weight: 600;
            color: #2c3e2f;
            letter-spacing: 0.3px;
        }

        /* Grid do Sudoku – sem borda externa, leve arredondamento */
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            background-color: #dee2e6;
            gap: 1px;
            width: 100%;
            aspect-ratio: 1 / 1;
            margin: 0 auto 24px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1rem, 5.5vw, 1.8rem);
            font-weight: 600;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: #ffffff;
            color: #2c3e2f;
            transition: all 0.08s linear;
            cursor: pointer;
            border-radius: 4px;
        }

        /* células pré-definidas (fixas) */
        .cell.preset {
            background: #f1f0e8;
            color: #5a3e1b;
            font-weight: 700;
        }

        .cell.selected {
            background: #ffe0a3;
            box-shadow: inset 0 0 0 3px #f39c12;
            color: #2c3e2f;
            transform: scale(0.98);
        }

        .cell.error {
            background: #ffe0e0;
            color: #c0392b;
            text-decoration: line-through;
            font-weight: bold;
        }

        /* Destaques de linha/coluna e bloco quando célula selecionada */
        .cell.highlight-row-col {
            background-color: #fef9e6;
        }
        .cell.highlight-block {
            background-color: #faf5e0;
        }

        /* Paleta de símbolos – design moderno claro */
        .symbol-palette {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0 16px;
        }

        .symbol-btn {
            background: #f0f2f5;
            border: 1px solid #e0e4e8;
            font-size: 1.6rem;
            font-weight: bold;
            width: 58px;
            height: 58px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            color: #2c3e2f;
            box-shadow: 0 3px 0 #d0d4d8;
            transition: all 0.08s linear;
            touch-action: manipulation;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .symbol-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #d0d4d8;
        }

        .symbol-btn.active-tool {
            background: #ffb347;
            border-color: #ff9f1c;
            color: white;
            box-shadow: 0 2px 0 #e07c00;
            transform: translateY(1px);
        }

        /* Botões de ação */
        .controls {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        button.action {
            background: #4a6741;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            transition: 0.1s;
            box-shadow: 0 4px 0 #2c3e2f;
        }

        button.action:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2c3e2f;
        }

        /* Botão de limpar diferenciado */
        #clearBtn {
            background: #8b5a2b;
            box-shadow: 0 4px 0 #5a3a1a;
        }

        /* Efeito de confete mantido */
        .confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .symbol-confetti {
            position: absolute;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            opacity: 0.9;
            animation: fall linear forwards;
            pointer-events: none;
            filter: drop-shadow(0 0 2px gold);
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Responsividade */
        @media (max-width: 500px) {
            .game-panel {
                padding: 16px 12px 20px;
            }
            .symbol-btn {
                width: 48px;
                height: 48px;
                font-size: 1.4rem;
            }
            button.action {
                padding: 8px 18px;
                font-size: 0.8rem;
            }
            h1 {
                font-size: 2.2rem;
            }
            .status {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="game-panel">
        <h1>SYMBOLUM</h1>
        
        <!-- Área de status movida para o topo (logo abaixo do título) -->
        <div class="status-area">
            <div class="status" id="statusMsg">✨ Toque numa célula e depois num símbolo ✨</div>
        </div>
        
        <div class="sudoku-grid" id="sudokuGrid"></div>
        
        <div class="symbol-palette" id="symbolPalette"></div>
        
        <div class="controls">
            <button class="action" id="clearBtn">🗑️ LIMPAR</button>
            <button class="action" id="newGameBtn">🔄 NOVO JOGO</button>
            <button class="action" id="checkBtn">✅ VERIFICAR</button>
        </div>
    </div>
</div>

<script>
    // Configuração de segurança para crianças (mantida)
    (function() {
        window.google_tag_for_child_directed_treatment = 1;
        window.google_tag_for_under_age_of_consent = 1;
        window.google_max_ad_content_rating = "G";
        if (typeof googletag !== 'undefined' && googletag.pubads) {
            try {
                googletag.pubads().setTagForChildDirectedTreatment(1);
                googletag.pubads().setMaxAdContentRating('G');
                googletag.pubads().setRequestNonPersonalizedAds(1);
            } catch(e) {}
        }
        window.__tcfapi = window.__tcfapi || function() {};
        window.__cmp = window.__cmp || function() {};
        window.SYMBOLUM_CHILD_SAFE = true;
        window.SYMBOLUM_AGE_RATING = "G";
        window.SYMBOLUM_CONTENT_RATING = "General";
        window.SYMBOLUM_AD_RESTRICTIONS = {
            maxRating: "G",
            noPersonalizedAds: true,
            coppaCompliant: true,
            gdprCompliant: true
        };
        console.log("[Symbolum] Modo seguro ativado.");
    })();

    // ---------- JOGO SYMBOLUM ----------
    const SYMBOLS = ["@", "#", "$", "%", "&", "?", "*", "+", "~"];
    const SIZE = 9;
    const BOX_SIZE = 3;

    let board = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    let solution = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    let fixedCells = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
    
    let selectedRow = -1, selectedCol = -1;
    let currentGameOver = false;
    let gameGridElement = document.getElementById("sudokuGrid");
    let statusDiv = document.getElementById("statusMsg");

    // Funções auxiliares (mesma lógica original)
    function isValidPlacement(boardTemp, row, col, symbol) {
        for (let c = 0; c < SIZE; c++) {
            if (c !== col && boardTemp[row][c] === symbol) return false;
        }
        for (let r = 0; r < SIZE; r++) {
            if (r !== row && boardTemp[r][col] === symbol) return false;
        }
        const startRow = Math.floor(row / BOX_SIZE) * BOX_SIZE;
        const startCol = Math.floor(col / BOX_SIZE) * BOX_SIZE;
        for (let r = startRow; r < startRow + BOX_SIZE; r++) {
            for (let c = startCol; c < startCol + BOX_SIZE; c++) {
                if ((r !== row || c !== col) && boardTemp[r][c] === symbol) return false;
            }
        }
        return true;
    }

    function findEmpty(boardArr) {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                if (boardArr[i][j] === "") return [i, j];
            }
        }
        return null;
    }

    function solveSudoku(boardArr) {
        const emptySpot = findEmpty(boardArr);
        if (!emptySpot) return true;
        const [row, col] = emptySpot;
        const shuffledSymbols = [...SYMBOLS];
        for (let i = shuffledSymbols.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledSymbols[i], shuffledSymbols[j]] = [shuffledSymbols[j], shuffledSymbols[i]];
        }
        for (let sym of shuffledSymbols) {
            if (isValidPlacement(boardArr, row, col, sym)) {
                boardArr[row][col] = sym;
                if (solveSudoku(boardArr)) return true;
                boardArr[row][col] = "";
            }
        }
        return false;
    }

    function generateNewPuzzle() {
        let fullSolution = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        if (!solveSudoku(fullSolution)) {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    fullSolution[i][j] = SYMBOLS[(i * 3 + j) % SYMBOLS.length];
                }
            }
            solveSudoku(fullSolution);
        }
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                solution[i][j] = fullSolution[i][j];
            }
        }
        
        let puzzleBoard = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                puzzleBoard[i][j] = solution[i][j];
            }
        }
        
        const cellsToRemove = 48 + Math.floor(Math.random() * 12);
        let removed = 0;
        while (removed < cellsToRemove) {
            const row = Math.floor(Math.random() * SIZE);
            const col = Math.floor(Math.random() * SIZE);
            if (puzzleBoard[row][col] !== "") {
                puzzleBoard[row][col] = "";
                removed++;
            }
        }
        
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                board[i][j] = puzzleBoard[i][j];
                fixedCells[i][j] = (puzzleBoard[i][j] !== "");
            }
        }
        
        currentGameOver = false;
        selectedRow = -1;
        selectedCol = -1;
        updateStatusMessage("🎲 Novo desafio! Escolha uma célula.");
        renderGrid();
    }

    function checkVictory() {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") return false;
                if (!isValidPlacement(board, i, j, val)) return false;
            }
        }
        return true;
    }
    
    function launchSymbolConfetti() {
        const existingCanvas = document.querySelector('.confetti-canvas');
        if (existingCanvas) existingCanvas.remove();
        
        const container = document.createElement('div');
        container.className = 'confetti-canvas';
        document.body.appendChild(container);
        
        const symbols = [...SYMBOLS];
        const numberOfConfetti = 80;
        
        for (let i = 0; i < numberOfConfetti; i++) {
            const symbol = symbols[Math.floor(Math.random() * symbols.length)];
            const el = document.createElement('div');
            el.className = 'symbol-confetti';
            el.textContent = symbol;
            
            const size = 0.9 + Math.random() * 1.3;
            const left = Math.random() * 100;
            const duration = 2 + Math.random() * 2.5;
            const delay = Math.random() * 0.6;
            const rotateStart = Math.random() * 360;
            
            el.style.fontSize = `${size}rem`;
            el.style.left = `${left}%`;
            el.style.animationDuration = `${duration}s`;
            el.style.animationDelay = `${delay}s`;
            el.style.transform = `rotate(${rotateStart}deg)`;
            el.style.position = 'absolute';
            el.style.top = '-10vh';
            
            const hue = Math.random() * 360;
            el.style.color = `hsl(${hue}, 85%, 65%)`;
            el.style.textShadow = `0 0 4px hsl(${hue}, 100%, 50%)`;
            
            container.appendChild(el);
            
            setTimeout(() => {
                if (el.parentNode) el.remove();
            }, (duration + delay) * 1000);
        }
        
        setTimeout(() => {
            if (container.parentNode) container.remove();
        }, 5500);
    }
    
    function updateGameStatus() {
        if (checkVictory()) {
            currentGameOver = true;
            statusDiv.innerHTML = "🎉✨ VITÓRIA ESPECTACULAR! ✨🎉";
            statusDiv.style.color = "#c97e00";
            renderGrid();
            launchSymbolConfetti();
        } else {
            statusDiv.style.color = "#2c3e2f";
            if (!currentGameOver) statusDiv.innerHTML = "📌 Jogo em andamento. Continue!";
        }
    }
    
    function updateStatusMessage(msg) {
        if (!currentGameOver) statusDiv.innerHTML = msg;
        else statusDiv.innerHTML = "🏆 Campeão! Clique em NOVO JOGO. 🏆";
        statusDiv.style.color = "#2c3e2f";
    }

    function placeSymbol(symbol) {
        if (currentGameOver) {
            updateStatusMessage("🏁 Jogo finalizado! Comece um novo.");
            return;
        }
        if (selectedRow === -1 || selectedCol === -1) {
            updateStatusMessage("🔍 Primeiro, toque em uma célula vazia ou editável.");
            return;
        }
        const row = selectedRow;
        const col = selectedCol;
        if (fixedCells[row][col]) {
            updateStatusMessage(`🔒 Célula fixa não pode ser alterada.`);
            return;
        }
        
        board[row][col] = symbol;
        const isValidMove = isValidPlacement(board, row, col, symbol);
        if (!isValidMove) {
            updateStatusMessage(`⚠️ Conflito! O símbolo ${symbol} causa erro.`);
        } else {
            updateStatusMessage(`✅ Símbolo ${symbol} inserido!`);
        }
        
        renderGrid();
        if (checkVictory()) {
            updateGameStatus();
            renderGrid();
        }
    }
    
    function clearSelectedCell() {
        if (currentGameOver) {
            updateStatusMessage("Jogo vencido, inicie um novo.");
            return;
        }
        if (selectedRow === -1 || selectedCol === -1) {
            updateStatusMessage("Selecione uma célula para limpar.");
            return;
        }
        if (fixedCells[selectedRow][selectedCol]) {
            updateStatusMessage("Célula fixa não pode ser limpa!");
            return;
        }
        if (board[selectedRow][selectedCol] !== "") {
            board[selectedRow][selectedCol] = "";
            updateStatusMessage(`🧹 Célula limpa.`);
            renderGrid();
            if (checkVictory()) updateGameStatus();
        } else {
            updateStatusMessage("Célula já está vazia.");
        }
    }
    
    function renderGrid() {
        gameGridElement.innerHTML = "";
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const cellValue = board[i][j];
                const isFixed = fixedCells[i][j];
                const isSelected = (selectedRow === i && selectedCol === j);
                let hasConflict = false;
                if (cellValue !== "") {
                    if (!isValidPlacement(board, i, j, cellValue)) {
                        hasConflict = true;
                    }
                }
                
                const cellDiv = document.createElement("div");
                cellDiv.className = "cell";
                if (isFixed) cellDiv.classList.add("preset");
                if (isSelected) cellDiv.classList.add("selected");
                if (hasConflict && !isFixed && cellValue !== "") cellDiv.classList.add("error");
                
                // Destaques de linha/coluna e bloco
                if (selectedRow !== -1 && selectedCol !== -1) {
                    if ((i === selectedRow || j === selectedCol) && !isSelected) {
                        cellDiv.style.backgroundColor = "#fef9e6";
                    }
                    const sRowBlock = Math.floor(selectedRow / BOX_SIZE) * BOX_SIZE;
                    const sColBlock = Math.floor(selectedCol / BOX_SIZE) * BOX_SIZE;
                    if (i >= sRowBlock && i < sRowBlock+BOX_SIZE && j >= sColBlock && j < sColBlock+BOX_SIZE) {
                        if (!isSelected && !(i === selectedRow || j === selectedCol)) {
                            cellDiv.style.backgroundColor = "#faf5e0";
                        }
                    }
                }
                
                cellDiv.textContent = cellValue === "" ? "·" : cellValue;
                if (cellValue === "") cellDiv.style.color = "#8b7a5b";
                else cellDiv.style.fontWeight = "bold";
                
                cellDiv.addEventListener("click", (function(row, col) {
                    return function() {
                        if (currentGameOver) {
                            updateStatusMessage("Jogo concluído! Novo jogo para continuar.");
                            return;
                        }
                        if (fixedCells[row][col]) {
                            selectedRow = row;
                            selectedCol = col;
                            updateStatusMessage(`🔷 Célula fixa: ${board[row][col]} (não editável)`);
                            renderGrid();
                        } else {
                            selectedRow = row;
                            selectedCol = col;
                            updateStatusMessage(`🎯 Célula selecionada. Toque num símbolo.`);
                            renderGrid();
                        }
                    };
                })(i, j));
                
                gameGridElement.appendChild(cellDiv);
            }
        }
        if (currentGameOver) {
            statusDiv.innerHTML = "🏆 VITÓRIA! Parabéns! 🏆";
            statusDiv.style.color = "#c97e00";
        }
    }
    
    function buildSymbolPalette() {
        const palette = document.getElementById("symbolPalette");
        palette.innerHTML = "";
        SYMBOLS.forEach(sym => {
            const btn = document.createElement("button");
            btn.textContent = sym;
            btn.classList.add("symbol-btn");
            btn.addEventListener("click", () => {
                if (currentGameOver) {
                    updateStatusMessage("Partida encerrada. Clique em NOVO JOGO.");
                    return;
                }
                placeSymbol(sym);
                btn.classList.add("active-tool");
                setTimeout(() => btn.classList.remove("active-tool"), 150);
            });
            palette.appendChild(btn);
        });
        const eraseBtn = document.createElement("button");
        eraseBtn.textContent = "⌫";
        eraseBtn.classList.add("symbol-btn");
        eraseBtn.style.background = "#e9ecef";
        eraseBtn.addEventListener("click", () => {
            clearSelectedCell();
        });
        palette.appendChild(eraseBtn);
    }
    
    function newGame() {
        generateNewPuzzle();
        selectedRow = -1;
        selectedCol = -1;
        currentGameOver = false;
        renderGrid();
        updateStatusMessage("✨ Novo jogo carregado! Divirta-se.");
    }
    
    function checkBoardAndHighlightErrors() {
        if (currentGameOver) {
            updateStatusMessage("Já venceu! Inicie um novo para testar.");
            return;
        }
        let hasAnyEmpty = false;
        let conflictCount = 0;
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") hasAnyEmpty = true;
                else if (!isValidPlacement(board, i, j, val)) {
                    conflictCount++;
                }
            }
        }
        if (conflictCount === 0 && !hasAnyEmpty) {
            statusDiv.innerHTML = "🎉✨ IMPRESSIONANTE! Solução perfeita! Vitória! ✨🎉";
            currentGameOver = true;
            launchSymbolConfetti();
            renderGrid();
        } else if (conflictCount === 0 && hasAnyEmpty) {
            statusDiv.innerHTML = "✅ Nenhum conflito! Continue preenchendo as células vazias.";
        } else {
            statusDiv.innerHTML = `⚠️ ${conflictCount} célula(s) em conflito! Reveja seus símbolos. ⚠️`;
        }
        renderGrid();
    }
    
    // Event listeners
    document.getElementById("newGameBtn").addEventListener("click", () => newGame());
    document.getElementById("clearBtn").addEventListener("click", () => clearSelectedCell());
    document.getElementById("checkBtn").addEventListener("click", () => checkBoardAndHighlightErrors());
    
    function init() {
        buildSymbolPalette();
        generateNewPuzzle();
        renderGrid();
    }
    
    init();
</script>
</body>
</html>
