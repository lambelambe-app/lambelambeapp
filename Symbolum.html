<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="rating" content="General">
    <meta name="audience" content="Everyone">
    <meta name="child-directed" content="true">
    <meta name="max-ad-content-rating" content="G">
    <title>Symbolum - Sudoku de Símbolos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px 12px;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; /* garante que não haja rolagem horizontal */
        }

        .game-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
        }

        .game-panel {
            background: #ffffff;
            border-radius: 40px;
            padding: 16px 10px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: #2c3e2f;
            margin-bottom: 6px;
        }

        .status-area {
            background: #f8f9fa;
            border-radius: 50px;
            padding: 6px 12px;
            margin: 4px 0 14px 0;
            text-align: center;
        }

        .status {
            font-size: 0.8rem;
            font-weight: 600;
            color: #2c3e2f;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            background-color: #dee2e6;
            gap: 1px;
            width: 100%;
            aspect-ratio: 1 / 1;
            margin: 0 auto 16px auto;
            border-radius: 16px;
            overflow: hidden;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.85rem, 4.5vw, 1.3rem);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            background: #ffffff;
            color: #2c3e2f;
            cursor: pointer;
        }

        .cell.preset {
            background: #f1f0e8;
            color: #5a3e1b;
        }

        .cell.selected {
            background: #ffe0a3;
            box-shadow: inset 0 0 0 2px #f39c12;
        }

        .cell.error {
            background: #ffe0e0;
            color: #c0392b;
            text-decoration: line-through;
        }

        /* Paleta de símbolos - todos em uma linha, sem overflow, botões pequenos */
        .symbol-palette {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin: 8px 0 18px 0;
            flex-wrap: nowrap;
        }

        .symbol-btn {
            background: #f0f2f5;
            border: 1px solid #e0e4e8;
            font-size: 1.1rem;
            font-weight: bold;
            width: 38px;
            height: 38px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            color: #2c3e2f;
            box-shadow: 0 2px 0 #d0d4d8;
            transition: 0.05s linear;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .symbol-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #d0d4d8;
        }

        .symbol-btn.active-tool {
            background: #ffb347;
            border-color: #ff9f1c;
            color: white;
        }

        /* Botões de operação em linha reta, justos, sem quebrar */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: nowrap;
            margin-top: 4px;
        }

        button.action {
            background: #4a6741;
            border: none;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 36px;
            color: white;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            transition: 0.1s;
            box-shadow: 0 2px 0 #2c3e2f;
            flex: 1;
            text-align: center;
            white-space: nowrap;
        }

        button.action:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #2c3e2f;
        }

        #clearBtn {
            background: #8b5a2b;
            box-shadow: 0 2px 0 #5a3a1a;
        }

        .confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .symbol-confetti {
            position: absolute;
            font-size: 0.9rem;
            font-weight: bold;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* Telas muito pequenas: reduz ainda mais os botões de símbolos */
        @media (max-width: 520px) {
            .symbol-btn {
                width: 34px;
                height: 34px;
                font-size: 0.95rem;
            }
            .controls {
                gap: 8px;
            }
            button.action {
                padding: 6px 10px;
                font-size: 0.7rem;
            }
            h1 {
                font-size: 1.7rem;
            }
        }

        @media (max-width: 450px) {
            .symbol-btn {
                width: 30px;
                height: 30px;
                font-size: 0.85rem;
            }
            .symbol-palette {
                gap: 3px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <h1>SYMBOLUM</h1>
        <div class="status-area">
            <div class="status" id="statusMsg">✨ Toque numa célula e num símbolo ✨</div>
        </div>
        <div class="sudoku-grid" id="sudokuGrid"></div>
        <div class="symbol-palette" id="symbolPalette"></div>
        <div class="controls">
            <button class="action" id="clearBtn">🗑️ LIMPAR</button>
            <button class="action" id="newGameBtn">🔄 NOVO</button>
            <button class="action" id="checkBtn">✅ CHECAR</button>
        </div>
    </div>
</div>

<script>
    // Configuração de segurança
    (function() {
        window.google_tag_for_child_directed_treatment = 1;
        window.google_max_ad_content_rating = "G";
        window.SYMBOLUM_CHILD_SAFE = true;
    })();

    // ---------- JOGO ----------
    const SYMBOLS = ["@", "#", "$", "%", "&", "?", "*", "+", "~"];
    const SIZE = 9;
    const BOX_SIZE = 3;

    let board = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    let fixedCells = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
    let selectedRow = -1, selectedCol = -1;
    let currentGameOver = false;

    const gridEl = document.getElementById("sudokuGrid");
    const statusEl = document.getElementById("statusMsg");

    function isValidPlacement(boardTemp, row, col, symbol) {
        for (let c = 0; c < SIZE; c++) if (c !== col && boardTemp[row][c] === symbol) return false;
        for (let r = 0; r < SIZE; r++) if (r !== row && boardTemp[r][col] === symbol) return false;
        const startRow = Math.floor(row / BOX_SIZE) * BOX_SIZE;
        const startCol = Math.floor(col / BOX_SIZE) * BOX_SIZE;
        for (let r = startRow; r < startRow + BOX_SIZE; r++)
            for (let c = startCol; c < startCol + BOX_SIZE; c++)
                if ((r !== row || c !== col) && boardTemp[r][c] === symbol) return false;
        return true;
    }

    function findEmpty(boardArr) {
        for (let i = 0; i < SIZE; i++)
            for (let j = 0; j < SIZE; j++)
                if (boardArr[i][j] === "") return [i, j];
        return null;
    }

    function solveSudoku(boardArr) {
        const empty = findEmpty(boardArr);
        if (!empty) return true;
        const [row, col] = empty;
        const shuffled = [...SYMBOLS];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        for (let sym of shuffled) {
            if (isValidPlacement(boardArr, row, col, sym)) {
                boardArr[row][col] = sym;
                if (solveSudoku(boardArr)) return true;
                boardArr[row][col] = "";
            }
        }
        return false;
    }

    function generateNewPuzzle() {
        let full = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        if (!solveSudoku(full)) {
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE; j++)
                    full[i][j] = SYMBOLS[(i * 3 + j) % SYMBOLS.length];
            solveSudoku(full);
        }
        let puzzle = full.map(row => [...row]);
        const toRemove = 48 + Math.floor(Math.random() * 12);
        let removed = 0;
        while (removed < toRemove) {
            const r = Math.floor(Math.random() * SIZE);
            const c = Math.floor(Math.random() * SIZE);
            if (puzzle[r][c] !== "") {
                puzzle[r][c] = "";
                removed++;
            }
        }
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                board[i][j] = puzzle[i][j];
                fixedCells[i][j] = (puzzle[i][j] !== "");
            }
        }
        currentGameOver = false;
        selectedRow = -1;
        selectedCol = -1;
        updateStatus("🎲 Novo desafio! Escolha uma célula.");
        renderGrid();
    }

    function checkVictory() {
        for (let i = 0; i < SIZE; i++)
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") return false;
                if (!isValidPlacement(board, i, j, val)) return false;
            }
        return true;
    }

    function launchConfetti() {
        const old = document.querySelector('.confetti-canvas');
        if (old) old.remove();
        const container = document.createElement('div');
        container.className = 'confetti-canvas';
        document.body.appendChild(container);
        for (let i = 0; i < 70; i++) {
            const sym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
            const el = document.createElement('div');
            el.className = 'symbol-confetti';
            el.textContent = sym;
            el.style.fontSize = (0.7 + Math.random() * 1) + 'rem';
            el.style.left = Math.random() * 100 + '%';
            el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
            el.style.animationDelay = (Math.random() * 0.5) + 's';
            el.style.color = `hsl(${Math.random() * 360}, 85%, 65%)`;
            container.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
        setTimeout(() => container.remove(), 4500);
    }

    function updateStatus(msg) {
        if (!currentGameOver) statusEl.innerHTML = msg;
        else statusEl.innerHTML = "🏆 Vitória! Clique em NOVO.";
        statusEl.style.color = "#2c3e2f";
    }

    function placeSymbol(symbol) {
        if (currentGameOver) { updateStatus("Jogo finalizado! Comece um novo."); return; }
        if (selectedRow === -1 || selectedCol === -1) { updateStatus("🔍 Primeiro, toque numa célula."); return; }
        const row = selectedRow, col = selectedCol;
        if (fixedCells[row][col]) { updateStatus("🔒 Célula fixa!"); return; }
        board[row][col] = symbol;
        const ok = isValidPlacement(board, row, col, symbol);
        updateStatus(ok ? `✅ ${symbol} inserido!` : `⚠️ Conflito! ${symbol} inválido.`);
        renderGrid();
        if (checkVictory()) {
            currentGameOver = true;
            statusEl.innerHTML = "🎉✨ VITÓRIA! ✨🎉";
            launchConfetti();
            renderGrid();
        }
    }

    function clearCell() {
        if (currentGameOver) { updateStatus("Jogo vencido, inicie novo."); return; }
        if (selectedRow === -1 || selectedCol === -1) { updateStatus("Selecione uma célula."); return; }
        if (fixedCells[selectedRow][selectedCol]) { updateStatus("Célula fixa!"); return; }
        if (board[selectedRow][selectedCol] !== "") {
            board[selectedRow][selectedCol] = "";
            updateStatus("🧹 Célula limpa.");
            renderGrid();
            if (checkVictory()) {
                currentGameOver = true;
                statusEl.innerHTML = "🎉✨ VITÓRIA! ✨🎉";
                launchConfetti();
                renderGrid();
            }
        } else updateStatus("Célula já vazia.");
    }

    function renderGrid() {
        gridEl.innerHTML = "";
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                const isFixed = fixedCells[i][j];
                const isSelected = (selectedRow === i && selectedCol === j);
                let hasError = false;
                if (val !== "" && !isValidPlacement(board, i, j, val)) hasError = true;
                const cell = document.createElement("div");
                cell.className = "cell";
                if (isFixed) cell.classList.add("preset");
                if (isSelected) cell.classList.add("selected");
                if (hasError && !isFixed) cell.classList.add("error");
                if (selectedRow !== -1 && selectedCol !== -1) {
                    if (i === selectedRow || j === selectedCol) cell.style.backgroundColor = "#fef9e6";
                    const br = Math.floor(selectedRow / 3) * 3, bc = Math.floor(selectedCol / 3) * 3;
                    if (i >= br && i < br+3 && j >= bc && j < bc+3) cell.style.backgroundColor = "#faf5e0";
                    if (isSelected) cell.style.backgroundColor = "#ffe0a3";
                }
                cell.textContent = val === "" ? "·" : val;
                if (val === "") cell.style.color = "#8b7a5b";
                cell.addEventListener("click", (() => {
                    if (currentGameOver) { updateStatus("Jogo encerrado. NOVO jogo."); return; }
                    if (fixedCells[i][j]) {
                        selectedRow = i; selectedCol = j;
                        updateStatus(`🔷 Fixa: ${board[i][j]}`);
                    } else {
                        selectedRow = i; selectedCol = j;
                        updateStatus("🎯 Célula selecionada. Toque num símbolo.");
                    }
                    renderGrid();
                }));
                gridEl.appendChild(cell);
            }
        }
        if (currentGameOver) statusEl.innerHTML = "🏆 VITÓRIA! Parabéns! 🏆";
    }

    function buildPalette() {
        const palette = document.getElementById("symbolPalette");
        palette.innerHTML = "";
        SYMBOLS.forEach(sym => {
            const btn = document.createElement("button");
            btn.textContent = sym;
            btn.className = "symbol-btn";
            btn.addEventListener("click", () => {
                if (currentGameOver) { updateStatus("Partida encerrada. NOVO jogo."); return; }
                placeSymbol(sym);
                btn.classList.add("active-tool");
                setTimeout(() => btn.classList.remove("active-tool"), 150);
            });
            palette.appendChild(btn);
        });
        const erase = document.createElement("button");
        erase.textContent = "⌫";
        erase.className = "symbol-btn";
        erase.addEventListener("click", () => clearCell());
        palette.appendChild(erase);
    }

    function newGame() {
        generateNewPuzzle();
        selectedRow = -1;
        selectedCol = -1;
        currentGameOver = false;
        renderGrid();
        updateStatus("✨ Novo jogo! Divirta-se.");
    }

    function checkBoard() {
        if (currentGameOver) { updateStatus("Já venceu! Comece um novo."); return; }
        let empty = false, conflicts = 0;
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const v = board[i][j];
                if (v === "") empty = true;
                else if (!isValidPlacement(board, i, j, v)) conflicts++;
            }
        }
        if (conflicts === 0 && !empty) {
            statusEl.innerHTML = "🎉✨ PERFEITO! VITÓRIA! ✨🎉";
            currentGameOver = true;
            launchConfetti();
            renderGrid();
        } else if (conflicts === 0 && empty) {
            statusEl.innerHTML = "✅ Nenhum conflito! Continue preenchendo.";
        } else {
            statusEl.innerHTML = `⚠️ ${conflicts} célula(s) em conflito!`;
        }
        renderGrid();
    }

    document.getElementById("newGameBtn").addEventListener("click", newGame);
    document.getElementById("clearBtn").addEventListener("click", clearCell);
    document.getElementById("checkBtn").addEventListener("click", checkBoard);

    function init() {
        buildPalette();
        generateNewPuzzle();
        renderGrid();
    }
    init();
</script>
</body>
</html>
