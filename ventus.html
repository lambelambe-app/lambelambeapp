<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Holografia | Símbolos do Brasil – Ventus!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', 'Poppins', sans-serif;
            background-color: #000000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Menu superior - Cidades */
        .city-menu {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto;
            z-index: 30;
            border: 1px solid rgba(100, 180, 255, 0.4);
            pointer-events: auto;
        }

        .city-btn {
            background: rgba(20, 30, 50, 0.8);
            border: none;
            color: #ccf4ff;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .city-btn:hover {
            background: #2a6eff;
            color: white;
            box-shadow: 0 0 12px rgba(42, 110, 255, 0.6);
        }

        .city-btn.active {
            background: #2a6eff;
            color: white;
            box-shadow: 0 0 12px rgba(42, 110, 255, 0.6);
        }

        /* Texto info */
        .info-text {
            position: absolute;
            top: 85px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            color: rgba(180, 220, 255, 0.7);
            font-size: 11px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            width: fit-content;
            margin: 0 auto;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Painel inferior - URL e Ventus */
        .bottom-panel {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            padding: 10px 20px;
            z-index: 30;
            pointer-events: auto;
        }

        .url-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid rgba(100, 180, 255, 0.3);
        }

        .url-section input {
            background: rgba(20, 30, 50, 0.9);
            border: 1px solid #2a6eff;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            width: 240px;
            font-family: monospace;
            font-size: 12px;
            outline: none;
        }

        .url-section input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .url-section input:focus {
            border-color: #00aaff;
            box-shadow: 0 0 10px rgba(0, 170, 255, 0.4);
        }

        .url-section button {
            background: #2a6eff;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-family: monospace;
            font-size: 12px;
        }

        .url-section button:hover:not(:disabled) {
            background: #00aaff;
            box-shadow: 0 0 10px #2a6eff;
        }

        .url-section button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status messages */
        .status-message {
            display: none;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 11px;
            text-align: center;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: rgba(34, 139, 34, 0.3);
            border-color: rgba(144, 238, 144, 0.6);
            color: #90ee90;
        }

        .status-message.error {
            background: rgba(139, 0, 0, 0.3);
            border-color: rgba(255, 69, 0, 0.6);
            color: #ff6b6b;
        }

        /* Ventus menu */
        .ventus-menu {
            display: none;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(75, 0, 130, 0.3);
            border: 1px solid rgba(186, 85, 211, 0.6);
            width: fit-content;
            margin: 0 auto;
        }

        .ventus-menu.show {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .ventus-menu span {
            font-family: monospace;
            font-size: 11px;
            color: #da70d6;
        }

        .ventus-menu button {
            background: #9932cc;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-family: monospace;
            font-size: 11px;
        }

        .ventus-menu button:hover {
            background: #ba55d3;
            box-shadow: 0 0 10px rgba(186, 85, 211, 0.6);
        }

        /* Scanline effect */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.03) 0px,
                rgba(0, 255, 255, 0.03) 2px,
                transparent 2px,
                transparent 6px
            );
        }

        @media (max-width: 700px) {
            .city-btn {
                padding: 4px 8px;
                font-size: 9px;
            }

            .url-section input {
                width: 160px;
                font-size: 10px;
            }

            .info-text {
                top: 75px;
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <!-- Menu de cidades -->
    <div class="city-menu" id="cityMenu">
        <button class="city-btn" data-city="rio">RIO ✝️</button>
        <button class="city-btn" data-city="recife">RECIFE 🏛️</button>
        <button class="city-btn" data-city="manaus">MANAUS 🎭</button>
        <button class="city-btn" data-city="saoPaulo">SÃO PAULO 🌉</button>
        <button class="city-btn" data-city="salvador">SALVADOR ⚓</button>
        <button class="city-btn" data-city="brasilia">BRASÍLIA ⛪</button>
        <button class="city-btn" data-city="beloHorizonte">BH 🏞️</button>
        <button class="city-btn" data-city="fortaleza">FORTALEZA 🌊</button>
    </div>

    <!-- Texto info -->
    <div class="info-text" id="infoText">🌀 HOLOGRAMAS FLUTUANTES | Cole uma URL ou clique em uma cidade</div>

    <!-- Painel inferior -->
    <div class="bottom-panel">
        <div class="url-section">
            <input type="text" id="imageUrl" placeholder="URL da imagem (png, jpg, gif, webp)">
            <button id="applyUrl">✨ VENTUS!</button>
        </div>
        <div class="status-message" id="statusMessage"></div>
        <div class="ventus-menu" id="ventusMenu">
            <span>🎨 VENTUS! - Imagem Carregada</span>
            <button id="applyVentusBtn">Aplicar</button>
        </div>
    </div>

    <!-- Scanline effect -->
    <div class="scanline"></div>

    <!-- Three.js via CDN -->
    <script async src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script async src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script async src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script async src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script async src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        // Aguardar carregamento do Three.js
        function waitForThree() {
            if (typeof THREE === 'undefined') {
                setTimeout(waitForThree, 100);
                return;
            }
            initScene();
        }

        // Dados das cidades
        const CITIES = {
            rio: {
                label: 'RIO ✝️',
                url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Christ_the_Redeemer_-_statue_Rio_de_Janeiro_Brazil.jpg/800px-Christ_the_Redeemer_-_statue_Rio_de_Janeiro_Brazil.jpg'
            },
            recife: {
                label: 'RECIFE 🏛️',
                url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Torre_de_Cristal_Recife.jpg/800px-Torre_de_Cristal_Recife.jpg'
            },
            manaus: {
                label: 'MANAUS 🎭',
                url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Teatro_Amazonas_Manaus.jpg/800px-Teatro_Amazonas_Manaus.jpg'
            },
            saoPaulo: {
                label: 'SÃO PAULO 🌉',
                url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Ponte_Estaiada_Oct%C3%A1vio_Frias_de_Oliveira.jpg/800px-Ponte_Estaiada_Oct%C3%A1vio_Frias_de_Oliveira.jpg'
            },
            salvador: {
                label: 'SALVADOR ⚓',
                url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Elevador_Lacerda_Salvador.jpg/800px-Elevador_Lacerda_Salvador.jpg'
            },
            brasilia: {
                label: 'BRASÍLIA ⛪',
                url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Catedral_de_Bras%C3%ADlia.jpg/800px-Catedral_de_Bras%C3%ADlia.jpg'
            },
            beloHorizonte: {
                label: 'BH 🏞️',
                url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Igreja_S%C3%A3o_Francisco_de_Assis_-_Pampulha.jpg/800px-Igreja_S%C3%A3o_Francisco_de_Assis_-_Pampulha.jpg'
            },
            fortaleza: {
                label: 'FORTALEZA 🌊',
                url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Drag%C3%A3o_do_Mar.jpg/800px-Drag%C3%A3o_do_Mar.jpg'
            }
        };

        let scene, camera, renderer, controls, effectComposer, fabricMesh, hologramMaterial;
        let currentCity = 'rio';
        let ventusImageUrl = null;
        let currentTexture = null;

        function initScene() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010118);
            scene.fog = new THREE.FogExp2(0x010118, 0.006);

            // Camera
            camera = new THREE.PerspectiveCamera(
                48,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(1.8, 2.6, 6.2);
            camera.lookAt(0, 1.5, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, precision: 'highp' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 1.4;
            document.body.insertBefore(renderer.domElement, document.body.firstChild);

            // Post-processing
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.2,
                0.5,
                0.35
            );
            bloomPass.threshold = 0.05;
            bloomPass.strength = 1.0;
            bloomPass.radius = 0.75;
            effectComposer = new THREE.EffectComposer(renderer);
            effectComposer.addPass(renderScene);
            effectComposer.addPass(bloomPass);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.rotateSpeed = 0.9;
            controls.zoomSpeed = 1.0;
            controls.enablePan = false;
            controls.target.set(0, 1.6, 0);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x112244, 0.4);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xfff0e0, 1.0);
            mainLight.position.set(2, 4, 3);
            mainLight.castShadow = true;
            scene.add(mainLight);

            const fillLight = new THREE.PointLight(0x4488ff, 0.6);
            fillLight.position.set(-1.5, 2, 2);
            scene.add(fillLight);

            const backLight = new THREE.PointLight(0x3366cc, 0.5);
            backLight.position.set(0, 2.5, -3.5);
            scene.add(backLight);

            const danceLight = new THREE.PointLight(0x44aaff, 0.85);
            danceLight.castShadow = false;
            scene.add(danceLight);

            const groundGlow = new THREE.PointLight(0x0088ff, 0.5);
            groundGlow.position.set(0, -0.3, 0);
            scene.add(groundGlow);

            // Ground
            const gridHelper = new THREE.GridHelper(10, 20, 0x3366aa, 0x224466);
            gridHelper.position.y = -0.6;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.2;
            scene.add(gridHelper);

            const shadowPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(7, 7),
                new THREE.ShadowMaterial({ opacity: 0.25, color: 0x000000, transparent: true })
            );
            shadowPlane.rotation.x = -Math.PI / 2;
            shadowPlane.position.y = -0.58;
            shadowPlane.receiveShadow = true;
            scene.add(shadowPlane);

            // Fabric mesh
            const geometry = new THREE.PlaneGeometry(3.8, 3.8, 140, 140);
            geometry.computeVertexNormals();

            hologramMaterial = new THREE.MeshStandardMaterial({
                color: 0x88aaff,
                emissive: 0x2266aa,
                emissiveIntensity: 0.65,
                metalness: 0.85,
                roughness: 0.25,
                transparent: true,
                opacity: 0.92,
                side: THREE.DoubleSide
            });

            fabricMesh = new THREE.Mesh(geometry, hologramMaterial);
            fabricMesh.castShadow = true;
            fabricMesh.receiveShadow = false;
            scene.add(fabricMesh);

            // Criar fallback texture
            const fallbackCanvas = document.createElement('canvas');
            fallbackCanvas.width = 512;
            fallbackCanvas.height = 512;
            const ctx = fallbackCanvas.getContext('2d');
            ctx.fillStyle = '#2266aa';
            ctx.fillRect(0, 0, 512, 512);
            ctx.fillStyle = '#88ccff';
            ctx.font = 'Bold 40px monospace';
            ctx.fillText('HOLOGRAMA', 150, 256);
            const fallbackTexture = new THREE.CanvasTexture(fallbackCanvas);
            hologramMaterial.map = fallbackTexture;

            // Animation loop
            let lightTime = 0;
            const animate = () => {
                lightTime += 0.016;

                danceLight.position.x = Math.sin(lightTime * 0.7) * 1.6;
                danceLight.position.z = Math.cos(lightTime * 0.5) * 1.4;
                danceLight.position.y = 1.2 + Math.sin(lightTime * 1.2) * 0.8;
                danceLight.intensity = 0.7 + Math.sin(lightTime * 1.5) * 0.3;
                mainLight.intensity = 0.9 + Math.sin(lightTime * 0.4) * 0.15;
                hologramMaterial.emissiveIntensity = 0.65 + Math.sin(lightTime * 2.2) * 0.2;

                controls.update();
                effectComposer.render();
                requestAnimationFrame(animate);
            };
            animate();

            // Setup UI
            setupUI();

            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                effectComposer.setSize(window.innerWidth, window.innerHeight);
            });

            // Load initial city
            loadCityTexture('rio');
        }

        function loadCityTexture(cityKey) {
            const cityData = CITIES[cityKey];
            if (!cityData) return;

            const loader = new THREE.TextureLoader();
            loader.load(
                cityData.url,
                (texture) => {
                    if (currentTexture) currentTexture.dispose();
                    currentTexture = texture;
                    currentTexture.wrapS = THREE.RepeatWrapping;
                    currentTexture.wrapT = THREE.RepeatWrapping;
                    currentTexture.repeat.set(1.2, 1.2);
                    hologramMaterial.map = currentTexture;
                    hologramMaterial.needsUpdate = true;
                    hologramMaterial.emissiveIntensity = 0.75;
                },
                undefined,
                (err) => {
                    console.warn('Erro ao carregar imagem da cidade:', err);
                    showStatus('Erro ao carregar imagem', 'error');
                }
            );
        }

        function loadCustomTexture(url) {
            if (!url.trim()) {
                showStatus('Digite uma URL válida', 'error');
                return;
            }

            // Validar URL
            try {
                new URL(url);
            } catch (e) {
                showStatus('URL inválida. Use um endereço completo (https://...)', 'error');
                return;
            }

            const loader = new THREE.TextureLoader();
            loader.load(
                url,
                (texture) => {
                    if (currentTexture) currentTexture.dispose();
                    currentTexture = texture;
                    currentTexture.wrapS = THREE.RepeatWrapping;
                    currentTexture.wrapT = THREE.RepeatWrapping;
                    currentTexture.repeat.set(1.2, 1.2);
                    hologramMaterial.map = currentTexture;
                    hologramMaterial.needsUpdate = true;
                    hologramMaterial.emissiveIntensity = 0.75;

                    ventusImageUrl = url;
                    document.getElementById('ventusMenu').classList.add('show');
                    showStatus('✨ Imagem aplicada com sucesso ao Ventus!', 'success');
                    document.getElementById('imageUrl').value = '';
                },
                undefined,
                (err) => {
                    console.warn('Erro ao carregar imagem personalizada:', err);
                    showStatus('Erro ao carregar imagem. Verifique a URL e tente novamente.', 'error');
                }
            );
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message show ' + type;
            setTimeout(() => {
                statusEl.classList.remove('show');
            }, 3000);
        }

        function setupUI() {
            // City buttons
            document.querySelectorAll('.city-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cityKey = btn.dataset.city;
                    currentCity = cityKey;

                    document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    loadCityTexture(cityKey);
                    showStatus(`🌀 ${CITIES[cityKey].label} carregado`, 'success');
                    document.getElementById('ventusMenu').classList.remove('show');
                });
            });

            // Set initial active button
            document.querySelector('.city-btn[data-city="rio"]').classList.add('active');

            // URL input
            const urlInput = document.getElementById('imageUrl');
            const applyBtn = document.getElementById('applyUrl');

            applyBtn.addEventListener('click', () => {
                applyBtn.disabled = true;
                applyBtn.textContent = '⏳ Carregando...';
                loadCustomTexture(urlInput.value);
                setTimeout(() => {
                    applyBtn.disabled = false;
                    applyBtn.textContent = '✨ VENTUS!';
                }, 2000);
            });

            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    applyBtn.click();
                }
            });

            // Ventus button
            document.getElementById('applyVentusBtn').addEventListener('click', () => {
                if (ventusImageUrl) {
                    loadCustomTexture(ventusImageUrl);
                }
            });
        }

        // Iniciar quando o DOM estiver pronto
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', waitForThree);
        } else {
            waitForThree();
        }
    </script>
</body>
</html>
