<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fluxos | Tecido em Dança Eterna – Museu do Amanhã</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', 'Poppins', sans-serif;
            background-color: #010a14;
        }
        .poetic-note {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            color: rgba(180, 220, 255, 0.6);
            font-size: 13px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 300;
            letter-spacing: 1px;
            transition: opacity 1.5s ease;
            font-family: monospace;
        }
        @media (max-width: 700px) {
            .poetic-note { font-size: 10px; bottom: 12px; }
        }
        .poetic-note.fade-out { opacity: 0; }
        .touch-ripple {
            position: fixed;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100,200,255,0.4) 0%, rgba(100,200,255,0) 70%);
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: transform 0.08s;
            will-change: left, top;
        }
    </style>
</head>
<body>
    <div class="poetic-note" id="poeticNote">✨ fluxo eterno | o tecido dança sem nunca tocar o chão ✨</div>
    <div id="touchRipple" class="touch-ripple" style="display: none;"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- CENA IMERSIVA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010a18);
        scene.fog = new THREE.FogExp2(0x010a18, 0.006);

        const camera = new THREE.PerspectiveCamera(44, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.5, 4.2, 7.5);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.25;
        document.body.appendChild(renderer.domElement);

        // Pós-processamento bloom etéreo
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.35, 0.25);
        bloomPass.threshold = 0.08;
        bloomPass.strength = 0.72;
        bloomPass.radius = 0.65;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // Controles orbitais (para explorar, mas a magia está na fluidez)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.rotateSpeed = 0.9;
        controls.zoomSpeed = 1.0;
        controls.enablePan = true;
        controls.panSpeed = 0.7;
        controls.target.set(0, 1.5, 0);

        // --- LUZES QUE RESPIRAM COM O TECIDO ---
        const ambientLight = new THREE.AmbientLight(0x1a2a44, 0.6);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff0dd, 1.15);
        mainLight.position.set(3.5, 6.5, 2.8);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x4488aa, 0.55);
        fillLight.position.set(0, -0.4, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x77aaff, 0.6);
        backLight.position.set(-2.2, 2.5, -3.8);
        scene.add(backLight);
        const windLight = new THREE.PointLight(0x33ccff, 0.85);
        windLight.castShadow = false;
        scene.add(windLight);
        const coreLight = new THREE.PointLight(0x00aaff, 0.9);
        coreLight.position.set(0, -0.2, 0);
        coreLight.distance = 5.5;
        scene.add(coreLight);

        // Elementos cênicos sutis (chão etéreo)
        const gridHelper = new THREE.GridHelper(14, 24, 0x44aaff, 0x336699);
        gridHelper.position.y = -0.1;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.28;
        scene.add(gridHelper);
        const shadowCatcher = new THREE.Mesh(
            new THREE.PlaneGeometry(11.5, 11.5),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        shadowCatcher.rotation.x = -Math.PI / 2;
        shadowCatcher.position.y = -0.12;
        shadowCatcher.receiveShadow = true;
        scene.add(shadowCatcher);
        
        // Anel luminoso no chão (fonte de fluxo)
        const airRing = new THREE.Mesh(
            new THREE.RingGeometry(1.4, 2.7, 48),
            new THREE.MeshStandardMaterial({ color: 0x2a8eff, emissive: 0x115588, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
        );
        airRing.rotation.x = -Math.PI / 2;
        airRing.position.y = -0.11;
        scene.add(airRing);

        // --- TECIDO PRINCIPAL: MALHA FINA E FLUTUANTE ---
        const width = 7.4;
        const depth = 7.4;
        const segments = 180; // alta resolução para movimentos orgânicos
        const geometry = new THREE.PlaneGeometry(width, depth, segments, segments);
        const positions = geometry.attributes.position.array;
        const origX = [];
        const origZ = [];
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const z = positions[i+1];
            positions[i] = x;
            positions[i+1] = 0;
            positions[i+2] = z;
            origX.push(x);
            origZ.push(z);
        }
        geometry.computeVertexNormals();
        
        // Textura do tecido com aparência fibrosa e mutável
        const texCanvas = document.createElement('canvas');
        texCanvas.width = 512;
        texCanvas.height = 512;
        const texCtx = texCanvas.getContext('2d');
        const refreshTexture = () => {
            texCtx.fillStyle = '#0a2a44';
            texCtx.fillRect(0, 0, texCanvas.width, texCanvas.height);
            texCtx.strokeStyle = '#88ccff';
            texCtx.lineWidth = 1.5;
            for (let i = 0; i < 400; i++) {
                texCtx.beginPath();
                texCtx.moveTo(i * 6, 0);
                texCtx.lineTo(i * 6 + 18, texCanvas.height);
                texCtx.stroke();
                texCtx.beginPath();
                texCtx.moveTo(0, i * 6);
                texCtx.lineTo(texCanvas.width, i * 6 + 12);
                texCtx.stroke();
            }
            texCtx.fillStyle = '#cceeffaa';
            for (let p = 0; p < 2200; p++) {
                texCtx.fillRect(Math.random() * texCanvas.width, Math.random() * texCanvas.height, 1.2, 1.2);
            }
            const grad = texCtx.createLinearGradient(0, 0, texCanvas.width, texCanvas.height);
            grad.addColorStop(0, 'rgba(70, 160, 240, 0.3)');
            grad.addColorStop(1, 'rgba(20, 80, 140, 0.5)');
            texCtx.fillStyle = grad;
            texCtx.fillRect(0, 0, texCanvas.width, texCanvas.height);
            fabricTexture.needsUpdate = true;
        };
        const fabricTexture = new THREE.CanvasTexture(texCanvas);
        refreshTexture();
        
        const fabricMaterial = new THREE.MeshStandardMaterial({
            map: fabricTexture,
            color: 0x6ab0ff,
            emissive: 0x115588,
            emissiveIntensity: 0.32,
            roughness: 0.38,
            metalness: 0.68,
            transparent: true,
            opacity: 0.89,
            side: THREE.DoubleSide
        });
        
        const fabricMesh = new THREE.Mesh(geometry, fabricMaterial);
        fabricMesh.castShadow = true;
        fabricMesh.receiveShadow = false;
        scene.add(fabricMesh);
        
        // --- PARTÍCULAS DE AR (Vento Ascendente) ---
        const particleCount = 2800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleSpeeds = [];
        for (let i = 0; i < particleCount; i++) {
            const r = Math.random() * 4.4;
            const ang = Math.random() * Math.PI * 2;
            const x = Math.cos(ang) * r;
            const z = Math.sin(ang) * r;
            particlePositions[i*3] = x;
            particlePositions[i*3+1] = Math.random() * 2.8;
            particlePositions[i*3+2] = z;
            particleSpeeds.push(0.007 + Math.random() * 0.015 + (1.2 - r * 0.2) * 0.004);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88ccff, size: 0.042, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.65 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // --- MOVIMENTO DO TECIDO: FLUXOS IMPREVISÍVEIS E DIVERSOS ---
        // Utilizamos múltiplas funções de onda viajante + ruído pseudo-aleatório que evolui no tempo
        // para garantir que o tecido flutue sobre toda a base sem repetição exata.
        
        const vertexCount = geometry.attributes.position.count;
        const positionAttr = geometry.attributes.position;
        const yArray = positionAttr.array;
        
        // Parâmetros de animação que mudam lentamente para criar variedade infinita
        let time = 0;
        // Frequências e velocidades que evoluem suavemente
        let freq1 = 0.85, freq2 = 1.2, freq3 = 1.7, freq4 = 2.1;
        let speed1 = 0.92, speed2 = 1.15, speed3 = 0.78, speed4 = 1.42;
        let warpX = 0.0, warpZ = 0.0;
        
        // Guardar pequenas perturbações por vértice (aleatórias mas estáticas) para assinatura única
        const perVertexOffset = new Array(vertexCount);
        for (let i = 0; i < vertexCount; i++) {
            perVertexOffset[i] = {
                a: Math.sin(i * 0.023) * 0.08,
                b: Math.cos(i * 0.017) * 0.08,
                c: Math.sin(i * 0.031) * 0.05
            };
        }
        
        // Função de altura principal: combina ondas progressivas, estacionárias e ruído harmônico.
        // O tecido NUNCA toca o chão (mínimo Y = 0.68) e explora toda amplitude.
        function computeFluxHeight(x, z, t, idx) {
            // Ondas viajantes com direções variadas
            const wav1 = Math.sin(x * freq1 + t * speed1) * Math.cos(z * 0.9 + t * 0.7) * 0.28;
            const wav2 = Math.sin(x * 1.3 - t * 1.05) * Math.sin(z * 1.1 + t * 0.85) * 0.22;
            const wav3 = Math.cos(x * freq2 + t * speed2) * 0.18;
            const wav4 = Math.sin(z * freq3 + t * speed3) * 0.20;
            const wav5 = Math.sin((x * 1.8 + z * 1.4) * 0.9 + t * 1.25) * 0.15;
            const wav6 = Math.cos((x * 2.2 - z * 1.7) * 0.8 + t * 1.65) * 0.13;
            
            // Ondas de maior frequência para textura de movimento
            const ripple = Math.sin(x * 3.2 + t * 2.3) * Math.cos(z * 3.0 + t * 1.9) * 0.07;
            const spiral = Math.sin( (x*x*0.3 + z*z*0.3) * 1.2 + t * 1.8) * 0.06;
            
            // Pequena assinatura individual por vértice (dá impressão de "fibras vivas")
            const micro = perVertexOffset[idx].a * Math.sin(t * 1.4 + perVertexOffset[idx].b) + perVertexOffset[idx].c * Math.cos(t * 2.1);
            
            // Modulação lenta da amplitude geral (respiração)
            const breath = Math.sin(t * 0.27) * 0.045;
            
            // Altura base (garantia de flutuação)
            let y = 1.35 + wav1 + wav2 + wav3 + wav4 + wav5 + wav6 + ripple + spiral + micro + breath;
            
            // Limites estéticos e segurança: nunca abaixo de 0.68 (não toca o chão)
            if (y < 0.68) y = 0.68;
            if (y > 2.35) y = 2.35;
            return y;
        }
        
        // Evolução lenta dos parâmetros de frequência/velocidade para gerar variedade infinita
        function evolveFlowParameters(deltaTime) {
            // Mudanças muito lentas e contínuas, como correntes de ar que se transformam
            freq1 = 0.82 + Math.sin(time * 0.053) * 0.12;
            freq2 = 1.15 + Math.cos(time * 0.047) * 0.18;
            freq3 = 1.65 + Math.sin(time * 0.038) * 0.15;
            speed1 = 0.88 + Math.cos(time * 0.062) * 0.14;
            speed2 = 1.08 + Math.sin(time * 0.071) * 0.19;
            speed3 = 0.74 + Math.cos(time * 0.059) * 0.13;
            // Pequenas deformações de campo (warp) para dar sensação de fluxo mutável
            warpX = Math.sin(time * 0.12) * 0.08;
            warpZ = Math.cos(time * 0.11) * 0.08;
        }
        
        // --- INTERATIVIDADE TÁTIL (mantém a magia, mas não domina o fluxo natural) ---
        // O toque gera ondulações passageiras que se integram ao movimento eterno.
        let yExtra = new Array(vertexCount).fill(0);
        let colorHeat = new Array(vertexCount).fill(0);
        let touchTrail = []; // { x, z, strength, age }
        
        function applyTouchInfluence(xzX, xzZ, radius, intensity, colorIntensity = 0) {
            const radSq = radius * radius;
            for (let i = 0; i < vertexCount; i++) {
                const dx = origX[i] - xzX;
                const dz = origZ[i] - xzZ;
                const distSq = dx*dx + dz*dz;
                if (distSq < radSq) {
                    const factor = (1 - Math.sqrt(distSq)/radius) * intensity;
                    yExtra[i] += factor * 0.19;
                    if (yExtra[i] > 0.65) yExtra[i] = 0.65;
                    if (colorIntensity > 0) {
                        colorHeat[i] += factor * colorIntensity * 0.12;
                        if (colorHeat[i] > 1.0) colorHeat[i] = 1.0;
                    }
                }
            }
        }
        
        function addTouchRipple(x, z, strength) {
            applyTouchInfluence(x, z, 1.05, strength, 0.12);
            touchTrail.push({ x, z, strength: strength * 0.7, age: 1.0 });
            if (touchTrail.length > 35) touchTrail.shift();
        }
        
        // Gestão de eventos de toque/mouse
        let pointerMap = new Map();
        let pressTimers = new Map();
        
        function getIntersectPoint(clientX, clientY) {
            const raycaster = new THREE.Raycaster();
            const mouseVec = new THREE.Vector2(
                (clientX / renderer.domElement.clientWidth) * 2 - 1,
                -(clientY / renderer.domElement.clientHeight) * 2 + 1
            );
            raycaster.setFromCamera(mouseVec, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 1.3);
            const point = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, point)) {
                return { x: point.x, z: point.z, valid: Math.abs(point.x) < 4.2 && Math.abs(point.z) < 4.2 };
            }
            return { x: 0, z: 0, valid: false };
        }
        
        function onPointerMove(clientX, clientY, id) {
            const { x, z, valid } = getIntersectPoint(clientX, clientY);
            if (!valid) return;
            // Leve ondulação ao mover
            applyTouchInfluence(x, z, 0.9, 0.18, 0.03);
            // Adiciona rastro para suavidade visual
            touchTrail.push({ x, z, strength: 0.25, age: 1.0 });
            if (touchTrail.length > 40) touchTrail.shift();
        }
        
        function onPointerDown(clientX, clientY, id) {
            const { x, z, valid } = getIntersectPoint(clientX, clientY);
            if (!valid) return;
            addTouchRipple(x, z, 0.45);
            // Toque sustentado: mais cor e elevação
            const timer = setTimeout(() => {
                applyTouchInfluence(x, z, 1.3, 0.4, 0.55);
                coreLight.intensity = 1.2;
                setTimeout(() => { coreLight.intensity = 0.8; }, 400);
            }, 500);
            pressTimers.set(id, timer);
            pointerMap.set(id, { x, z });
        }
        
        function onPointerUp(id) {
            if (pressTimers.has(id)) {
                clearTimeout(pressTimers.get(id));
                pressTimers.delete(id);
            }
            pointerMap.delete(id);
        }
        
        // Eventos
        renderer.domElement.addEventListener('mousemove', (e) => {
            onPointerMove(e.clientX, e.clientY, 'mouse');
            document.getElementById('poeticNote')?.classList.add('fade-out');
        });
        renderer.domElement.addEventListener('mousedown', (e) => onPointerDown(e.clientX, e.clientY, 'mouse'));
        window.addEventListener('mouseup', () => onPointerUp('mouse'));
        
        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                onPointerMove(touch.clientX, touch.clientY, touch.identifier);
            }
            const ripple = document.getElementById('touchRipple');
            if (ripple && e.touches.length) {
                ripple.style.display = 'block';
                ripple.style.left = e.touches[0].clientX + 'px';
                ripple.style.top = e.touches[0].clientY + 'px';
            }
        });
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                onPointerDown(touch.clientX, touch.clientY, touch.identifier);
            }
            document.getElementById('poeticNote')?.classList.add('fade-out');
            const ripple = document.getElementById('touchRipple');
            if (ripple) ripple.style.display = 'block';
        });
        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                onPointerUp(e.changedTouches[i].identifier);
            }
            if (e.touches.length === 0) {
                document.getElementById('touchRipple')?.setAttribute('style', 'display: none');
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            const ripple = document.getElementById('touchRipple');
            if (ripple && ripple.style.display === 'block') {
                ripple.style.left = e.clientX + 'px';
                ripple.style.top = e.clientY + 'px';
            }
        });
        
        // --- LOOP PRINCIPAL: ATUALIZAÇÃO DO TECIDO, CORES, PARTÍCULAS ---
        let lastTimestamp = 0;
        
        function updateInteractionsDecay() {
            for (let i = 0; i < vertexCount; i++) {
                yExtra[i] *= 0.992;
                if (Math.abs(yExtra[i]) < 0.002) yExtra[i] = 0;
                if (colorHeat[i] > 0) {
                    colorHeat[i] *= 0.996;
                    if (colorHeat[i] < 0.01) colorHeat[i] = 0;
                }
            }
            for (let i = 0; i < touchTrail.length; i++) {
                touchTrail[i].age *= 0.96;
                touchTrail[i].strength *= 0.97;
            }
            touchTrail = touchTrail.filter(t => t.age > 0.05);
        }
        
        function updateFabricDynamicColor() {
            let avgHeat = 0;
            let countHeat = 0;
            for (let i = 0; i < vertexCount; i++) {
                if (colorHeat[i] > 0.01) {
                    avgHeat += colorHeat[i];
                    countHeat++;
                }
            }
            const heatFactor = countHeat > 0 ? Math.min(avgHeat / countHeat, 1.0) : 0;
            const r = 0.3 + heatFactor * 0.7;
            const g = 0.4 + heatFactor * 0.5;
            const b = 0.8 - heatFactor * 0.6;
            fabricMaterial.color.setRGB(r, g, b);
            fabricMaterial.emissiveIntensity = 0.28 + heatFactor * 0.55;
            coreLight.color.setHSL(0.55 - heatFactor * 0.2, 1.0, 0.6);
        }
        
        function updateParticles() {
            const posAttr = particleGeo.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                let y = posAttr[i*3+1];
                y += particleSpeeds[i];
                if (y > 3.1) {
                    y = -0.4;
                    const newR = Math.random() * 4.5;
                    const newAng = Math.random() * Math.PI * 2;
                    posAttr[i*3] = Math.cos(newAng) * newR;
                    posAttr[i*3+2] = Math.sin(newAng) * newR;
                    particleSpeeds[i] = 0.007 + Math.random() * 0.016;
                }
                posAttr[i*3+1] = y;
                posAttr[i*3] += Math.sin(time + i) * 0.0008;
                posAttr[i*3+2] += Math.cos(time * 0.9 + i) * 0.0008;
            }
            particleGeo.attributes.position.needsUpdate = true;
        }
        
        function animate(currentTime) {
            const delta = Math.min(0.033, (currentTime - lastTimestamp) / 1000);
            lastTimestamp = currentTime;
            
            time += 0.016; // incremento constante para movimentos fluidos
            evolveFlowParameters(delta);
            updateInteractionsDecay();
            
            // Recalcular altura de todos os vértices com o fluxo imprevisível
            for (let i = 0; i < vertexCount; i++) {
                const x = origX[i];
                const z = origZ[i];
                // Pequeno warp (distorção do espaço) para simular correntes de ar mutantes
                const xw = x + Math.sin(z * 0.5 + time * 0.4) * warpX;
                const zw = z + Math.cos(x * 0.5 + time * 0.35) * warpZ;
                let baseY = computeFluxHeight(xw, zw, time, i);
                // Adiciona influência do toque
                baseY += yExtra[i] * 0.9;
                // Adiciona rastro suave
                for (let trail of touchTrail) {
                    const dx = x - trail.x;
                    const dz = z - trail.z;
                    const dist = Math.hypot(dx, dz);
                    if (dist < 0.85) {
                        baseY += (1 - dist / 0.85) * trail.strength * 0.18 * trail.age;
                    }
                }
                // Garantia final de não tocar o chão
                if (baseY < 0.68) baseY = 0.68;
                if (baseY > 2.4) baseY = 2.4;
                yArray[i*3+1] = baseY;
            }
            positionAttr.needsUpdate = true;
            geometry.computeVertexNormals();
            
            updateFabricDynamicColor();
            updateParticles();
            
            // Animação da textura
            fabricTexture.offset.x += 0.0004;
            fabricTexture.offset.y += 0.0003;
            
            // Luzes dançantes
            windLight.position.x = Math.sin(time * 0.9) * 2.8;
            windLight.position.z = Math.cos(time * 1.1) * 2.5;
            windLight.position.y = 1.4 + Math.sin(time * 1.7) * 0.9;
            windLight.intensity = 0.7 + Math.sin(time * 2.1) * 0.25;
            coreLight.intensity = 0.7 + Math.sin(time * 1.9) * 0.25 + (pointerMap.size > 0 ? 0.12 : 0);
            
            controls.update();
            effectComposer.render();
            
            requestAnimationFrame(animate);
        }
        
        requestAnimationFrame(animate);
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        setTimeout(() => {
            const note = document.getElementById('poeticNote');
            if (note) note.classList.add('fade-out');
        }, 6000);
        
        console.log('✨ Fluxos | O tecido dança eternamente, nunca toca o chão e seus movimentos são infinitamente diversos.');
    </script>
</body>
