<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sygnus – Caça aos Símbolos ASCII</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b1219 0%, #03070c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Fira Code', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 20px;
            width: 100%;
            max-width: 1100px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,200,100,0.3);
        }

        .game-panel {
            background: #1e262f;
            border-radius: 36px;
            padding: 20px;
            text-align: center;
            box-shadow: inset 0 1px 2px rgba(255,255,200,0.1), 0 10px 25px rgba(0,0,0,0.4);
        }

        h1 {
            margin: 0 0 6px 0;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #B8F2FF, #6EE7B7, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .sub {
            font-size: 0.8rem;
            color: #b9cdb0;
            margin-bottom: 20px;
            border-bottom: 1px dashed #4a6741;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Área do desenho ASCII */
        .drawing-area {
            background: #0f1419;
            border-radius: 28px;
            padding: 15px;
            margin: 10px 0;
            overflow-x: auto;
            box-shadow: inset 0 0 0 1px #2e3a2e, 0 5px 15px black;
        }

        .ascii-grid {
            display: grid;
            background-color: #0a0f14;
            border-radius: 16px;
            overflow: hidden;
            justify-content: center;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-weight: 500;
        }

        .grid-row {
            display: flex;
        }

        .ascii-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            font-size: 1.4rem;
            font-weight: bold;
            background-color: #1e2a2a;
            border: 1px solid #3e4e3a;
            color: #eef4db;
            cursor: pointer;
            transition: 0.08s linear;
            text-shadow: 0 0 3px black;
        }

        /* Célula marcada (encontrada) */
        .ascii-cell.found {
            background-color: #2c8c5e;
            color: white;
            box-shadow: inset 0 0 0 2px #b6ffb0;
            transform: scale(0.97);
        }

        /* Efeito de erro */
        .ascii-cell.wrong {
            background-color: #c74b3a;
            animation: shakeFlash 0.2s;
            box-shadow: 0 0 0 2px red;
        }

        @keyframes shakeFlash {
            0% { transform: translateX(0); background-color: #c74b3a; }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
            100% { transform: translateX(0); background-color: #1e2a2a; }
        }

        /* Barra de símbolos (botões) */
        .symbols-bar {
            background: #10171e;
            border-radius: 60px;
            padding: 12px 15px;
            margin: 20px 0 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .sym-btn {
            background: #2a363f;
            border: 2px solid #6a7a68;
            padding: 10px 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            font-family: monospace;
            transition: 0.1s;
            box-shadow: 0 2px 6px black;
            color: #f0e6c5;
            min-width: 85px;
            cursor: default;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .sym-btn.active-symbol {
            background: #4b8b5e;
            border-color: #ffdf8c;
            box-shadow: 0 0 0 2px #f9e45b;
            transform: scale(1.02);
            color: white;
        }

        .sym-btn.completed {
            background: #2c553b;
            border-color: #a5d6a5;
            opacity: 0.7;
            filter: grayscale(0.2);
            text-decoration: line-through;
        }

        .sym-symbol {
            font-size: 1.7rem;
            font-weight: bold;
        }

        .sym-progress {
            font-size: 0.75rem;
            background: #00000066;
            padding: 2px 8px;
            border-radius: 40px;
        }

        .controls {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button.action {
            background: #3f5e49;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 26px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
            letter-spacing: 1px;
        }

        button.action:active {
            transform: scale(0.96);
        }

        .status {
            margin-top: 15px;
            font-size: 1rem;
            font-weight: bold;
            background: #030c12cc;
            border-radius: 60px;
            padding: 8px 15px;
            color: #FFE6A3;
            backdrop-filter: blur(4px);
        }

        /* Confetti */
        .confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        .symbol-confetti {
            position: absolute;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 700px) {
            .ascii-cell { width: 28px; height: 28px; font-size: 1rem; }
            .sym-btn { padding: 5px 10px; min-width: 65px; }
            .sym-symbol { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <h1>⚡ SYGNUS ⚡</h1>
        <div class="sub">decifre o mosaico | encontre todos os símbolos ocultos</div>

        <!-- Área do desenho ASCII -->
        <div class="drawing-area">
            <div id="asciiGrid" class="ascii-grid"></div>
        </div>

        <!-- Barra com os 9 símbolos e progresso -->
        <div class="symbols-bar" id="symbolsBar"></div>

        <div class="controls">
            <button class="action" id="newGameBtn">🎲 NOVO DESENHO</button>
        </div>
        <div class="status" id="statusMsg">🔍 @ está ativo! Clique nas células com @ para revelá-las.</div>
    </div>
</div>

<script>
    // ============================================================
    //  SYGNUS – JOGO DE CAÇA AOS SÍMBOLOS ASCII
    //  DESENHOS ALEATÓRIOS INFINITOS (PRÉ-DEFINIDOS + SORTEIO)
    //  SÍMBOLOS: @ # $ % ? & * + -
    // ============================================================

    // --- CONJUNTO DE DESENHOS ASCII ART (USANDO APENAS OS 9 CARACTERES) ---
    // Cada desenho é um array de strings (linhas), usando somente os caracteres permitidos.
    // Os espaços também são permitidos para formar a silhueta, mas o jogo só considera os 9 símbolos.
    // Para garantir a variedade infinita, sortearemos um desenho aleatório desta lista (e podemos expandir)
    const ASCII_DRAWINGS = [
        // 1. Coração estilizado
        [
            "  @@@    @@@  ",
            " @@@@@  @@@@@ ",
            "@@@@@@@@@@@@@@",
            "@@@@@@@@@@@@@@",
            " @@@@@@@@@@@@ ",
            "  @@@@@@@@@@  ",
            "   @@@@@@@@   ",
            "    @@@@@@    ",
            "     @@@@     ",
            "      @@      "
        ],
        // 2. Estrela
        [
            "      %       ",
            "    %%% %%    ",
            "   %%%%%%%%   ",
            "  %%%%%%%%%%  ",
            "%%%%%%%%%%%%%%",
            "  %%%%%%%%%%  ",
            "   %%%%%%%%   ",
            "    %%% %%    ",
            "      %       ",
            "      &       "
        ],
        // 3. Peixe
        [
            "       #       ",
            "    #######    ",
            "   #########   ",
            "  ###########  ",
            " ############# ",
            "###       #####",
            " ############# ",
            "  ###########  ",
            "   #########   ",
            "    #####      "
        ],
        // 4. Casa
        [
            "      @@@      ",
            "     @@@@@     ",
            "    @@@@@@@    ",
            "   @@@@@@@@@   ",
            "  @@$@@$@@$@@  ",
            "  @@@@@@@@@@@  ",
            "  @#@   @#@    ",
            "  @#@   @#@    ",
            "  @@@@@@@@@@@  ",
            "  @@@@@@@@@@@  "
        ],
        // 5. Árvore
        [
            "      &        ",
            "     &&&       ",
            "    &&&&&      ",
            "   &&&&&&&     ",
            "  &&&&&&&&&    ",
            " &&&&&&&&&&&   ",
            "&&&&&& &&&&&&  ",
            "    &&&&       ",
            "    &&&&       ",
            "    ####       "
        ],
        // 6. Gato
        [
            "   @@@   @@@   ",
            "  @   @ @   @  ",
            " @     @     @ ",
            "@@@@@@@@@@@@@@@",
            "@  @@     @@  @",
            "@ @  @@@ @  @ @",
            "@@@       @@@@@",
            " @         @   ",
            " @    ?    @   ",
            "  @@@@@@@@@    "
        ],
        // 7. Nave espacial
        [
            "       *       ",
            "      ***      ",
            "     *****     ",
            "    *******    ",
            "   *********   ",
            "  ***********  ",
            " ************* ",
            "*****   *******",
            "  *       *    ",
            "  *       *    "
        ],
        // 8. Flor
        [
            "      %        ",
            "     %%%       ",
            "    %%%%%      ",
            "   %%%%%%%     ",
            "  %%%%%%%%%    ",
            "     |||       ",
            "     |||       ",
            "   @@@@@@@     ",
            "   @@@@@@@     ",
            "   @@@@@@@     "
        ],
        // 9. Dragão simples
        [
            "       @@      ",
            "      @@@@     ",
            "     @@@@@@    ",
            "    @@@@@@@@   ",
            "   @@@#  #@@@  ",
            "  @@@@    @@@@ ",
            " @@@@      @@@@",
            "@@@@  ????  @@@",
            " @@   ????   @@",
            "  @         @  "
        ],
        // 10. Hexágono/tecnologia
        [
            "    +++++     ",
            "   +++++++    ",
            "  +++++++++   ",
            " +++++++++++  ",
            "+++++++++++++ ",
            " +++++++++++  ",
            "  +++++++++   ",
            "   +++++++    ",
            "    +++++     ",
            "      -       "
        ]
    ];

    // Lista dos 9 símbolos na ordem de liberação
    const SYMBOLS_ORDER = ['@', '#', '$', '%', '?', '&', '*', '+', '-'];
    
    // Estado do jogo
    let currentDrawing = [];      // matriz de caracteres (array 2D)
    let rows = 0, cols = 0;
    let symbolTotals = {};        // total de ocorrências por símbolo
    let symbolFound = {};         // quantas já foram encontradas
    let markedCells = [];         // matriz booleana (marcado/descoberto)
    let activeSymbol = '@';       // símbolo atualmente liberado
    let gameActive = true;
    let gameCompleted = false;

    // Elementos DOM
    const asciiGridDiv = document.getElementById("asciiGrid");
    const symbolsBar = document.getElementById("symbolsBar");
    const statusMsgSpan = document.getElementById("statusMsg");
    const newGameBtn = document.getElementById("newGameBtn");

    // --- FUNÇÃO PARA SELECIONAR UM DESENHO ALEATÓRIO (infinito, com repetição possível mas variado)---
    function getRandomDrawing() {
        const randomIndex = Math.floor(Math.random() * ASCII_DRAWINGS.length);
        return ASCII_DRAWINGS[randomIndex].slice(); // cópia
    }

    // Converte o desenho (array de strings) em matriz 2D e calcula estatísticas
    function loadDrawing(drawingLines) {
        const matrix = [];
        let maxLen = 0;
        for (let line of drawingLines) {
            maxLen = Math.max(maxLen, line.length);
        }
        // Preenche matriz com espaços para alinhar (espaços não contam como símbolo)
        for (let i = 0; i < drawingLines.length; i++) {
            const line = drawingLines[i];
            const row = [];
            for (let j = 0; j < maxLen; j++) {
                const ch = j < line.length ? line[j] : ' ';
                row.push(ch);
            }
            matrix.push(row);
        }
        rows = matrix.length;
        cols = matrix[0].length;
        
        // Inicializa contadores
        const totals = {};
        for (let sym of SYMBOLS_ORDER) totals[sym] = 0;
        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const ch = matrix[i][j];
                if (SYMBOLS_ORDER.includes(ch)) {
                    totals[ch]++;
                }
            }
        }
        return { matrix, totals };
    }

    // Reinicia o estado do jogo com um novo desenho aleatório
    function initNewGame() {
        // Escolhe desenho aleatório (infinito)
        const rawDrawing = getRandomDrawing();
        const { matrix, totals } = loadDrawing(rawDrawing);
        currentDrawing = matrix;
        symbolTotals = totals;
        
        // Verifica se algum símbolo tem total zero; se tiver, trocamos de desenho para evitar travamento
        let hasZero = false;
        for (let sym of SYMBOLS_ORDER) {
            if (symbolTotals[sym] === 0) {
                hasZero = true;
                break;
            }
        }
        if (hasZero) {
            // tenta outro desenho no máximo 5 vezes
            for (let attempt = 0; attempt < 5; attempt++) {
                const newRaw = getRandomDrawing();
                const newRes = loadDrawing(newRaw);
                let ok = true;
                for (let sym of SYMBOLS_ORDER) {
                    if (newRes.totals[sym] === 0) { ok = false; break; }
                }
                if (ok) {
                    currentDrawing = newRes.matrix;
                    symbolTotals = newRes.totals;
                    rows = currentDrawing.length;
                    cols = currentDrawing[0].length;
                    break;
                }
            }
        }
        
        // Inicializa found e markedCells
        for (let sym of SYMBOLS_ORDER) {
            symbolFound[sym] = 0;
        }
        markedCells = Array(rows).fill().map(() => Array(cols).fill(false));
        
        activeSymbol = '@';
        gameActive = true;
        gameCompleted = false;
        
        // Se o símbolo @ tiver total 0 (improvável) mas caso aconteça, avança para o próximo
        if (symbolTotals['@'] === 0) {
            advanceToNextUncompletedSymbol();
        }
        
        renderAsciiGrid();
        renderSymbolsBar();
        updateStatusMessage();
    }
    
    // Avança para o próximo símbolo não totalmente encontrado
    function advanceToNextUncompletedSymbol() {
        const currentIndex = SYMBOLS_ORDER.indexOf(activeSymbol);
        for (let i = currentIndex + 1; i < SYMBOLS_ORDER.length; i++) {
            const nextSym = SYMBOLS_ORDER[i];
            if (symbolFound[nextSym] < symbolTotals[nextSym]) {
                activeSymbol = nextSym;
                return true;
            }
        }
        // Se todos estiverem completos, vitória!
        const allCompleted = SYMBOLS_ORDER.every(sym => symbolFound[sym] === symbolTotals[sym]);
        if (allCompleted && !gameCompleted) {
            victoryGame();
        }
        return false;
    }
    
    // Verifica vitória após cada atualização
    function checkAllSymbolsCompleted() {
        const allDone = SYMBOLS_ORDER.every(sym => symbolFound[sym] === symbolTotals[sym]);
        if (allDone && !gameCompleted && gameActive) {
            victoryGame();
        }
    }
    
    function victoryGame() {
        gameCompleted = true;
        gameActive = false;
        statusMsgSpan.innerHTML = "🎉✨ PARABÉNS!!! ✨🎉 Você revelou todos os símbolos! Desenho completo!";
        launchConfetti();
        renderSymbolsBar(); // atualiza visual dos botões
    }
    
    // Ação ao clicar em uma célula
    function onCellClick(row, col) {
        if (!gameActive || gameCompleted) return;
        if (markedCells[row][col]) {
            statusMsgSpan.innerHTML = `⚠️ Esta célula já foi descoberta! (${currentDrawing[row][col]})`;
            return;
        }
        const cellChar = currentDrawing[row][col];
        // Verifica se o caractere é um dos símbolos válidos
        if (!SYMBOLS_ORDER.includes(cellChar)) {
            // Caractere inválido (espaço ou outro), erro
            flashWrongCell(row, col);
            statusMsgSpan.innerHTML = `❌ Erro! "${cellChar}" não é um símbolo válido. Clique apenas nos símbolos: ${SYMBOLS_ORDER.join(' ')}`;
            return;
        }
        
        // Se o caractere é igual ao símbolo ativo
        if (cellChar === activeSymbol) {
            // Acerto!
            markedCells[row][col] = true;
            symbolFound[activeSymbol]++;
            updateCellVisual(row, col, true);
            // Atualiza barra de símbolos
            renderSymbolsBar();
            
            // Verifica se completou este símbolo
            if (symbolFound[activeSymbol] === symbolTotals[activeSymbol]) {
                // Mensagem de conclusão
                statusMsgSpan.innerHTML = `🎉 SÍMBOLO ${activeSymbol} COMPLETO! Avançando para o próximo... 🎉`;
                // Avança para o próximo símbolo ainda não completo
                const hasNext = advanceToNextUncompletedSymbol();
                if (!hasNext) {
                    checkAllSymbolsCompleted();
                } else {
                    renderSymbolsBar(); // atualiza destaque
                    updateStatusMessage();
                }
            } else {
                statusMsgSpan.innerHTML = `✅ Acertou! ${activeSymbol}: ${symbolFound[activeSymbol]}/${symbolTotals[activeSymbol]}`;
            }
            // após marcar, verifica vitória geral
            checkAllSymbolsCompleted();
        } else {
            // Erro: clicou em símbolo diferente do ativo
            flashWrongCell(row, col);
            statusMsgSpan.innerHTML = `❌ Erro! Você precisa encontrar o símbolo "${activeSymbol}". Você clicou em "${cellChar}". Tente novamente!`;
        }
    }
    
    // Efeito visual de erro
    function flashWrongCell(row, col) {
        const cellDiv = document.querySelector(`.ascii-cell[data-row='${row}'][data-col='${col}']`);
        if (cellDiv) {
            cellDiv.classList.add('wrong');
            setTimeout(() => cellDiv.classList.remove('wrong'), 250);
        }
    }
    
    // Atualiza visual de uma célula específica
    function updateCellVisual(row, col, isFound) {
        const cellDiv = document.querySelector(`.ascii-cell[data-row='${row}'][data-col='${col}']`);
        if (cellDiv && isFound) {
            cellDiv.classList.add('found');
        }
    }
    
    // Renderiza toda a grade ASCII
    function renderAsciiGrid() {
        asciiGridDiv.innerHTML = "";
        asciiGridDiv.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const ch = currentDrawing[i][j];
                const cell = document.createElement("div");
                cell.className = "ascii-cell";
                if (markedCells[i][j]) cell.classList.add("found");
                cell.textContent = ch;
                cell.setAttribute("data-row", i);
                cell.setAttribute("data-col", j);
                cell.addEventListener("click", (function(r,c) {
                    return function() { onCellClick(r,c); };
                })(i,j));
                asciiGridDiv.appendChild(cell);
            }
        }
    }
    
    // Renderiza a barra com os botões de símbolo (progresso)
    function renderSymbolsBar() {
        symbolsBar.innerHTML = "";
        for (let sym of SYMBOLS_ORDER) {
            const total = symbolTotals[sym];
            const found = symbolFound[sym];
            const isCompleted = (found === total && total > 0);
            const isActive = (activeSymbol === sym && !gameCompleted && gameActive);
            
            const btnDiv = document.createElement("div");
            btnDiv.className = "sym-btn";
            if (isCompleted) btnDiv.classList.add("completed");
            if (isActive) btnDiv.classList.add("active-symbol");
            
            const symSpan = document.createElement("div");
            symSpan.className = "sym-symbol";
            symSpan.textContent = sym;
            
            const progSpan = document.createElement("div");
            progSpan.className = "sym-progress";
            progSpan.textContent = `${found}/${total}`;
            
            btnDiv.appendChild(symSpan);
            btnDiv.appendChild(progSpan);
            
            // Adiciona um pequeno tooltip/indicador
            if (isActive) {
                btnDiv.title = "🔓 Símbolo ativo – clique no desenho para revelar";
            } else if (isCompleted) {
                btnDiv.title = "✅ Símbolo completo!";
            } else {
                btnDiv.title = `🔒 Ainda bloqueado. Complete o símbolo atual (${activeSymbol}) primeiro.`;
            }
            symbolsBar.appendChild(btnDiv);
        }
    }
    
    function updateStatusMessage() {
        if (gameCompleted) return;
        const totalActive = symbolTotals[activeSymbol];
        const foundActive = symbolFound[activeSymbol];
        statusMsgSpan.innerHTML = `🎯 Símbolo ATIVO: "${activeSymbol}"  |  Progresso: ${foundActive}/${totalActive}  |  Clique nas células com esse símbolo!`;
    }
    
    // Efeito de confete na vitória
    function launchConfetti() {
        const existingCanvas = document.querySelector('.confetti-canvas');
        if (existingCanvas) existingCanvas.remove();
        const container = document.createElement('div');
        container.className = 'confetti-canvas';
        document.body.appendChild(container);
        const chars = SYMBOLS_ORDER;
        const num = 180;
        for (let i = 0; i < num; i++) {
            const symbol = chars[Math.floor(Math.random() * chars.length)];
            const el = document.createElement('div');
            el.className = 'symbol-confetti';
            el.textContent = symbol;
            const size = 0.9 + Math.random() * 1.6;
            const left = Math.random() * 100;
            const duration = 2 + Math.random() * 2.8;
            const delay = Math.random() * 0.6;
            el.style.fontSize = `${size}rem`;
            el.style.left = `${left}%`;
            el.style.animationDuration = `${duration}s`;
            el.style.animationDelay = `${delay}s`;
            el.style.position = 'absolute';
            el.style.top = '-12vh';
            const hue = Math.random() * 360;
            el.style.color = `hsl(${hue}, 85%, 65%)`;
            container.appendChild(el);
            setTimeout(() => { if(el.parentNode) el.remove(); }, (duration+delay)*1000);
        }
        setTimeout(() => { if(container.parentNode) container.remove(); }, 5500);
    }
    
    // Botão novo jogo: gera novo desenho aleatório
    newGameBtn.addEventListener("click", () => {
        initNewGame();
    });
    
    // Inicializa o jogo pela primeira vez
    initNewGame();
</script>
</body>
</html>
