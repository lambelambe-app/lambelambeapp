<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="rating" content="General">
    <meta name="audience" content="Everyone">
    <meta name="child-directed" content="true">
    <meta name="max-ad-content-rating" content="G">
    <title>Symbolum - Sudoku de Símbolos (Canvas 2D)</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1e3c2c 0%, #2a4a35 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', monospace;
            padding: 20px;
            margin: 0;
        }
        .game-wrapper {
            background: #fef7e0;
            border-radius: 40px;
            padding: 20px 20px 25px 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
            cursor: pointer;
            touch-action: manipulation;
        }
        .safety-note {
            text-align: center;
            font-size: 0.7rem;
            color: #3b5c3a;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #d4c9a6;
            font-weight: 500;
        }
        .privacy-link {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 8px;
        }
        .privacy-link a {
            color: #2c5e2a;
            text-decoration: none;
            font-weight: bold;
        }
        @media (max-width: 600px) {
            .game-wrapper { padding: 12px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="540" height="680"></canvas>
    <div class="safety-note">✔️ Jogo seguro para todas as idades | Sem anúncios inadequados | Apenas lógica e diversão</div>
    <div class="privacy-link"><a href="#">🔒 Política de Privacidade</a> – Sem coleta de dados pessoais.</div>
</div>

<script>
    (function() {
        // Configuração de segurança para anúncios (COPPA/GDPR)
        window.google_tag_for_child_directed_treatment = 1;
        window.google_tag_for_under_age_of_consent = 1;
        window.google_max_ad_content_rating = "G";
        window.SYMBOLUM_CHILD_SAFE = true;
    })();

    // ==================== CONFIGURAÇÕES ====================
    const SYMBOLS = ["@", "#", "$", "%", "&", "?", "*", "+", "~"];
    const SIZE = 9;
    const BOX_SIZE = 3;
    const CELL_SIZE = 60;      // 60x60
    const GRID_SIZE = CELL_SIZE * SIZE; // 540
    const PALETTE_Y = GRID_SIZE + 20;
    const STATUS_Y = PALETTE_Y + 80;
    const BTN_SIZE = 44;
    
    let canvas = document.getElementById('gameCanvas');
    let ctx = canvas.getContext('2d');
    
    // Estado do jogo
    let board = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    let solution = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    let fixedCells = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
    let selectedRow = -1, selectedCol = -1;
    let currentGameOver = false;
    let statusMessage = "Clique em uma célula e depois num símbolo";
    
    // Coordenadas dos botões da paleta (para detecção de clique)
    let symbolButtons = [];
    let clearButtonRect = null;
    let newButtonRect = null;
    let checkButtonRect = null;
    
    // ========== LÓGICA DO SUDOKU ==========
    function isValidPlacement(boardTemp, row, col, symbol) {
        for (let c = 0; c < SIZE; c++) if (c !== col && boardTemp[row][c] === symbol) return false;
        for (let r = 0; r < SIZE; r++) if (r !== row && boardTemp[r][col] === symbol) return false;
        const startRow = Math.floor(row / BOX_SIZE) * BOX_SIZE;
        const startCol = Math.floor(col / BOX_SIZE) * BOX_SIZE;
        for (let r = startRow; r < startRow + BOX_SIZE; r++)
            for (let c = startCol; c < startCol + BOX_SIZE; c++)
                if ((r !== row || c !== col) && boardTemp[r][c] === symbol) return false;
        return true;
    }
    
    function findEmpty(boardArr) {
        for (let i = 0; i < SIZE; i++)
            for (let j = 0; j < SIZE; j++)
                if (boardArr[i][j] === "") return [i, j];
        return null;
    }
    
    function solveSudoku(boardArr) {
        const emptySpot = findEmpty(boardArr);
        if (!emptySpot) return true;
        const [row, col] = emptySpot;
        const shuffled = [...SYMBOLS];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        for (let sym of shuffled) {
            if (isValidPlacement(boardArr, row, col, sym)) {
                boardArr[row][col] = sym;
                if (solveSudoku(boardArr)) return true;
                boardArr[row][col] = "";
            }
        }
        return false;
    }
    
    function generateFullSolution() {
        let full = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        for (let i = 0; i < SIZE; i++)
            for (let j = 0; j < SIZE; j++)
                full[i][j] = SYMBOLS[(i * 3 + j) % SYMBOLS.length];
        solveSudoku(full);
        return full;
    }
    
    function generateNewPuzzle() {
        let fullSolution = generateFullSolution();
        for (let i = 0; i < SIZE; i++)
            for (let j = 0; j < SIZE; j++)
                solution[i][j] = fullSolution[i][j];
        
        let puzzleBoard = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        for (let i = 0; i < SIZE; i++)
            for (let j = 0; j < SIZE; j++)
                puzzleBoard[i][j] = solution[i][j];
        
        const cellsToRemove = 48 + Math.floor(Math.random() * 12);
        let removed = 0;
        while (removed < cellsToRemove) {
            const row = Math.floor(Math.random() * SIZE);
            const col = Math.floor(Math.random() * SIZE);
            if (puzzleBoard[row][col] !== "") {
                puzzleBoard[row][col] = "";
                removed++;
            }
        }
        
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                board[i][j] = puzzleBoard[i][j];
                fixedCells[i][j] = (puzzleBoard[i][j] !== "");
            }
        }
        
        currentGameOver = false;
        selectedRow = -1;
        selectedCol = -1;
        statusMessage = "Novo jogo! Toque em uma célula e depois em um símbolo.";
        drawAll();
    }
    
    function checkVictory() {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") return false;
                if (!isValidPlacement(board, i, j, val)) return false;
            }
        }
        return true;
    }
    
    // ========== EFEITO CONFETE ==========
    function launchConfetti() {
        const container = document.createElement('div');
        container.style.position = 'fixed';
        container.style.top = '0';
        container.style.left = '0';
        container.style.width = '100%';
        container.style.height = '100%';
        container.style.pointerEvents = 'none';
        container.style.zIndex = '9999';
        document.body.appendChild(container);
        
        for (let i = 0; i < 80; i++) {
            const symbol = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
            const el = document.createElement('div');
            el.textContent = symbol;
            el.style.position = 'absolute';
            el.style.fontSize = (1 + Math.random() * 1.6) + 'rem';
            el.style.fontWeight = 'bold';
            el.style.fontFamily = 'monospace';
            el.style.left = Math.random() * 100 + '%';
            el.style.top = '-10%';
            el.style.color = `hsl(${Math.random() * 360}, 85%, 65%)`;
            el.style.textShadow = '0 0 3px gold';
            el.style.opacity = '0.9';
            el.style.animation = `fallAnim ${1.5 + Math.random() * 1.8}s linear forwards`;
            container.appendChild(el);
        }
        
        if (!document.querySelector('#confetti-style')) {
            const style = document.createElement('style');
            style.id = 'confetti-style';
            style.textContent = `
                @keyframes fallAnim {
                    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
        }
        
        setTimeout(() => container.remove(), 3200);
    }
    
    // ========== AÇÕES DO JOGO ==========
    function placeSymbol(symbol) {
        if (currentGameOver) {
            statusMessage = "Jogo finalizado! Clique em NOVO.";
            drawAll();
            return;
        }
        if (selectedRow === -1 || selectedCol === -1) {
            statusMessage = "Primeiro, toque em uma célula vazia.";
            drawAll();
            return;
        }
        if (fixedCells[selectedRow][selectedCol]) {
            statusMessage = "Célula fixa não pode ser alterada.";
            drawAll();
            return;
        }
        
        board[selectedRow][selectedCol] = symbol;
        const valid = isValidPlacement(board, selectedRow, selectedCol, symbol);
        if (!valid) {
            statusMessage = `⚠️ Conflito! Símbolo ${symbol} em conflito.`;
        } else {
            statusMessage = `Símbolo ${symbol} inserido!`;
        }
        
        drawAll();
        if (checkVictory()) {
            currentGameOver = true;
            statusMessage = "🎉✨ VITÓRIA! Parabéns! ✨🎉";
            drawAll();
            launchConfetti();
        }
    }
    
    function clearSelectedCell() {
        if (currentGameOver) {
            statusMessage = "Já venceu! Inicie um novo.";
            drawAll();
            return;
        }
        if (selectedRow === -1 || selectedCol === -1) {
            statusMessage = "Selecione uma célula para limpar.";
            drawAll();
            return;
        }
        if (fixedCells[selectedRow][selectedCol]) {
            statusMessage = "Célula fixa não pode ser limpa.";
            drawAll();
            return;
        }
        if (board[selectedRow][selectedCol] !== "") {
            board[selectedRow][selectedCol] = "";
            statusMessage = "Célula limpa.";
            drawAll();
            if (checkVictory()) {
                currentGameOver = true;
                statusMessage = "🎉 Vitória! 🎉";
                drawAll();
                launchConfetti();
            }
        } else {
            statusMessage = "Célula já está vazia.";
            drawAll();
        }
    }
    
    function checkBoardErrors() {
        if (currentGameOver) {
            statusMessage = "Já venceu! Reinicie para testar outro.";
            drawAll();
            return;
        }
        let empty = false, conflicts = 0;
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") empty = true;
                else if (!isValidPlacement(board, i, j, val)) conflicts++;
            }
        }
        if (conflicts === 0 && !empty) {
            statusMessage = "🎉✅ Perfeito! Você venceu! ✅🎉";
            currentGameOver = true;
            drawAll();
            launchConfetti();
        } else if (conflicts === 0 && empty) {
            statusMessage = "✅ Nenhum conflito! Continue preenchendo.";
        } else {
            statusMessage = `⚠️ ${conflicts} célula(s) em conflito! ⚠️`;
        }
        drawAll();
    }
    
    // ========== DESENHO COMPLETO (CANVAS) ==========
    function drawAll() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGridBackground();
        drawSymbols();
        drawPalette();
        drawStatus();
        drawButtons();
    }
    
    function drawGridBackground() {
        // Fundo branco
        ctx.fillStyle = "#fef7e0";
        ctx.fillRect(0, 0, GRID_SIZE, GRID_SIZE);
        
        // Células individuais
        for (let row = 0; row < SIZE; row++) {
            for (let col = 0; col < SIZE; col++) {
                const x = col * CELL_SIZE;
                const y = row * CELL_SIZE;
                let bgColor = "#ffffff";
                const isFixed = fixedCells[row][col];
                const isSelected = (selectedRow === row && selectedCol === col);
                let hasConflict = false;
                const val = board[row][col];
                if (val !== "" && !isFixed) {
                    if (!isValidPlacement(board, row, col, val)) hasConflict = true;
                }
                
                if (isFixed) bgColor = "#e8e0d0";
                else if (hasConflict) bgColor = "#f8d7da";
                else if (isSelected) bgColor = "#ffe0a3";
                else if (selectedRow !== -1 && selectedCol !== -1) {
                    if (row === selectedRow || col === selectedCol) bgColor = "#f9f0df";
                    const sRowBlock = Math.floor(selectedRow / BOX_SIZE) * BOX_SIZE;
                    const sColBlock = Math.floor(selectedCol / BOX_SIZE) * BOX_SIZE;
                    if (row >= sRowBlock && row < sRowBlock+BOX_SIZE && col >= sColBlock && col < sColBlock+BOX_SIZE)
                        if (!(row === selectedRow || col === selectedCol)) bgColor = "#efe0bd";
                }
                
                ctx.fillStyle = bgColor;
                ctx.fillRect(x, y, CELL_SIZE-1, CELL_SIZE-1);
                ctx.strokeStyle = "#aaaaaa";
                ctx.strokeRect(x, y, CELL_SIZE-1, CELL_SIZE-1);
            }
        }
        
        // Linhas grossas do grid (blocos)
        ctx.beginPath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#333333";
        for (let i = 0; i <= SIZE; i++) {
            if (i % BOX_SIZE === 0) {
                ctx.lineWidth = 3;
            } else {
                ctx.lineWidth = 1;
            }
            ctx.beginPath();
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, GRID_SIZE);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(GRID_SIZE, i * CELL_SIZE);
            ctx.stroke();
        }
    }
    
    function drawSymbols() {
        ctx.font = `bold ${Math.floor(CELL_SIZE * 0.45)}px monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (let row = 0; row < SIZE; row++) {
            for (let col = 0; col < SIZE; col++) {
                const val = board[row][col];
                if (val === "") continue;
                const x = col * CELL_SIZE + CELL_SIZE/2;
                const y = row * CELL_SIZE + CELL_SIZE/2;
                const isFixed = fixedCells[row][col];
                let color = "#2c3e2f";
                if (isFixed) color = "#3b2a1f";
                else if (!isValidPlacement(board, row, col, val)) color = "#c0392b";
                ctx.fillStyle = color;
                ctx.fillText(val, x, y);
            }
        }
    }
    
    function drawPalette() {
        const startX = (GRID_SIZE - (SYMBOLS.length * (BTN_SIZE + 8))) / 2;
        symbolButtons = [];
        for (let i = 0; i < SYMBOLS.length; i++) {
            const x = startX + i * (BTN_SIZE + 8);
            const y = PALETTE_Y;
            // fundo
            ctx.fillStyle = "#f0e6d2";
            ctx.shadowBlur = 0;
            ctx.fillRect(x, y, BTN_SIZE, BTN_SIZE);
            ctx.strokeStyle = "#b0a07c";
            ctx.strokeRect(x, y, BTN_SIZE, BTN_SIZE);
            ctx.fillStyle = "#2d3e2b";
            ctx.font = `bold 28px monospace`;
            ctx.fillText(SYMBOLS[i], x + BTN_SIZE/2, y + BTN_SIZE/2);
            symbolButtons.push({ x, y, w: BTN_SIZE, h: BTN_SIZE, symbol: SYMBOLS[i] });
        }
        
        // Botão Limpar
        const eraseX = startX + SYMBOLS.length * (BTN_SIZE + 8) + 12;
        ctx.fillStyle = "#d9c8aa";
        ctx.fillRect(eraseX, PALETTE_Y, BTN_SIZE, BTN_SIZE);
        ctx.strokeStyle = "#8b7a5b";
        ctx.strokeRect(eraseX, PALETTE_Y, BTN_SIZE, BTN_SIZE);
        ctx.fillStyle = "#3b2a1f";
        ctx.font = `28px monospace`;
        ctx.fillText("⌫", eraseX + BTN_SIZE/2, PALETTE_Y + BTN_SIZE/2);
        clearButtonRect = { x: eraseX, y: PALETTE_Y, w: BTN_SIZE, h: BTN_SIZE };
        
        // Botão NOVO
        const newX = GRID_SIZE/2 - 70;
        const newY = PALETTE_Y + 60;
        ctx.fillStyle = "#4a6741";
        ctx.fillRect(newX, newY, 100, 40);
        ctx.fillStyle = "white";
        ctx.font = "bold 20px 'Segoe UI'";
        ctx.fillText("NOVO", newX + 50, newY + 26);
        newButtonRect = { x: newX, y: newY, w: 100, h: 40 };
        
        // Botão VERIFICAR
        const checkX = GRID_SIZE/2 + 30;
        ctx.fillStyle = "#4a6741";
        ctx.fillRect(checkX, newY, 110, 40);
        ctx.fillStyle = "white";
        ctx.fillText("VERIFICAR", checkX + 55, newY + 26);
        checkButtonRect = { x: checkX, y: newY, w: 110, h: 40 };
    }
    
    function drawStatus() {
        ctx.font = "bold 16px monospace";
        ctx.fillStyle = "#2c3e2f";
        ctx.shadowBlur = 0;
        ctx.textAlign = "center";
        ctx.fillText(statusMessage, GRID_SIZE/2, STATUS_Y);
    }
    
    function drawButtons() {
        // já desenhado em drawPalette
    }
    
    // ========== EVENTOS DE TOQUE E MOUSE ==========
    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        canvasX = Math.min(Math.max(0, canvasX), canvas.width);
        canvasY = Math.min(Math.max(0, canvasY), canvas.height);
        return { x: canvasX, y: canvasY };
    }
    
    function handleTap(e) {
        e.preventDefault();
        const { x, y } = getCanvasCoords(e);
        
        // Verifica botões da paleta primeiro
        for (let btn of symbolButtons) {
            if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
                placeSymbol(btn.symbol);
                drawAll();
                return;
            }
        }
        if (clearButtonRect && x >= clearButtonRect.x && x <= clearButtonRect.x + clearButtonRect.w && y >= clearButtonRect.y && y <= clearButtonRect.y + clearButtonRect.h) {
            clearSelectedCell();
            drawAll();
            return;
        }
        if (newButtonRect && x >= newButtonRect.x && x <= newButtonRect.x + newButtonRect.w && y >= newButtonRect.y && y <= newButtonRect.y + newButtonRect.h) {
            generateNewPuzzle();
            drawAll();
            return;
        }
        if (checkButtonRect && x >= checkButtonRect.x && x <= checkButtonRect.x + checkButtonRect.w && y >= checkButtonRect.y && y <= checkButtonRect.y + checkButtonRect.h) {
            checkBoardErrors();
            drawAll();
            return;
        }
        
        // Clique no grid
        if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
            const col = Math.floor(x / CELL_SIZE);
            const row = Math.floor(y / CELL_SIZE);
            if (row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
                if (currentGameOver) {
                    statusMessage = "Jogo concluído! Clique em NOVO.";
                    drawAll();
                    return;
                }
                if (fixedCells[row][col]) {
                    selectedRow = row;
                    selectedCol = col;
                    statusMessage = `Célula fixa: ${board[row][col]} (não editável)`;
                } else {
                    selectedRow = row;
                    selectedCol = col;
                    statusMessage = `Célula (${row+1},${col+1}) selecionada. Toque num símbolo.`;
                }
                drawAll();
            }
        }
    }
    
    canvas.addEventListener('touchstart', handleTap, { passive: false });
    canvas.addEventListener('mousedown', handleTap);
    
    // Inicializa o jogo
    generateNewPuzzle();
    drawAll();
</script>
</body>
</html>
