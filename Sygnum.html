<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="rating" content="General">
    <meta name="audience" content="Everyone">
    <meta name="child-directed" content="true">
    <title>Symbolum - Sudoku Futurista</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }
        body {
            background: #0a0f0e;
            background-image: radial-gradient(circle at 10% 20%, #1a2a1f, #0a100d);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            font-family: 'Segoe UI', monospace;
        }
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            margin: 0 auto;
            cursor: pointer;
            width: auto;
            height: auto;
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 0 2px rgba(210,180,80,0.3);
            background: #fef7e0;
        }
        /* O canvas terá tamanho fixo de 540x700, mas o CSS permite redimensionamento suave */
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="540" height="700"></canvas>
</div>

<script>
    (function(){
        // ---------- CONFIGURAÇÕES GLOBAIS ----------
        const SYMBOLS = ["@","#","$","%","&","?","*","+","~"];
        const SIZE = 9;
        const BOX = 3;
        const CELL = 60;            // 60px cada célula
        const GRID_SIZE = CELL * SIZE; // 540px
        const GRID_Y = 72;           // grid começa após o título
        const TITLE_Y = 34;
        
        // Posicionamento dos elementos da UI
        const PAL_Y = GRID_Y + GRID_SIZE + 12;
        const BTN_W = 44;
        const GAP_SYMBOL = 8;
        const BTN_CONTROL_Y = PAL_Y + 82;
        const STATUS_Y = BTN_CONTROL_Y + 52;
        
        let canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        
        // Estado do jogo
        let board = Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
        let fixed = Array(SIZE).fill().map(()=>Array(SIZE).fill(false));
        let selectedRow = -1, selectedCol = -1;
        let gameOver = false;
        let statusMsg = "⚡ Toque numa célula e depois num símbolo ⚡";
        
        // Áreas interativas (cliques)
        let symbolAreas = [];
        let clearArea = null;
        let newArea = null;
        let checkArea = null;
        
        // ---------- LÓGICA DO SUDOKU (Robusta) ----------
        function isValidPlacement(b, r, c, sym) {
            for(let i=0;i<SIZE;i++) {
                if(i!==c && b[r][i]===sym) return false;
                if(i!==r && b[i][c]===sym) return false;
            }
            let sr = Math.floor(r/BOX)*BOX, sc = Math.floor(c/BOX)*BOX;
            for(let i=sr;i<sr+BOX;i++)
                for(let j=sc;j<sc+BOX;j++)
                    if((i!==r || j!==c) && b[i][j]===sym) return false;
            return true;
        }
        
        function findEmpty(b) {
            for(let i=0;i<SIZE;i++)
                for(let j=0;j<SIZE;j++)
                    if(b[i][j]==="") return [i,j];
            return null;
        }
        
        function solve(b) {
            let empty = findEmpty(b);
            if(!empty) return true;
            let [r,c] = empty;
            let shuffled = [...SYMBOLS];
            for(let i=shuffled.length-1;i>0;i--){
                let j=Math.floor(Math.random()*(i+1));
                [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
            }
            for(let sym of shuffled){
                if(isValidPlacement(b,r,c,sym)){
                    b[r][c]=sym;
                    if(solve(b)) return true;
                    b[r][c]="";
                }
            }
            return false;
        }
        
        function generateFull() {
            let full = Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
            for(let i=0;i<SIZE;i++)
                for(let j=0;j<SIZE;j++)
                    full[i][j] = SYMBOLS[(i*3+j)%SYMBOLS.length];
            solve(full);
            return full;
        }
        
        function newGame() {
            let full = generateFull();
            let puzzle = Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
            for(let i=0;i<SIZE;i++)
                for(let j=0;j<SIZE;j++)
                    puzzle[i][j] = full[i][j];
            let toRemove = 48 + Math.floor(Math.random()*12);
            let removed = 0;
            while(removed < toRemove){
                let r = Math.floor(Math.random()*SIZE);
                let c = Math.floor(Math.random()*SIZE);
                if(puzzle[r][c] !== ""){
                    puzzle[r][c] = "";
                    removed++;
                }
            }
            for(let i=0;i<SIZE;i++){
                for(let j=0;j<SIZE;j++){
                    board[i][j] = puzzle[i][j];
                    fixed[i][j] = (puzzle[i][j] !== "");
                }
            }
            gameOver = false;
            selectedRow = -1;
            selectedCol = -1;
            statusMsg = "✨ Novo jogo! Selecione uma célula ✨";
            drawEverything();
        }
        
        function checkWin() {
            for(let i=0;i<SIZE;i++)
                for(let j=0;j<SIZE;j++){
                    let v = board[i][j];
                    if(v==="") return false;
                    if(!isValidPlacement(board,i,j,v)) return false;
                }
            return true;
        }
        
        function confettiEffect() {
            let container = document.createElement('div');
            container.style.position = 'fixed';
            container.style.top = '0';
            container.style.left = '0';
            container.style.width = '100%';
            container.style.height = '100%';
            container.style.pointerEvents = 'none';
            container.style.zIndex = '9999';
            document.body.appendChild(container);
            for(let i=0;i<90;i++){
                let sym = SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
                let div = document.createElement('div');
                div.innerText = sym;
                div.style.position = 'absolute';
                div.style.fontSize = (1+Math.random()*1.8)+'rem';
                div.style.fontWeight = 'bold';
                div.style.fontFamily = 'monospace';
                div.style.left = Math.random()*100+'%';
                div.style.top = '-10%';
                div.style.color = `hsl(${Math.random()*360},85%,60%)`;
                div.style.textShadow = '0 0 5px gold';
                div.style.animation = `fallAnim ${1.6+Math.random()*1.5}s linear forwards`;
                container.appendChild(div);
            }
            if(!document.getElementById('confettiStyle')){
                let style = document.createElement('style');
                style.id = 'confettiStyle';
                style.textContent = `@keyframes fallAnim{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(400deg);opacity:0;}}`;
                document.head.appendChild(style);
            }
            setTimeout(()=>container.remove(),3200);
        }
        
        // ---------- AÇÕES DO JOGO ----------
        function placeSymbol(sym) {
            if(gameOver){
                statusMsg = "🏁 Jogo acabou! Clique em NOVO.";
                drawEverything();
                return;
            }
            if(selectedRow===-1){
                statusMsg = "👆 Selecione uma célula primeiro.";
                drawEverything();
                return;
            }
            if(fixed[selectedRow][selectedCol]){
                statusMsg = "🔒 Célula fixa! Não pode mudar.";
                drawEverything();
                return;
            }
            board[selectedRow][selectedCol] = sym;
            if(!isValidPlacement(board, selectedRow, selectedCol, sym)){
                statusMsg = `⚠️ Conflito com ${sym}! Tente outro.`;
            } else {
                statusMsg = `✔️ ${sym} inserido!`;
            }
            drawEverything();
            if(checkWin()){
                gameOver = true;
                statusMsg = "🏆 VITÓRIA! Parabéns! 🏆";
                drawEverything();
                confettiEffect();
            }
        }
        
        function clearCell() {
            if(gameOver){
                statusMsg = "Jogo finalizado. Clique NOVO.";
                drawEverything();
                return;
            }
            if(selectedRow===-1){
                statusMsg = "Selecione uma célula para limpar.";
                drawEverything();
                return;
            }
            if(fixed[selectedRow][selectedCol]){
                statusMsg = "Célula fixa não pode ser limpa.";
                drawEverything();
                return;
            }
            if(board[selectedRow][selectedCol] !== ""){
                board[selectedRow][selectedCol] = "";
                statusMsg = "🗑️ Célula limpa.";
                drawEverything();
                if(checkWin()){
                    gameOver = true;
                    statusMsg = "🏆 Vitória! 🏆";
                    drawEverything();
                    confettiEffect();
                }
            } else {
                statusMsg = "Célula já está vazia.";
                drawEverything();
            }
        }
        
        function verifyBoard() {
            if(gameOver){
                statusMsg = "Jogo já vencido. Comece um novo.";
                drawEverything();
                return;
            }
            let empty = false, conflicts = 0;
            for(let i=0;i<SIZE;i++){
                for(let j=0;j<SIZE;j++){
                    let v = board[i][j];
                    if(v==="") empty = true;
                    else if(!isValidPlacement(board,i,j,v)) conflicts++;
                }
            }
            if(conflicts===0 && !empty){
                statusMsg = "🎉✅ PERFEITO! Você venceu! ✅🎉";
                gameOver = true;
                drawEverything();
                confettiEffect();
            } else if(conflicts===0 && empty){
                statusMsg = "✅ Sem conflitos! Continue preenchendo.";
            } else {
                statusMsg = `⚠️ ${conflicts} conflito(s) encontrado(s)! Revise.`;
            }
            drawEverything();
        }
        
        // ---------- DESENHO COMPLETO (estilo futurista/pichado) ----------
        function drawEverything() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawFuturisticTitle();
            drawGrid();
            drawSymbolsOnGrid();
            drawPaletteAndControls();
            drawStatusMessage();
        }
        
        function drawFuturisticTitle() {
            ctx.save();
            const title = "SYMBOLUM";
            ctx.font = "bold 36px 'Orbitron', 'Monoton', 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            // efeito spray / pichação
            for(let i=0;i<12;i++){
                ctx.fillStyle = `rgba(180, 130, 50, ${0.1+Math.random()*0.2})`;
                ctx.fillText(title, canvas.width/2 + (Math.random()*4-2), TITLE_Y + (Math.random()*4-2));
            }
            let grad = ctx.createLinearGradient(canvas.width/2-120, TITLE_Y-8, canvas.width/2+120, TITLE_Y+18);
            grad.addColorStop(0, "#e6b422");
            grad.addColorStop(0.6, "#ffdd77");
            grad.addColorStop(1, "#c9921e");
            ctx.fillStyle = grad;
            ctx.fillText(title, canvas.width/2, TITLE_Y);
            ctx.strokeStyle = "#5a3e1a";
            ctx.lineWidth = 2;
            ctx.strokeText(title, canvas.width/2, TITLE_Y);
            // respingos
            ctx.fillStyle = "#f0b83a";
            for(let i=0;i<80;i++){
                let x = canvas.width/2 + (Math.random()-0.5)*210;
                let y = TITLE_Y + (Math.random()-0.5)*28;
                ctx.fillRect(x, y, 1.8, 1.8);
            }
            ctx.restore();
        }
        
        function drawGrid() {
            ctx.fillStyle = "#fef2da";
            ctx.fillRect(0, GRID_Y, GRID_SIZE, GRID_SIZE);
            for(let r=0;r<SIZE;r++){
                for(let c=0;c<SIZE;c++){
                    let x = c*CELL;
                    let y = GRID_Y + r*CELL;
                    let bg = "#fffcf0";
                    let isFixed = fixed[r][c];
                    let isSel = (selectedRow===r && selectedCol===c);
                    let hasConflict = false;
                    let val = board[r][c];
                    if(val !== "" && !isFixed && !isValidPlacement(board,r,c,val)) hasConflict = true;
                    if(isFixed) bg = "#e2d8bd";
                    else if(hasConflict) bg = "#ffdeda";
                    else if(isSel) bg = "#ffe6b3";
                    else if(selectedRow!==-1){
                        if(r===selectedRow || c===selectedCol) bg = "#faf0dc";
                        let sr = Math.floor(selectedRow/BOX)*BOX, sc = Math.floor(selectedCol/BOX)*BOX;
                        if(r>=sr && r<sr+BOX && c>=sc && c<sc+BOX && !(r===selectedRow || c===selectedCol)) bg = "#f3e8ce";
                    }
                    ctx.fillStyle = bg;
                    ctx.fillRect(x, y, CELL-1, CELL-1);
                    ctx.strokeStyle = "#bcae8a";
                    ctx.strokeRect(x, y, CELL-1, CELL-1);
                }
            }
            ctx.beginPath();
            ctx.lineWidth = 2.8;
            ctx.strokeStyle = "#3b3222";
            for(let i=0;i<=SIZE;i++){
                let lineWidth = (i%BOX===0) ? 3 : 1.2;
                ctx.lineWidth = lineWidth;
                let pos = i*CELL;
                ctx.beginPath();
                ctx.moveTo(pos, GRID_Y);
                ctx.lineTo(pos, GRID_Y+GRID_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, GRID_Y+pos);
                ctx.lineTo(GRID_SIZE, GRID_Y+pos);
                ctx.stroke();
            }
        }
        
        function drawSymbolsOnGrid() {
            ctx.font = `bold ${Math.floor(CELL*0.44)}px monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            for(let r=0;r<SIZE;r++){
                for(let c=0;c<SIZE;c++){
                    let v = board[r][c];
                    if(v==="") continue;
                    let x = c*CELL + CELL/2;
                    let y = GRID_Y + r*CELL + CELL/2;
                    let color = "#2c4a2e";
                    if(fixed[r][c]) color = "#5a3e28";
                    else if(!isValidPlacement(board,r,c,v)) color = "#bc2f1e";
                    ctx.fillStyle = color;
                    ctx.fillText(v, x, y);
                }
            }
        }
        
        function drawPaletteAndControls() {
            // Botões de símbolo
            let totalSymWidth = SYMBOLS.length * BTN_W + (SYMBOLS.length-1) * GAP_SYMBOL;
            let startX = (GRID_SIZE - totalSymWidth) / 2;
            symbolAreas = [];
            for(let i=0;i<SYMBOLS.length;i++){
                let x = startX + i * (BTN_W + GAP_SYMBOL);
                let y = PAL_Y;
                ctx.fillStyle = "#ebdfbf";
                ctx.fillRect(x, y, BTN_W, BTN_W);
                ctx.strokeStyle = "#a99264";
                ctx.strokeRect(x, y, BTN_W, BTN_W);
                ctx.fillStyle = "#3a2c1c";
                ctx.font = `26px monospace`;
                ctx.fillText(SYMBOLS[i], x+BTN_W/2, y+BTN_W/2);
                symbolAreas.push({x, y, w: BTN_W, h: BTN_W, sym: SYMBOLS[i]});
            }
            // botão limpar
            let eraseX = startX + SYMBOLS.length * (BTN_W + GAP_SYMBOL);
            ctx.fillStyle = "#cdb891";
            ctx.fillRect(eraseX, PAL_Y, BTN_W, BTN_W);
            ctx.strokeRect(eraseX, PAL_Y, BTN_W, BTN_W);
            ctx.fillStyle = "#2e241a";
            ctx.fillText("⌫", eraseX+BTN_W/2, PAL_Y+BTN_W/2);
            clearArea = {x: eraseX, y: PAL_Y, w: BTN_W, h: BTN_W};
            
            // Botões NOVO e VERIFICAR reposicionados sem cortes
            let btnW = 104;
            let gap = 24;
            let totalCtrlWidth = btnW*2 + gap;
            let ctrlStartX = (GRID_SIZE - totalCtrlWidth) / 2;
            let newX = ctrlStartX;
            let checkX = newX + btnW + gap;
            let btnY = BTN_CONTROL_Y;
            
            ctx.fillStyle = "#3a5e3c";
            ctx.fillRect(newX, btnY, btnW, 44);
            ctx.fillStyle = "#fcf9ea";
            ctx.font = "bold 20px 'Segoe UI'";
            ctx.fillText("NOVO", newX+btnW/2, btnY+29);
            newArea = {x: newX, y: btnY, w: btnW, h: 44};
            
            ctx.fillStyle = "#3a5e3c";
            ctx.fillRect(checkX, btnY, btnW, 44);
            ctx.fillStyle = "#fcf9ea";
            ctx.fillText("VERIFICAR", checkX+btnW/2, btnY+29);
            checkArea = {x: checkX, y: btnY, w: btnW, h: 44};
        }
        
        function drawStatusMessage() {
            ctx.font = "bold 15px 'Segoe UI', monospace";
            ctx.textAlign = "center";
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#2c3e2f";
            ctx.fillRect(GRID_SIZE/2-210, STATUS_Y-14, 420, 28);
            ctx.fillStyle = "#fef3d6";
            ctx.fillRect(GRID_SIZE/2-208, STATUS_Y-12, 416, 24);
            ctx.fillStyle = "#1f3b2c";
            ctx.fillText(statusMsg, GRID_SIZE/2, STATUS_Y);
        }
        
        // ---------- TRATAMENTO DE EVENTOS (Robusto para toque/mouse) ----------
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches){
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvas.width);
            canvasY = Math.min(Math.max(0, canvasY), canvas.height);
            return {x: canvasX, y: canvasY};
        }
        
        function handleCanvasClick(e) {
            e.preventDefault();
            const {x, y} = getCanvasCoords(e);
            // Verifica paleta de símbolos
            for(let area of symbolAreas){
                if(x>=area.x && x<=area.x+area.w && y>=area.y && y<=area.y+area.h){
                    placeSymbol(area.sym);
                    return;
                }
            }
            if(clearArea && x>=clearArea.x && x<=clearArea.x+clearArea.w && y>=clearArea.y && y<=clearArea.y+clearArea.h){
                clearCell();
                return;
            }
            if(newArea && x>=newArea.x && x<=newArea.x+newArea.w && y>=newArea.y && y<=newArea.y+newArea.h){
                newGame();
                return;
            }
            if(checkArea && x>=checkArea.x && x<=checkArea.x+checkArea.w && y>=checkArea.y && y<=checkArea.y+checkArea.h){
                verifyBoard();
                return;
            }
            // clique no grid (sudoku)
            if(x>=0 && x<GRID_SIZE && y>=GRID_Y && y<GRID_Y+GRID_SIZE){
                let col = Math.floor(x / CELL);
                let row = Math.floor((y - GRID_Y) / CELL);
                if(row>=0 && row<SIZE && col>=0 && col<SIZE){
                    if(gameOver){
                        statusMsg = "Jogo finalizado. Clique NOVO.";
                        drawEverything();
                        return;
                    }
                    if(fixed[row][col]){
                        selectedRow = row;
                        selectedCol = col;
                        statusMsg = `🔒 Célula fixa: ${board[row][col]} (não editável)`;
                    } else {
                        selectedRow = row;
                        selectedCol = col;
                        statusMsg = `📍 Célula (${row+1},${col+1}) selecionada. Escolha um símbolo.`;
                    }
                    drawEverything();
                }
            }
        }
        
        canvas.addEventListener('touchstart', handleCanvasClick, {passive: false});
        canvas.addEventListener('mousedown', handleCanvasClick);
        
        // Inicialização
        newGame();
    })();
</script>
</body>
</html>
