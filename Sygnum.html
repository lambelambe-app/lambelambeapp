<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sygnus · mosaico ASCII fluido</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* evita seleção acidental em telas */
        }

        body {
            background: #0b0e12;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            color: #cbd5e6;
            padding: 1.2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* container principal – sem bordas, sem caixas */
        .game-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            text-align: center;
        }

        /* tipografia leve */
        h1 {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 500;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #c2e0ff, #96f0c0, #ffe6a3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
            text-shadow: none;
        }

        .sub {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #5f6e7a;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        /* área do mosaico – sem caixa, sem borda, sem sombra */
        .mosaic-scroll {
            overflow-x: auto;
            overflow-y: visible;
            width: 100%;
            -webkit-overflow-scrolling: touch;
            margin: 0.5rem 0 1rem;
            padding: 0 0 8px 0;
        }

        .mosaic-area {
            display: inline-block;
            background: transparent;
            line-height: 1.2;
            cursor: crosshair;
            font-size: 0; /* remove espaços inline */
        }

        /* linhas do mosaico */
        .ascii-row {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
        }

        /* cada caractere – fluido, adaptável, sem borda */
        .ascii-char {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: clamp(24px, 5vw, 36px);
            height: clamp(28px, 6vw, 42px);
            font-size: clamp(1rem, 4.5vw, 1.6rem);
            font-weight: 500;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            transition: all 0.12s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-align: center;
            flex-shrink: 0;
            background: transparent;
            border-radius: 6px;
        }

        /* estado não revelado: tons suaves de cinza sem rigidez */
        .ascii-char:not(.found):not(.found-at):not(.found-hash):not(.found-dollar):not(.found-percent):not(.found-question):not(.found-amp):not(.found-star):not(.found-plus):not(.found-minus) {
            color: #3a4249;
            text-shadow: none;
            opacity: 0.85;
        }

        /* seleção temporária – leve e suave */
        .ascii-char.selected {
            background: rgba(180, 220, 255, 0.2);
            color: #ffffff !important;
            transform: scale(1.08);
            text-shadow: 0 0 6px rgba(255,255,200,0.8);
            border-radius: 12px;
        }

        /* cores vivas porém suaves para os símbolos revelados */
        .found-at { color: #ff8a7a; text-shadow: 0 0 3px #ff5a4a; }
        .found-hash { color: #8effb2; text-shadow: 0 0 3px #4ecc6e; }
        .found-dollar { color: #ffe38c; text-shadow: 0 0 3px #ffcd4a; }
        .found-percent { color: #7aa2f7; text-shadow: 0 0 3px #4a6eff; }
        .found-question { color: #e68afc; text-shadow: 0 0 3px #c65af0; }
        .found-amp { color: #6ee7e7; text-shadow: 0 0 3px #3acaca; }
        .found-star { color: #ffb45e; text-shadow: 0 0 3px #ff9a2a; }
        .found-plus { color: #f2f2f2; text-shadow: 0 0 4px #dddddd; }
        .found-minus { color: #a0abb5; text-shadow: 0 0 2px #7a8794; }

        /* barra de botões – sem caixa, apenas flex orgânico */
        .controls-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin: 2rem 0 1rem;
            padding: 0.25rem;
        }

        /* botões circulares suaves, sem bordas duras */
        .confirm-btn {
            background: rgba(30, 38, 48, 0.6);
            backdrop-filter: blur(4px);
            border: none;
            width: clamp(64px, 14vw, 80px);
            height: clamp(64px, 14vw, 80px);
            border-radius: 80px;
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            font-weight: 600;
            font-family: monospace;
            color: #a3b3c4;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: none;
            outline: none;
            position: relative;
        }

        .confirm-btn:active {
            transform: scale(0.96);
            background: rgba(50, 65, 80, 0.8);
        }

        .confirm-btn.active {
            color: #ffdf8c;
            background: rgba(70, 110, 130, 0.5);
            text-shadow: 0 0 6px #ffdd77;
        }

        .confirm-btn.completed {
            opacity: 0.4;
            transform: scale(0.94);
            cursor: default;
            filter: grayscale(0.2);
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            text-decoration-color: #6a7a88;
        }

        .btn-progress {
            font-size: 0.7rem;
            font-weight: normal;
            letter-spacing: 0.5px;
            background: none;
            margin-top: 4px;
            color: #6d859c;
        }

        /* mensagem de status – leve, integrada */
        .status-msg {
            margin-top: 1.8rem;
            font-size: 0.85rem;
            color: #8ea1b2;
            background: transparent;
            padding: 0.5rem;
            letter-spacing: 0.3px;
            border-radius: 0;
            backdrop-filter: none;
            border: none;
            transition: all 0.2s;
        }

        /* botão novo jogo – minimal */
        .new-game-btn {
            background: none;
            border: none;
            color: #8d9fae;
            font-size: 0.85rem;
            font-family: inherit;
            padding: 0.6rem 1.8rem;
            margin-top: 0.5rem;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.15s;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            background: rgba(20, 28, 34, 0.4);
        }

        .new-game-btn:active {
            transform: scale(0.97);
            color: #cde3f5;
        }

        /* animação shake suave */
        @keyframes gentleShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .shake {
            animation: gentleShake 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        /* toque responsivo: espaçamento para dedos */
        @media (max-width: 640px) {
            body { padding: 0.8rem; }
            .confirm-btn { width: 60px; height: 60px; font-size: 1.6rem; }
            .btn-progress { font-size: 0.6rem; }
            .ascii-char { width: 28px; height: 32px; font-size: 1rem; }
        }

        @media (max-width: 480px) {
            .ascii-char { width: 26px; height: 30px; font-size: 0.9rem; }
            .confirm-btn { width: 54px; height: 54px; }
        }

        /* sem bordas, sem cards, sem sombras — apenas o essencial */
        .mosaic-scroll::-webkit-scrollbar {
            height: 4px;
            background: transparent;
        }
        .mosaic-scroll::-webkit-scrollbar-thumb {
            background: #2e3b44;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>SYGNUS</h1>
    <div class="sub">toque · selecione · confirme</div>

    <!-- Área rolável do mosaico, sem caixa delimitadora -->
    <div class="mosaic-scroll">
        <div class="mosaic-area" id="mosaicArea"></div>
    </div>

    <!-- Barra de símbolos (botões circulares) -->
    <div class="controls-bar" id="controlsBar"></div>

    <div class="status-msg" id="statusMsg">✦ Toque em um símbolo cinza no mosaico e depois no botão correspondente.</div>
    
    <button class="new-game-btn" id="newGameBtn">⟳ novo mosaico</button>
</div>

<script>
    (function() {
        // ---------- CONFIGURAÇÃO ----------
        const SYMBOLS = ['@', '#', '$', '%', '?', '&', '*', '+', '-'];
        const SYMBOL_CLASSES = {
            '@': 'found-at', '#': 'found-hash', '$': 'found-dollar',
            '%': 'found-percent', '?': 'found-question', '&': 'found-amp',
            '*': 'found-star', '+': 'found-plus', '-': 'found-minus'
        };

        // Dimensões do mosaico: 20 linhas x 48 colunas (melhor responsividade)
        const ROWS = 20;
        const COLS = 48;

        let currentDrawing = [];       // matriz de caracteres
        let symbolTotals = {};          // total de ocorrências por símbolo
        let symbolFound = {};           // quantos já foram descobertos
        let selectedCell = null;        // { row, col, char }
        let gameActive = true;
        let victoryFlag = false;

        const mosaicArea = document.getElementById('mosaicArea');
        const controlsBar = document.getElementById('controlsBar');
        const statusMsg = document.getElementById('statusMsg');
        const newGameBtn = document.getElementById('newGameBtn');

        // ---------- FUNÇÕES AUXILIARES ----------
        function resetGameState() {
            currentDrawing = [];
            symbolTotals = {};
            symbolFound = {};
            selectedCell = null;
            gameActive = true;
            victoryFlag = false;

            SYMBOLS.forEach(s => {
                symbolTotals[s] = 0;
                symbolFound[s] = 0;
            });
        }

        // Gera mosaico aleatório denso e equilibrado (evita símbolos com zero)
        function generateRandomMosaic() {
            const matrix = [];
            // primeiro, garantir que cada símbolo apareça pelo menos 1x
            const minOccurrence = {};
            SYMBOLS.forEach(s => { minOccurrence[s] = 1; });
            
            // preencher vazios
            for (let i = 0; i < ROWS; i++) {
                const row = [];
                for (let j = 0; j < COLS; j++) {
                    let randSym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                    row.push(randSym);
                }
                matrix.push(row);
            }
            
            // recalcular totais e verificar se algum símbolo ficou com 0
            const totals = {};
            SYMBOLS.forEach(s => totals[s] = 0);
            for (let i = 0; i < ROWS; i++) {
                for (let j = 0; j < COLS; j++) {
                    totals[matrix[i][j]]++;
                }
            }
            // se algum símbolo tiver total zero, forçar alguns caracteres
            for (let s of SYMBOLS) {
                if (totals[s] === 0) {
                    // substituir algumas posições aleatórias
                    for (let k = 0; k < 3; k++) {
                        const randRow = Math.floor(Math.random() * ROWS);
                        const randCol = Math.floor(Math.random() * COLS);
                        matrix[randRow][randCol] = s;
                    }
                }
            }
            // recalcular totais finais
            const finalTotals = {};
            SYMBOLS.forEach(s => finalTotals[s] = 0);
            for (let i = 0; i < ROWS; i++) {
                for (let j = 0; j < COLS; j++) {
                    finalTotals[matrix[i][j]]++;
                }
            }
            return { matrix: matrix, totals: finalTotals };
        }

        // Inicializa / reinicia o jogo
        function initGame() {
            resetGameState();
            const { matrix, totals } = generateRandomMosaic();
            currentDrawing = matrix;
            symbolTotals = totals;
            
            renderMosaic();
            renderControls();
            statusMsg.innerText = "🌀 Mosaico gerado. Toque em um caractere cinza e depois no botão do símbolo correto.";
            if (victoryFlag) victoryFlag = false;
            gameActive = true;
            selectedCell = null;
        }

        // Renderização completa do mosaico (sem bordas)
        function renderMosaic() {
            mosaicArea.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'ascii-row';
                for (let c = 0; c < COLS; c++) {
                    const char = currentDrawing[r][c];
                    const span = document.createElement('span');
                    span.className = 'ascii-char';
                    span.textContent = char;
                    span.setAttribute('data-row', r);
                    span.setAttribute('data-col', c);
                    
                    // Se já foi descoberto, aplicar classe de cor correspondente
                    const isFound = (symbolFound[char] > 0 && isCharAlreadyFound(r, c, char));
                    if (isFound) {
                        span.classList.add(SYMBOL_CLASSES[char]);
                    } else {
                        // estilo neutro/cinza suave já aplicado via CSS
                        span.style.opacity = '0.9';
                    }
                    
                    // Verifica se está selecionado atualmente
                    if (selectedCell && selectedCell.row === r && selectedCell.col === c) {
                        span.classList.add('selected');
                    }
                    
                    span.addEventListener('click', (function(row, col, ch) {
                        return function() { selectFromMosaic(row, col, ch); };
                    })(r, c, char));
                    
                    rowDiv.appendChild(span);
                }
                mosaicArea.appendChild(rowDiv);
            }
        }
        
        // Função auxiliar: verifica se uma célula específica já foi descoberta (para render)
        function isCharAlreadyFound(row, col, char) {
            // Descobrimos que o caractere está revelado se a contagem global já atingiu? 
            // Mas precisamos saber se essa célula individualmente já foi validada.
            // Para isso, mantemos um mapa de células reveladas.
            if (!window._revealedCells) window._revealedCells = new Set();
            const key = `${row},${col}`;
            return window._revealedCells.has(key);
        }
        
        // Atualiza o estado interno e visual quando uma célula é validada
        function markCellAsFound(row, col, char) {
            if (!window._revealedCells) window._revealedCells = new Set();
            const key = `${row},${col}`;
            if (window._revealedCells.has(key)) return;
            window._revealedCells.add(key);
            
            // Atualizar estilo diretamente no DOM
            const cellSpan = document.querySelector(`.ascii-char[data-row='${row}'][data-col='${col}']`);
            if (cellSpan) {
                cellSpan.classList.remove('selected');
                cellSpan.classList.add(SYMBOL_CLASSES[char]);
                cellSpan.style.opacity = '1';
            }
        }
        
        // Lida com a seleção de um caractere no mosaico
        function selectFromMosaic(row, col, char) {
            if (!gameActive || victoryFlag) {
                statusMsg.innerText = "🏁 Jogo finalizado! Clique em 'novo mosaico' para continuar.";
                return;
            }
            // Verificar se essa célula já foi revelada
            if (window._revealedCells && window._revealedCells.has(`${row},${col}`)) {
                statusMsg.innerText = `⚠️ Símbolo "${char}" já foi descoberto! Toque em um ainda cinza.`;
                return;
            }
            
            // Remove seleção anterior
            if (selectedCell) {
                const prevSpan = document.querySelector(`.ascii-char[data-row='${selectedCell.row}'][data-col='${selectedCell.col}']`);
                if (prevSpan) prevSpan.classList.remove('selected');
            }
            
            // Define nova seleção
            selectedCell = { row, col, char };
            const currentSpan = document.querySelector(`.ascii-char[data-row='${row}'][data-col='${col}']`);
            if (currentSpan) currentSpan.classList.add('selected');
            
            statusMsg.innerText = `🔍 "${char}" selecionado. Toque no botão correspondente abaixo.`;
            // Realça o botão ativo de forma sugestiva
            highlightActiveButtonForChar(char);
        }
        
        function highlightActiveButtonForChar(char) {
            // apenas um auxílio visual sem forçar clique
            document.querySelectorAll('.confirm-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.trim()[0] === char) {
                    btn.classList.add('active');
                }
            });
            setTimeout(() => {
                document.querySelectorAll('.confirm-btn').forEach(btn => btn.classList.remove('active'));
            }, 800);
        }
        
        // Confirmação do símbolo através do botão
        function confirmSymbol(sym) {
            if (!gameActive || victoryFlag) {
                statusMsg.innerText = "Jogo encerrado, gere um novo mosaico.";
                return;
            }
            if (!selectedCell) {
                statusMsg.innerText = "👆 Primeiro, toque em um caractere cinza no mosaico.";
                return;
            }
            
            const btn = document.getElementById(`btn-${sym}`);
            if (btn && btn.classList.contains('completed')) {
                statusMsg.innerText = `🏆 Símbolo ${sym} já está completo!`;
                return;
            }
            
            const { row, col, char: selectedChar } = selectedCell;
            
            // Verificar se a célula ainda não foi revelada (segurança extra)
            if (window._revealedCells && window._revealedCells.has(`${row},${col}`)) {
                statusMsg.innerText = "Esta célula já foi descoberta. Selecione outra.";
                selectedCell = null;
                renderMosaic(); // atualiza visual
                return;
            }
            
            if (selectedChar === sym) {
                // ACERTO!
                // Marcar célula como encontrada
                markCellAsFound(row, col, sym);
                symbolFound[sym]++;
                
                // Atualizar contadores dos botões
                renderControls();
                
                // Remover seleção atual
                const selectedSpan = document.querySelector(`.ascii-char[data-row='${row}'][data-col='${col}']`);
                if (selectedSpan) selectedSpan.classList.remove('selected');
                selectedCell = null;
                
                // Mensagem de sucesso
                statusMsg.innerText = `✔️ Correto! ${sym} (${symbolFound[sym]}/${symbolTotals[sym]})`;
                
                // Verificar se o símbolo atual foi completado
                if (symbolFound[sym] === symbolTotals[sym]) {
                    statusMsg.innerText = `✨ SÍMBOLO ${sym} COMPLETO! ✨ ${symbolFound[sym]}/${symbolTotals[sym]}`;
                }
                
                // Checar vitória geral
                checkVictory();
            } else {
                // ERRO: animação de shake e feedback
                const errorSpan = document.querySelector(`.ascii-char[data-row='${row}'][data-col='${col}']`);
                if (errorSpan) {
                    errorSpan.classList.add('shake');
                    setTimeout(() => errorSpan.classList.remove('shake'), 400);
                }
                statusMsg.innerText = `❌ Erro! Você selecionou "${selectedChar}" mas confirmou "${sym}". Tente novamente com o botão correto.`;
                // Não limpamos a seleção para permitir nova tentativa (mas mantemos destaque)
                // Apenas realça que deve clicar no botão certo.
                highlightActiveButtonForChar(selectedChar);
            }
        }
        
        function checkVictory() {
            const allCompleted = SYMBOLS.every(s => symbolFound[s] === symbolTotals[s]);
            if (allCompleted && !victoryFlag && gameActive) {
                victoryFlag = true;
                gameActive = false;
                statusMsg.innerHTML = "<span style='color:#b5f0b0; font-weight:500;'>✨ MOSAICO COMPLETO! PARABÉNS! ✨</span>";
                // também desabilita visualmente cliques futuros
            }
        }
        
        // Renderiza botões e atualiza progresso
        function renderControls() {
            controlsBar.innerHTML = '';
            for (let sym of SYMBOLS) {
                const total = symbolTotals[sym] || 0;
                const found = symbolFound[sym] || 0;
                const isCompleted = (found === total && total > 0);
                
                const btn = document.createElement('button');
                btn.className = 'confirm-btn';
                if (isCompleted) btn.classList.add('completed');
                btn.id = `btn-${sym}`;
                btn.innerHTML = `${sym}<span class="btn-progress">${found}/${total}</span>`;
                
                btn.addEventListener('click', (function(s) {
                    return function() { confirmSymbol(s); };
                })(sym));
                
                controlsBar.appendChild(btn);
            }
            // se houver vitória, não altera mais nada
            if (victoryFlag) {
                document.querySelectorAll('.confirm-btn').forEach(btn => btn.style.pointerEvents = 'none');
            } else {
                document.querySelectorAll('.confirm-btn').forEach(btn => btn.style.pointerEvents = 'auto');
            }
        }
        
        // Reinício completo do jogo (novo mosaico aleatório)
        function restartGame() {
            if (window._revealedCells) window._revealedCells.clear();
            else window._revealedCells = new Set();
            selectedCell = null;
            gameActive = true;
            victoryFlag = false;
            initGame();
        }
        
        // Evento do botão novo jogo
        newGameBtn.addEventListener('click', () => {
            restartGame();
        });
        
        // Inicialização pela primeira vez
        window._revealedCells = new Set();
        initGame();
    })();
</script>
</body>
</html>
