<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fluxos | Tecido Flutuante – Museu do Amanhã</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', 'Poppins', sans-serif;
            background-color: #010a14;
        }
        /* instrução minimalista que desaparece */
        .poetic-note {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            color: rgba(180, 220, 255, 0.6);
            font-size: 13px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 300;
            letter-spacing: 1px;
            transition: opacity 1.5s ease;
            font-family: monospace;
        }
        @media (max-width: 700px) {
            .poetic-note { font-size: 10px; bottom: 12px; }
        }
        .poetic-note.fade-out {
            opacity: 0;
        }
        /* anel tátil suave (mobile) */
        .touch-ripple {
            position: fixed;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100,200,255,0.4) 0%, rgba(100,200,255,0) 70%);
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: transform 0.08s;
            will-change: left, top;
        }
    </style>
</head>
<body>
    <div class="poetic-note" id="poeticNote">✨ toque, deslize, pressione – o tecido dança com o vento invisível ✨</div>
    <div id="touchRipple" class="touch-ripple" style="display: none;"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- CENA IMERSIVA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010a18);
        scene.fog = new THREE.FogExp2(0x010a18, 0.007);

        const camera = new THREE.PerspectiveCamera(44, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.2, 4.0, 7.2);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.25;
        document.body.appendChild(renderer.domElement);

        // Pós-processamento: bloom etéreo
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.35, 0.25);
        bloomPass.threshold = 0.08;
        bloomPass.strength = 0.75;
        bloomPass.radius = 0.65;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // Controles orbitais (permitem explorar, mas a magia está no toque)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.rotateSpeed = 0.9;
        controls.zoomSpeed = 1.0;
        controls.enablePan = true;
        controls.panSpeed = 0.7;
        controls.target.set(0, 1.5, 0);

        // --- LUZES QUE RESPIRAM COM O TECIDO ---
        const ambientLight = new THREE.AmbientLight(0x1a2a44, 0.6);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff0dd, 1.15);
        mainLight.position.set(3.5, 6.5, 2.8);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x4488aa, 0.55);
        fillLight.position.set(0, -0.4, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x77aaff, 0.6);
        backLight.position.set(-2.2, 2.5, -3.8);
        scene.add(backLight);
        const windLight = new THREE.PointLight(0x33ccff, 0.85);
        windLight.castShadow = false;
        scene.add(windLight);
        const coreLight = new THREE.PointLight(0x00aaff, 0.9);
        coreLight.position.set(0, -0.2, 0);
        coreLight.distance = 5.5;
        scene.add(coreLight);

        // Elementos cênicos sutis
        const gridHelper = new THREE.GridHelper(14, 24, 0x44aaff, 0x336699);
        gridHelper.position.y = -0.1;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.28;
        scene.add(gridHelper);
        const shadowCatcher = new THREE.Mesh(
            new THREE.PlaneGeometry(11.5, 11.5),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        shadowCatcher.rotation.x = -Math.PI / 2;
        shadowCatcher.position.y = -0.12;
        shadowCatcher.receiveShadow = true;
        scene.add(shadowCatcher);
        
        // Anel luminoso no chão (fonte de ar)
        const airRing = new THREE.Mesh(
            new THREE.RingGeometry(1.4, 2.7, 48),
            new THREE.MeshStandardMaterial({ color: 0x2a8eff, emissive: 0x115588, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
        );
        airRing.rotation.x = -Math.PI / 2;
        airRing.position.y = -0.11;
        scene.add(airRing);

        // --- TECIDO PRINCIPAL: MALHA FINA E FLUTUANTE ---
        const width = 7.4;
        const depth = 7.4;
        const segments = 180; // alta resolução para ondas delicadas
        const geometry = new THREE.PlaneGeometry(width, depth, segments, segments);
        const positions = geometry.attributes.position.array;
        const origX = [];
        const origZ = [];
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const z = positions[i+1];
            positions[i] = x;
            positions[i+1] = 0;
            positions[i+2] = z;
            origX.push(x);
            origZ.push(z);
        }
        geometry.computeVertexNormals();
        
        // Textura orgânica do tecido (fibra que pulsa)
        const texCanvas = document.createElement('canvas');
        texCanvas.width = 512;
        texCanvas.height = 512;
        const texCtx = texCanvas.getContext('2d');
        const refreshTexture = () => {
            texCtx.fillStyle = '#0a2a44';
            texCtx.fillRect(0, 0, texCanvas.width, texCanvas.height);
            texCtx.strokeStyle = '#88ccff';
            texCtx.lineWidth = 1.5;
            for (let i = 0; i < 400; i++) {
                texCtx.beginPath();
                texCtx.moveTo(i * 6, 0);
                texCtx.lineTo(i * 6 + 18, texCanvas.height);
                texCtx.stroke();
                texCtx.beginPath();
                texCtx.moveTo(0, i * 6);
                texCtx.lineTo(texCanvas.width, i * 6 + 12);
                texCtx.stroke();
            }
            texCtx.fillStyle = '#cceeffaa';
            for (let p = 0; p < 2200; p++) {
                texCtx.fillRect(Math.random() * texCanvas.width, Math.random() * texCanvas.height, 1.2, 1.2);
            }
            const grad = texCtx.createLinearGradient(0, 0, texCanvas.width, texCanvas.height);
            grad.addColorStop(0, 'rgba(70, 160, 240, 0.3)');
            grad.addColorStop(1, 'rgba(20, 80, 140, 0.5)');
            texCtx.fillStyle = grad;
            texCtx.fillRect(0, 0, texCanvas.width, texCanvas.height);
            fabricTexture.needsUpdate = true;
        };
        const fabricTexture = new THREE.CanvasTexture(texCanvas);
        refreshTexture();
        
        const fabricMaterial = new THREE.MeshStandardMaterial({
            map: fabricTexture,
            color: 0x6ab0ff,
            emissive: 0x115588,
            emissiveIntensity: 0.32,
            roughness: 0.38,
            metalness: 0.68,
            transparent: true,
            opacity: 0.89,
            side: THREE.DoubleSide
        });
        
        const fabricMesh = new THREE.Mesh(geometry, fabricMaterial);
        fabricMesh.castShadow = true;
        fabricMesh.receiveShadow = false;
        scene.add(fabricMesh);
        
        // --- PARTÍCULAS DE AR (Vento Ascendente) ---
        const particleCount = 2800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleSpeeds = [];
        for (let i = 0; i < particleCount; i++) {
            const r = Math.random() * 4.4;
            const ang = Math.random() * Math.PI * 2;
            const x = Math.cos(ang) * r;
            const z = Math.sin(ang) * r;
            particlePositions[i*3] = x;
            particlePositions[i*3+1] = Math.random() * 2.8;
            particlePositions[i*3+2] = z;
            particleSpeeds.push(0.007 + Math.random() * 0.015 + (1.2 - r * 0.2) * 0.004);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88ccff, size: 0.042, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.65 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // --- INTERATIVIDADE INFINITA (Mobile + Mouse) ---
        // Guarda influências: elevação extra por toque, mapa de calor cromático, ondulações via velocidade
        
        const vertexCount = geometry.attributes.position.count;
        const vertexPositions = origX.map((x, idx) => ({ x, z: origZ[idx] }));
        let yExtra = new Array(vertexCount).fill(0);
        let colorHeat = new Array(vertexCount).fill(0);   // intensidade de calor (0..1)
        let waveVelocity = new Array(vertexCount).fill(0); // para propagação de ondulações
        
        // Histórico de toques para criar redemoinhos e imprevisibilidade
        let touchTrail = []; // { x, z, strength, age }
        let lastTouchPos = { x: 0, z: 0, time: 0 };
        let touchActive = false;
        let touchVelocity = { x: 0, z: 0 };
        
        // Função de propagação de onda (simulação simples de difusão)
        function propagateWaves() {
            const newWave = new Array(vertexCount).fill(0);
            // vizinhança simplificada: percorrer vértices e propagar para próximos (baseado em grade, mas eficiente)
            // Para desempenho, usamos uma abordagem mais leve: cada vértice influencia seus 4 vizinhos (índices baseados em grade)
            const segX = segments + 1;
            for (let i = 0; i < vertexCount; i++) {
                let val = waveVelocity[i];
                if (Math.abs(val) < 0.001) continue;
                const x = i % segX;
                const z = Math.floor(i / segX);
                // vizinhos (se existirem)
                if (x > 0) newWave[i-1] += val * 0.25;
                if (x < segX-1) newWave[i+1] += val * 0.25;
                if (z > 0) newWave[i-segX] += val * 0.25;
                if (z < segX-1) newWave[i+segX] += val * 0.25;
                newWave[i] += val * 0.2; // amortecimento
            }
            for (let i = 0; i < vertexCount; i++) {
                waveVelocity[i] = newWave[i] * 0.98;
                yExtra[i] += waveVelocity[i] * 0.018;
                if (yExtra[i] > 0.68) yExtra[i] = 0.68;
                if (yExtra[i] < -0.12) yExtra[i] = -0.12;
            }
        }
        
        // Aplicar influência de toque/arrasto: elevação, cor e injeção de onda
        function applyTouchInfluence(xzX, xzZ, radius, intensity, colorIntensity = 0, waveKick = 0) {
            const radSq = radius * radius;
            for (let i = 0; i < vertexCount; i++) {
                const dx = vertexPositions[i].x - xzX;
                const dz = vertexPositions[i].z - xzZ;
                const distSq = dx*dx + dz*dz;
                if (distSq < radSq) {
                    const factor = (1 - Math.sqrt(distSq)/radius) * intensity;
                    // elevação (ar empurrando)
                    yExtra[i] += factor * 0.18;
                    if (yExtra[i] > 0.72) yExtra[i] = 0.72;
                    // cor quente (toque sustentado)
                    if (colorIntensity > 0) {
                        colorHeat[i] += factor * colorIntensity * 0.12;
                        if (colorHeat[i] > 1.2) colorHeat[i] = 1.2;
                    }
                    // impulso de onda
                    if (waveKick > 0) {
                        waveVelocity[i] += factor * waveKick * 0.4;
                    }
                }
            }
        }
        
        // Rastro de redemoinho (efeito de deslize rápido)
        function addWhirlwind(x, z, speed) {
            const radius = 1.1 + Math.random() * 0.6;
            const strength = Math.min(speed * 1.8, 0.9);
            applyTouchInfluence(x, z, radius, strength, 0.2, strength * 0.7);
            // Adiciona turbulência nas bordas
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const offX = x + Math.cos(angle) * (radius * 0.8);
                const offZ = z + Math.sin(angle) * (radius * 0.8);
                applyTouchInfluence(offX, offZ, radius * 0.6, strength * 0.5, 0.1, strength * 0.3);
            }
        }
        
        // Gerenciar eventos de toque/mouse
        let pointerMap = new Map(); // guarda posições ativas
        let pressTimers = new Map();
        
        function getIntersectPoint(clientX, clientY) {
            const raycaster = new THREE.Raycaster();
            const mouseVec = new THREE.Vector2(
                (clientX / renderer.domElement.clientWidth) * 2 - 1,
                -(clientY / renderer.domElement.clientHeight) * 2 + 1
            );
            raycaster.setFromCamera(mouseVec, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 1.3);
            const point = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, point)) {
                return { x: point.x, z: point.z, valid: Math.abs(point.x) < 4.2 && Math.abs(point.z) < 4.2 };
            }
            return { x: 0, z: 0, valid: false };
        }
        
        function onPointerMove(clientX, clientY, id, velocityX = 0, velocityZ = 0) {
            const { x, z, valid } = getIntersectPoint(clientX, clientY);
            if (!valid) return;
            // influência constante: elevação suave por proximidade (efeito "dedo invisível")
            applyTouchInfluence(x, z, 0.95, 0.22, 0.05, 0.02);
            
            // velocidade do toque gera redemoinhos
            const speed = Math.hypot(velocityX, velocityZ);
            if (speed > 0.08) {
                addWhirlwind(x, z, Math.min(speed, 1.2));
            }
            
            // rastro para desenho livre (memória efêmera)
            touchTrail.push({ x, z, strength: 0.6, age: 1.0 });
            if (touchTrail.length > 45) touchTrail.shift();
            
            lastTouchPos = { x, z, time: performance.now() };
            touchActive = true;
        }
        
        function onPointerDown(clientX, clientY, id) {
            const { x, z, valid } = getIntersectPoint(clientX, clientY);
            if (!valid) return;
            // impacto inicial mais forte
            applyTouchInfluence(x, z, 1.1, 0.35, 0.15, 0.25);
            // timer para toque sustentado (muda a cor intensamente)
            const timer = setTimeout(() => {
                applyTouchInfluence(x, z, 1.4, 0.4, 0.65, 0.2);
                // efeito luminoso
                coreLight.intensity = 1.2;
                setTimeout(() => { coreLight.intensity = 0.8; }, 400);
            }, 550);
            pressTimers.set(id, timer);
            pointerMap.set(id, { x, z, lastX: x, lastZ: z, lastTime: performance.now() });
            touchActive = true;
        }
        
        function onPointerUp(id) {
            if (pressTimers.has(id)) {
                clearTimeout(pressTimers.get(id));
                pressTimers.delete(id);
            }
            pointerMap.delete(id);
            if (pointerMap.size === 0) touchActive = false;
        }
        
        // Eventos mouse
        renderer.domElement.addEventListener('mousemove', (e) => {
            onPointerMove(e.clientX, e.clientY, 'mouse', e.movementX * 0.02, e.movementY * 0.02);
            document.getElementById('poeticNote')?.classList.add('fade-out');
        });
        renderer.domElement.addEventListener('mousedown', (e) => onPointerDown(e.clientX, e.clientY, 'mouse'));
        window.addEventListener('mouseup', () => onPointerUp('mouse'));
        
        // Eventos touch (mobile)
        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                const velocity = { x: 0, z: 0 };
                if (pointerMap.has(touch.identifier)) {
                    const last = pointerMap.get(touch.identifier);
                    const dt = Math.max(0.016, (performance.now() - last.lastTime) / 1000);
                    if (dt > 0) {
                        velocity.x = (touch.clientX - last.lastX) / dt * 0.012;
                        velocity.z = (touch.clientY - last.lastY) / dt * 0.012;
                    }
                    pointerMap.set(touch.identifier, { 
                        x: touch.clientX, z: touch.clientY, 
                        lastX: touch.clientX, lastZ: touch.clientY, 
                        lastTime: performance.now() 
                    });
                } else {
                    pointerMap.set(touch.identifier, { 
                        x: touch.clientX, z: touch.clientY, 
                        lastX: touch.clientX, lastZ: touch.clientY, 
                        lastTime: performance.now() 
                    });
                }
                onPointerMove(touch.clientX, touch.clientY, touch.identifier, velocity.x, velocity.z);
            }
            // anel tátil
            const ripple = document.getElementById('touchRipple');
            if (ripple && e.touches.length) {
                ripple.style.display = 'block';
                ripple.style.left = e.touches[0].clientX + 'px';
                ripple.style.top = e.touches[0].clientY + 'px';
            }
        });
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                onPointerDown(touch.clientX, touch.clientY, touch.identifier);
                pointerMap.set(touch.identifier, { 
                    x: touch.clientX, z: touch.clientY, 
                    lastX: touch.clientX, lastZ: touch.clientY, 
                    lastTime: performance.now() 
                });
            }
            document.getElementById('poeticNote')?.classList.add('fade-out');
            const ripple = document.getElementById('touchRipple');
            if (ripple) ripple.style.display = 'block';
        });
        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                onPointerUp(e.changedTouches[i].identifier);
            }
            if (e.touches.length === 0) {
                document.getElementById('touchRipple')?.setAttribute('style', 'display: none');
            }
        });
        
        // Atualizar anel tátil no movimento
        document.addEventListener('mousemove', (e) => {
            const ripple = document.getElementById('touchRipple');
            if (ripple && ripple.style.display === 'block') {
                ripple.style.left = e.clientX + 'px';
                ripple.style.top = e.clientY + 'px';
            }
        });
        
        // --- LOOP PRINCIPAL: ANIMAÇÃO INFINITA, ONDAS E CORES ---
        let globalTime = 0;
        const positionAttr = geometry.attributes.position;
        const yArray = positionAttr.array;
        
        // Função que calcula altura base + interações + imprevisibilidade
        function computeFinalHeight(x, z, idx, t) {
            // Movimento base: dança imprevisível com harmônicos irregulares
            let y = 1.4;
            y += Math.sin(x * 0.92 + t * 0.87) * Math.cos(z * 0.78 + t * 0.73) * 0.28;
            y += Math.sin(x * 1.85 - t * 1.32) * 0.19;
            y += Math.cos(z * 1.68 + t * 1.21) * 0.17;
            y += Math.sin((x * 1.45 + z * 1.1) * 1.05 + t * 1.55) * 0.15;
            y += Math.sin(x * 2.9 + t * 2.3) * Math.cos(z * 2.4 + t * 1.1) * 0.09;
            // flutuação caótica suave (imprevisível)
            y += Math.sin(t * 0.61) * 0.04 + Math.cos(t * 0.93 + x * 0.7) * 0.03;
            
            // Influência de toque (elevação extra)
            y += yExtra[idx] * 0.9;
            
            // Efeito dos rastros (desenho livre no ar)
            for (let trail of touchTrail) {
                const dx = x - trail.x;
                const dz = z - trail.z;
                const dist = Math.hypot(dx, dz);
                if (dist < 0.85) {
                    y += (1 - dist / 0.85) * trail.strength * 0.22 * trail.age;
                }
            }
            
            // Garantir que nunca toque o chão (mínimo 0.65)
            if (y < 0.65) y = 0.65;
            if (y > 2.35) y = 2.35;
            return y;
        }
        
        // Decaimento e atualização dos sistemas interativos
        function updateInteractions() {
            // Decaimento da elevação extra
            for (let i = 0; i < vertexCount; i++) {
                yExtra[i] *= 0.992;
                if (Math.abs(yExtra[i]) < 0.002) yExtra[i] = 0;
                // Decaimento do calor cromático
                if (colorHeat[i] > 0) {
                    colorHeat[i] *= 0.996;
                    if (colorHeat[i] < 0.01) colorHeat[i] = 0;
                }
            }
            // Decaimento do rastro
            for (let i = 0; i < touchTrail.length; i++) {
                touchTrail[i].age *= 0.97;
                touchTrail[i].strength *= 0.98;
            }
            touchTrail = touchTrail.filter(t => t.age > 0.05);
            // Propagação de ondas
            propagateWaves();
        }
        
        // Atualizar cor do tecido baseada no calor e tempo (transformações infinitas)
        function updateFabricDynamicColor() {
            let avgHeat = 0;
            let countHeat = 0;
            for (let i = 0; i < vertexCount; i++) {
                if (colorHeat[i] > 0.01) {
                    avgHeat += colorHeat[i];
                    countHeat++;
                }
            }
            const heatFactor = countHeat > 0 ? Math.min(avgHeat / countHeat, 1.0) : 0;
            // Transição de cor: azul frio -> magenta quente -> dourado
            const r = 0.3 + heatFactor * 0.7;
            const g = 0.4 + heatFactor * 0.5;
            const b = 0.8 - heatFactor * 0.6;
            fabricMaterial.color.setRGB(r, g, b);
            fabricMaterial.emissiveIntensity = 0.28 + heatFactor * 0.55;
            // Também muda a luz central
            coreLight.color.setHSL(0.55 - heatFactor * 0.2, 1.0, 0.6);
        }
        
        // Partículas de vento dançantes
        function updateParticles() {
            const posAttr = particleGeo.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                let y = posAttr[i*3+1];
                y += particleSpeeds[i];
                if (y > 3.1) {
                    y = -0.4;
                    const newR = Math.random() * 4.5;
                    const newAng = Math.random() * Math.PI * 2;
                    posAttr[i*3] = Math.cos(newAng) * newR;
                    posAttr[i*3+2] = Math.sin(newAng) * newR;
                    particleSpeeds[i] = 0.007 + Math.random() * 0.016;
                }
                posAttr[i*3+1] = y;
                // movimento espiral suave
                posAttr[i*3] += Math.sin(globalTime + i) * 0.0008;
                posAttr[i*3+2] += Math.cos(globalTime * 0.9 + i) * 0.0008;
            }
            particleGeo.attributes.position.needsUpdate = true;
        }
        
        // Loop principal
        function animate() {
            globalTime += 0.016;
            updateInteractions();
            
            // Atualizar geometria do tecido
            for (let i = 0; i < vertexCount; i++) {
                const x = origX[i];
                const z = origZ[i];
                const newY = computeFinalHeight(x, z, i, globalTime);
                yArray[i*3+1] = newY;
            }
            positionAttr.needsUpdate = true;
            geometry.computeVertexNormals();
            
            updateFabricDynamicColor();
            updateParticles();
            
            // Animar textura
            fabricTexture.offset.x += 0.0004;
            fabricTexture.offset.y += 0.0003;
            
            // Luzes dançantes
            windLight.position.x = Math.sin(globalTime * 0.9) * 2.8;
            windLight.position.z = Math.cos(globalTime * 1.1) * 2.5;
            windLight.position.y = 1.4 + Math.sin(globalTime * 1.7) * 0.9;
            windLight.intensity = 0.7 + Math.sin(globalTime * 2.1) * 0.25;
            
            coreLight.intensity = 0.7 + Math.sin(globalTime * 1.9) * 0.25 + (touchActive ? 0.15 : 0);
            
            controls.update();
            effectComposer.render();
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Ajuste de tela
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Sumir instrução após alguns segundos
        setTimeout(() => {
            const note = document.getElementById('poeticNote');
            if (note) note.classList.add('fade-out');
        }, 5800);
        
        console.log('✨ Fluxos – Tecido Flutuante ativo. Toque, deslize, e veja o vento dançar infinitamente.');
    </script>
</body>
</html>
