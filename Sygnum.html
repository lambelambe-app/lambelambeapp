<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="rating" content="General">
    <meta name="audience" content="Everyone">
    <meta name="child-directed" content="true">
    <title>Symbolum - Sudoku de Símbolos</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }
        body {
            background: #1e3c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: monospace;
        }
        .container {
            background: #fef7e0;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            display: inline-block;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 100%;
            height: auto;
            max-width: 540px;
        }
        .info {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: #3b5c3a;
        }
        a {
            color: #2c5e2a;
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="gameCanvas" width="540" height="680"></canvas>
    <div class="info">✔️ Seguro para crianças | Sem anúncios | Apenas lógica</div>
    <div class="info"><a href="#">🔒 Política de Privacidade</a> – sem coleta de dados</div>
</div>

<script>
    (function(){
        // Símbolos e constantes
        const SYMBOLS = ["@","#","$","%","&","?","*","+","~"];
        const SIZE = 9;
        const BOX = 3;
        const CELL = 60;
        const GRID = CELL * SIZE; // 540
        const PAL_Y = GRID + 20;
        const STATUS_Y = PAL_Y + 80;
        const BTN_W = 44;
        
        let canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        
        // Estado do jogo
        let board = Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
        let fixed = Array(SIZE).fill().map(()=>Array(SIZE).fill(false));
        let selectedRow = -1, selectedCol = -1;
        let gameOver = false;
        let statusMsg = "Clique numa célula e depois num símbolo";
        
        // Áreas dos botões (para detecção de clique)
        let symbolAreas = [];
        let clearArea = null;
        let newArea = null;
        let checkArea = null;
        
        // ---------- Lógica do Sudoku ----------
        function isValidPlacement(b, r, c, sym) {
            for(let i=0;i<SIZE;i++) {
                if(i!==c && b[r][i]===sym) return false;
                if(i!==r && b[i][c]===sym) return false;
            }
            let sr = Math.floor(r/BOX)*BOX, sc = Math.floor(c/BOX)*BOX;
            for(let i=sr;i<sr+BOX;i++)
                for(let j=sc;j<sc+BOX;j++)
                    if((i!==r || j!==c) && b[i][j]===sym) return false;
            return true;
        }
        
        function findEmpty(b) {
            for(let i=0;i<SIZE;i++)
                for(let j=0;j<SIZE;j++)
                    if(b[i][j]==="") return [i,j];
            return null;
        }
        
        function solve(b) {
            let empty = findEmpty(b);
            if(!empty) return true;
            let [r,c] = empty;
            let shuffled = [...SYMBOLS];
            for(let i=shuffled.length-1;i>0;i--){
                let j=Math.floor(Math.random()*(i+1));
                [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
            }
            for(let sym of shuffled){
                if(isValidPlacement(b,r,c,sym)){
                    b[r][c]=sym;
                    if(solve(b)) return true;
                    b[r][c]="";
                }
            }
            return false;
        }
        
        function generateFull() {
            let full = Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
            for(let i=0;i<SIZE;i++)
                for(let j=0;j<SIZE;j++)
                    full[i][j] = SYMBOLS[(i*3+j)%SYMBOLS.length];
            solve(full);
            return full;
        }
        
        function newGame() {
            let full = generateFull();
            let puzzle = Array(SIZE).fill().map(()=>Array(SIZE).fill(""));
            for(let i=0;i<SIZE;i++)
                for(let j=0;j<SIZE;j++)
                    puzzle[i][j] = full[i][j];
            let toRemove = 48 + Math.floor(Math.random()*12);
            let removed = 0;
            while(removed < toRemove){
                let r = Math.floor(Math.random()*SIZE);
                let c = Math.floor(Math.random()*SIZE);
                if(puzzle[r][c] !== ""){
                    puzzle[r][c] = "";
                    removed++;
                }
            }
            for(let i=0;i<SIZE;i++){
                for(let j=0;j<SIZE;j++){
                    board[i][j] = puzzle[i][j];
                    fixed[i][j] = (puzzle[i][j] !== "");
                }
            }
            gameOver = false;
            selectedRow = -1;
            selectedCol = -1;
            statusMsg = "Novo jogo! Clique numa célula.";
            drawEverything();
        }
        
        function checkWin() {
            for(let i=0;i<SIZE;i++)
                for(let j=0;j<SIZE;j++){
                    let v = board[i][j];
                    if(v==="") return false;
                    if(!isValidPlacement(board,i,j,v)) return false;
                }
            return true;
        }
        
        function confetti() {
            let container = document.createElement('div');
            container.style.position = 'fixed';
            container.style.top = '0';
            container.style.left = '0';
            container.style.width = '100%';
            container.style.height = '100%';
            container.style.pointerEvents = 'none';
            container.style.zIndex = '9999';
            document.body.appendChild(container);
            for(let i=0;i<70;i++){
                let sym = SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
                let div = document.createElement('div');
                div.innerText = sym;
                div.style.position = 'absolute';
                div.style.fontSize = (1+Math.random()*1.5)+'rem';
                div.style.fontWeight = 'bold';
                div.style.fontFamily = 'monospace';
                div.style.left = Math.random()*100+'%';
                div.style.top = '-10%';
                div.style.color = `hsl(${Math.random()*360},80%,60%)`;
                div.style.textShadow = '0 0 3px gold';
                div.style.animation = `fall ${1.5+Math.random()*1.5}s linear forwards`;
                container.appendChild(div);
            }
            if(!document.getElementById('confettiStyle')){
                let style = document.createElement('style');
                style.id = 'confettiStyle';
                style.textContent = `@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(360deg);opacity:0;}}`;
                document.head.appendChild(style);
            }
            setTimeout(()=>container.remove(),3000);
        }
        
        // ---------- Ações ----------
        function placeSymbol(sym) {
            if(gameOver){
                statusMsg = "Jogo acabou! Clique em NOVO.";
                drawEverything();
                return;
            }
            if(selectedRow===-1){
                statusMsg = "Selecione uma célula primeiro.";
                drawEverything();
                return;
            }
            if(fixed[selectedRow][selectedCol]){
                statusMsg = "Célula fixa! Não pode mudar.";
                drawEverything();
                return;
            }
            board[selectedRow][selectedCol] = sym;
            if(!isValidPlacement(board, selectedRow, selectedCol, sym)){
                statusMsg = `⚠️ Conflito com ${sym}!`;
            } else {
                statusMsg = `${sym} inserido!`;
            }
            drawEverything();
            if(checkWin()){
                gameOver = true;
                statusMsg = "🏆 VITÓRIA! Parabéns! 🏆";
                drawEverything();
                confetti();
            }
        }
        
        function clearCell() {
            if(gameOver){
                statusMsg = "Jogo acabado, clique NOVO.";
                drawEverything();
                return;
            }
            if(selectedRow===-1){
                statusMsg = "Selecione uma célula.";
                drawEverything();
                return;
            }
            if(fixed[selectedRow][selectedCol]){
                statusMsg = "Célula fixa não pode ser limpa.";
                drawEverything();
                return;
            }
            if(board[selectedRow][selectedCol] !== ""){
                board[selectedRow][selectedCol] = "";
                statusMsg = "Célula limpa.";
                drawEverything();
                if(checkWin()){
                    gameOver = true;
                    statusMsg = "🏆 Vitória! 🏆";
                    drawEverything();
                    confetti();
                }
            } else {
                statusMsg = "Célula já vazia.";
                drawEverything();
            }
        }
        
        function verify() {
            if(gameOver){
                statusMsg = "Jogo já vencido. Comece um novo.";
                drawEverything();
                return;
            }
            let empty = false, conflicts = 0;
            for(let i=0;i<SIZE;i++){
                for(let j=0;j<SIZE;j++){
                    let v = board[i][j];
                    if(v==="") empty = true;
                    else if(!isValidPlacement(board,i,j,v)) conflicts++;
                }
            }
            if(conflicts===0 && !empty){
                statusMsg = "✅ Perfeito! Você venceu! ✅";
                gameOver = true;
                drawEverything();
                confetti();
            } else if(conflicts===0 && empty){
                statusMsg = "✅ Sem conflitos! Continue preenchendo.";
            } else {
                statusMsg = `⚠️ ${conflicts} conflito(s) encontrado(s)!`;
            }
            drawEverything();
        }
        
        // ---------- Desenho ----------
        function drawEverything() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawGrid();
            drawSymbols();
            drawPaletteAndButtons();
            drawStatus();
        }
        
        function drawGrid() {
            // fundo claro
            ctx.fillStyle = "#fef7e0";
            ctx.fillRect(0,0,GRID,GRID);
            // células
            for(let r=0;r<SIZE;r++){
                for(let c=0;c<SIZE;c++){
                    let x = c*CELL, y = r*CELL;
                    let bg = "#ffffff";
                    let isFixed = fixed[r][c];
                    let isSel = (selectedRow===r && selectedCol===c);
                    let hasConflict = false;
                    let val = board[r][c];
                    if(val !== "" && !isFixed && !isValidPlacement(board,r,c,val)) hasConflict = true;
                    if(isFixed) bg = "#e8e0d0";
                    else if(hasConflict) bg = "#f8d7da";
                    else if(isSel) bg = "#ffe0a3";
                    else if(selectedRow!==-1){
                        if(r===selectedRow || c===selectedCol) bg = "#f9f0df";
                        let sr = Math.floor(selectedRow/BOX)*BOX, sc = Math.floor(selectedCol/BOX)*BOX;
                        if(r>=sr && r<sr+BOX && c>=sc && c<sc+BOX && !(r===selectedRow || c===selectedCol)) bg = "#efe0bd";
                    }
                    ctx.fillStyle = bg;
                    ctx.fillRect(x,y,CELL-1,CELL-1);
                    ctx.strokeStyle = "#aaa";
                    ctx.strokeRect(x,y,CELL-1,CELL-1);
                }
            }
            // linhas grossas
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#333";
            for(let i=0;i<=SIZE;i++){
                if(i%BOX===0) ctx.lineWidth = 3;
                else ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(i*CELL,0);
                ctx.lineTo(i*CELL,GRID);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0,i*CELL);
                ctx.lineTo(GRID,i*CELL);
                ctx.stroke();
            }
        }
        
        function drawSymbols() {
            ctx.font = `bold ${Math.floor(CELL*0.45)}px monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            for(let r=0;r<SIZE;r++){
                for(let c=0;c<SIZE;c++){
                    let v = board[r][c];
                    if(v==="") continue;
                    let x = c*CELL+CELL/2, y = r*CELL+CELL/2;
                    let color = "#2c3e2f";
                    if(fixed[r][c]) color = "#3b2a1f";
                    else if(!isValidPlacement(board,r,c,v)) color = "#c0392b";
                    ctx.fillStyle = color;
                    ctx.fillText(v,x,y);
                }
            }
        }
        
        function drawPaletteAndButtons() {
            let startX = (GRID - (SYMBOLS.length*(BTN_W+8))) / 2;
            symbolAreas = [];
            for(let i=0;i<SYMBOLS.length;i++){
                let x = startX + i*(BTN_W+8);
                let y = PAL_Y;
                ctx.fillStyle = "#f0e6d2";
                ctx.fillRect(x,y,BTN_W,BTN_W);
                ctx.strokeStyle = "#b0a07c";
                ctx.strokeRect(x,y,BTN_W,BTN_W);
                ctx.fillStyle = "#2d3e2b";
                ctx.font = `28px monospace`;
                ctx.fillText(SYMBOLS[i], x+BTN_W/2, y+BTN_W/2);
                symbolAreas.push({x,y,w:BTN_W,h:BTN_W,sym:SYMBOLS[i]});
            }
            // botão limpar
            let eraseX = startX + SYMBOLS.length*(BTN_W+8) + 12;
            ctx.fillStyle = "#d9c8aa";
            ctx.fillRect(eraseX, PAL_Y, BTN_W, BTN_W);
            ctx.strokeRect(eraseX, PAL_Y, BTN_W, BTN_W);
            ctx.fillStyle = "#3b2a1f";
            ctx.fillText("⌫", eraseX+BTN_W/2, PAL_Y+BTN_W/2);
            clearArea = {x:eraseX, y:PAL_Y, w:BTN_W, h:BTN_W};
            
            // botões NOVO e VERIFICAR
            let newX = GRID/2 - 70;
            let btnY = PAL_Y + 60;
            ctx.fillStyle = "#4a6741";
            ctx.fillRect(newX, btnY, 100, 40);
            ctx.fillStyle = "white";
            ctx.font = "bold 20px 'Segoe UI'";
            ctx.fillText("NOVO", newX+50, btnY+26);
            newArea = {x:newX, y:btnY, w:100, h:40};
            
            let checkX = GRID/2 + 30;
            ctx.fillRect(checkX, btnY, 110, 40);
            ctx.fillText("VERIFICAR", checkX+55, btnY+26);
            checkArea = {x:checkX, y:btnY, w:110, h:40};
        }
        
        function drawStatus() {
            ctx.font = "bold 15px monospace";
            ctx.fillStyle = "#2c3e2f";
            ctx.textAlign = "center";
            ctx.fillText(statusMsg, GRID/2, STATUS_Y);
        }
        
        // ---------- Eventos (toque e mouse) ----------
        function getCanvasCoords(e) {
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches){
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            return {x:Math.min(Math.max(0,canvasX),canvas.width), y:Math.min(Math.max(0,canvasY),canvas.height)};
        }
        
        function onClick(e) {
            e.preventDefault();
            let {x,y} = getCanvasCoords(e);
            // verifica botões da paleta
            for(let area of symbolAreas){
                if(x>=area.x && x<=area.x+area.w && y>=area.y && y<=area.y+area.h){
                    placeSymbol(area.sym);
                    return;
                }
            }
            if(clearArea && x>=clearArea.x && x<=clearArea.x+clearArea.w && y>=clearArea.y && y<=clearArea.y+clearArea.h){
                clearCell();
                return;
            }
            if(newArea && x>=newArea.x && x<=newArea.x+newArea.w && y>=newArea.y && y<=newArea.y+newArea.h){
                newGame();
                return;
            }
            if(checkArea && x>=checkArea.x && x<=checkArea.x+checkArea.w && y>=checkArea.y && y<=checkArea.y+checkArea.h){
                verify();
                return;
            }
            // clique no grid
            if(x>=0 && x<GRID && y>=0 && y<GRID){
                let col = Math.floor(x/CELL);
                let row = Math.floor(y/CELL);
                if(row>=0 && row<SIZE && col>=0 && col<SIZE){
                    if(gameOver){
                        statusMsg = "Jogo finalizado. Clique NOVO.";
                        drawEverything();
                        return;
                    }
                    if(fixed[row][col]){
                        selectedRow = row;
                        selectedCol = col;
                        statusMsg = `Célula fixa: ${board[row][col]} (não editável)`;
                    } else {
                        selectedRow = row;
                        selectedCol = col;
                        statusMsg = `Célula (${row+1},${col+1}) selecionada. Toque num símbolo.`;
                    }
                    drawEverything();
                }
            }
        }
        
        canvas.addEventListener('touchstart', onClick, {passive:false});
        canvas.addEventListener('mousedown', onClick);
        
        // Iniciar jogo
        newGame();
    })();
</script>
</body>
</html>
