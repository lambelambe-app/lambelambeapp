<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fluxos | Tecido em Dança Eterna – Museu do Amanhã</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', 'Poppins', sans-serif;
            background-color: #000510;
        }
        .poetic-note {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            color: rgba(150, 220, 255, 0.7);
            font-size: 13px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            width: fit-content;
            margin: 0 auto;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 300;
            letter-spacing: 1.2px;
            transition: opacity 1.5s ease;
            font-family: monospace;
            border: 1px solid rgba(100, 200, 255, 0.2);
        }
        @media (max-width: 700px) {
            .poetic-note { font-size: 10px; bottom: 12px; }
        }
        .poetic-note.fade-out { opacity: 0; }
        .touch-ripple {
            position: fixed;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100,200,255,0.5) 0%, rgba(100,200,255,0) 70%);
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: transform 0.08s;
            will-change: left, top;
        }
    </style>
</head>
<body>
    <div class="poetic-note" id="poeticNote">✨ fluxo eterno | o tecido dança sem nunca tocar o chão ✨</div>
    <div id="touchRipple" class="touch-ripple" style="display: none;"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- CENA IMERSIVA APRIMORADA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000510);
        scene.fog = new THREE.FogExp2(0x000510, 0.0055);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.8, 4.5, 8.0);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, precision: 'highp' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);

        // Pós-processamento bloom aprimorado para efeito etéreo
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.1, 0.4, 0.28);
        bloomPass.threshold = 0.06;
        bloomPass.strength = 0.85;
        bloomPass.radius = 0.75;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // Controles orbitais suavizados
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.065;
        controls.rotateSpeed = 0.85;
        controls.zoomSpeed = 0.95;
        controls.enablePan = true;
        controls.panSpeed = 0.65;
        controls.target.set(0, 1.5, 0);

        // --- SISTEMA DE ILUMINAÇÃO APRIMORADO ---
        const ambientLight = new THREE.AmbientLight(0x1a3a5a, 0.55);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(4.0, 7.0, 3.2);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.far = 20;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4499dd, 0.65);
        fillLight.position.set(0, -0.5, 0);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0x66bbff, 0.7);
        backLight.position.set(-2.5, 2.8, -4.0);
        scene.add(backLight);
        
        const windLight = new THREE.PointLight(0x33ddff, 0.95);
        windLight.castShadow = false;
        scene.add(windLight);
        
        const coreLight = new THREE.PointLight(0x00ccff, 1.0);
        coreLight.position.set(0, -0.2, 0);
        coreLight.distance = 6.0;
        scene.add(coreLight);

        // --- ELEMENTOS CÊNICOS APRIMORADOS ---
        const gridHelper = new THREE.GridHelper(15, 28, 0x55bbff, 0x2a5588);
        gridHelper.position.y = -0.1;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);
        
        const shadowCatcher = new THREE.Mesh(
            new THREE.PlaneGeometry(12.5, 12.5),
            new THREE.ShadowMaterial({ opacity: 0.35, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        shadowCatcher.rotation.x = -Math.PI / 2;
        shadowCatcher.position.y = -0.12;
        shadowCatcher.receiveShadow = true;
        scene.add(shadowCatcher);
        
        // Anel luminoso aprimorado (fonte de fluxo)
        const airRing = new THREE.Mesh(
            new THREE.RingGeometry(1.5, 2.9, 56),
            new THREE.MeshStandardMaterial({ 
                color: 0x1a9eff, 
                emissive: 0x0066cc, 
                transparent: true, 
                opacity: 0.45, 
                side: THREE.DoubleSide,
                emissiveIntensity: 0.8
            })
        );
        airRing.rotation.x = -Math.PI / 2;
        airRing.position.y = -0.11;
        scene.add(airRing);

        // --- TECIDO PRINCIPAL: MALHA ULTRA-FINA E FLUTUANTE ---
        const width = 8.0;
        const depth = 8.0;
        const segments = 220; // resolução ainda mais alta para movimentos orgânicos
        const geometry = new THREE.PlaneGeometry(width, depth, segments, segments);
        const positions = geometry.attributes.position.array;
        const origX = [];
        const origZ = [];
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const z = positions[i+1];
            positions[i] = x;
            positions[i+1] = 0;
            positions[i+2] = z;
            origX.push(x);
            origZ.push(z);
        }
        geometry.computeVertexNormals();
        
        // Textura do tecido aprimorada com aparência fibrosa e luminosa
        const texCanvas = document.createElement('canvas');
        texCanvas.width = 512;
        texCanvas.height = 512;
        const texCtx = texCanvas.getContext('2d');
        const refreshTexture = () => {
            texCtx.fillStyle = '#051020';
            texCtx.fillRect(0, 0, texCanvas.width, texCanvas.height);
            texCtx.strokeStyle = '#99ddff';
            texCtx.lineWidth = 1.2;
            for (let i = 0; i < 450; i++) {
                texCtx.beginPath();
                texCtx.moveTo(i * 5.5, 0);
                texCtx.lineTo(i * 5.5 + 20, texCanvas.height);
                texCtx.stroke();
                texCtx.beginPath();
                texCtx.moveTo(0, i * 5.5);
                texCtx.lineTo(texCanvas.width, i * 5.5 + 14);
                texCtx.stroke();
            }
            texCtx.fillStyle = '#ddeeffcc';
            for (let p = 0; p < 2600; p++) {
                texCtx.fillRect(Math.random() * texCanvas.width, Math.random() * texCanvas.height, 0.9, 0.9);
            }
            const grad = texCtx.createLinearGradient(0, 0, texCanvas.width, texCanvas.height);
            grad.addColorStop(0, 'rgba(80, 170, 255, 0.35)');
            grad.addColorStop(0.5, 'rgba(50, 130, 200, 0.25)');
            grad.addColorStop(1, 'rgba(30, 90, 150, 0.4)');
            texCtx.fillStyle = grad;
            texCtx.fillRect(0, 0, texCanvas.width, texCanvas.height);
            fabricTexture.needsUpdate = true;
        };
        const fabricTexture = new THREE.CanvasTexture(texCanvas);
        refreshTexture();
        
        const fabricMaterial = new THREE.MeshStandardMaterial({
            map: fabricTexture,
            color: 0x5aacff,
            emissive: 0x1a6699,
            emissiveIntensity: 0.38,
            roughness: 0.35,
            metalness: 0.72,
            transparent: true,
            opacity: 0.92,
            side: THREE.DoubleSide
        });
        
        const fabricMesh = new THREE.Mesh(geometry, fabricMaterial);
        fabricMesh.castShadow = true;
        fabricMesh.receiveShadow = false;
        scene.add(fabricMesh);
        
        // --- PARTÍCULAS DE AR APRIMORADAS (Vento Ascendente) ---
        const particleCount = 3500;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleSpeeds = [];
        for (let i = 0; i < particleCount; i++) {
            const r = Math.random() * 4.8;
            const ang = Math.random() * Math.PI * 2;
            const x = Math.cos(ang) * r;
            const z = Math.sin(ang) * r;
            particlePositions[i*3] = x;
            particlePositions[i*3+1] = Math.random() * 3.0;
            particlePositions[i*3+2] = z;
            particleSpeeds.push(0.008 + Math.random() * 0.016 + (1.3 - r * 0.22) * 0.005);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ 
            color: 0x99ddff, 
            size: 0.045, 
            transparent: true, 
            blending: THREE.AdditiveBlending, 
            opacity: 0.7,
            sizeAttenuation: true
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // --- MOVIMENTO DO TECIDO: FLUXOS IMPREVISÍVEIS E ORGÂNICOS ---
        const vertexCount = geometry.attributes.position.count;
        const positionAttr = geometry.attributes.position;
        const yArray = positionAttr.array;
        
        // Parâmetros de animação que evoluem suavemente
        let time = 0;
        let freq1 = 0.80, freq2 = 1.25, freq3 = 1.75, freq4 = 2.15;
        let speed1 = 0.95, speed2 = 1.18, speed3 = 0.82, speed4 = 1.45;
        let warpX = 0.0, warpZ = 0.0;
        
        // Perturbações por vértice para assinatura única
        const perVertexOffset = new Array(vertexCount);
        for (let i = 0; i < vertexCount; i++) {
            perVertexOffset[i] = {
                a: Math.sin(i * 0.021) * 0.09,
                b: Math.cos(i * 0.019) * 0.09,
                c: Math.sin(i * 0.033) * 0.06
            };
        }
        
        // Função de altura aprimorada: combina múltiplas ondas para movimento hipnotizante
        function computeFluxHeight(x, z, t, idx) {
            // Ondas viajantes com direções variadas - aumentadas para movimento mais fluido
            const wav1 = Math.sin(x * freq1 + t * speed1) * Math.cos(z * 0.95 + t * 0.75) * 0.32;
            const wav2 = Math.sin(x * 1.35 - t * 1.08) * Math.sin(z * 1.15 + t * 0.88) * 0.26;
            const wav3 = Math.cos(x * freq2 + t * speed2) * 0.22;
            const wav4 = Math.sin(z * freq3 + t * speed3) * 0.24;
            const wav5 = Math.sin((x * 1.85 + z * 1.45) * 0.92 + t * 1.28) * 0.18;
            const wav6 = Math.cos((x * 2.25 - z * 1.75) * 0.82 + t * 1.68) * 0.16;
            
            // Ondas de alta frequência para textura de movimento
            const ripple = Math.sin(x * 3.4 + t * 2.4) * Math.cos(z * 3.2 + t * 2.0) * 0.08;
            const spiral = Math.sin((x*x*0.32 + z*z*0.32) * 1.25 + t * 1.85) * 0.07;
            
            // Assinatura individual por vértice (fibras vivas)
            const micro = perVertexOffset[idx].a * Math.sin(t * 1.5 + perVertexOffset[idx].b) + perVertexOffset[idx].c * Math.cos(t * 2.2);
            
            // Modulação lenta da amplitude (respiração)
            const breath = Math.sin(t * 0.25) * 0.055;
            
            // Altura base com flutuação aumentada
            let y = 1.45 + wav1 + wav2 + wav3 + wav4 + wav5 + wav6 + ripple + spiral + micro + breath;
            
            // Limites: nunca abaixo de 0.65 (não toca o chão)
            if (y < 0.65) y = 0.65;
            if (y > 2.45) y = 2.45;
            return y;
        }
        
        // Evolução dos parâmetros de frequência para variedade infinita
        function evolveFlowParameters(deltaTime) {
            freq1 = 0.80 + Math.sin(time * 0.052) * 0.14;
            freq2 = 1.20 + Math.cos(time * 0.048) * 0.20;
            freq3 = 1.70 + Math.sin(time * 0.040) * 0.18;
            speed1 = 0.90 + Math.cos(time * 0.063) * 0.16;
            speed2 = 1.10 + Math.sin(time * 0.072) * 0.21;
            speed3 = 0.76 + Math.cos(time * 0.060) * 0.15;
            warpX = Math.sin(time * 0.13) * 0.095;
            warpZ = Math.cos(time * 0.12) * 0.095;
        }
        
        // --- INTERATIVIDADE TÁTIL APRIMORADA ---
        let yExtra = new Array(vertexCount).fill(0);
        let colorHeat = new Array(vertexCount).fill(0);
        let touchTrail = [];
        
        function applyTouchInfluence(xzX, xzZ, radius, intensity, colorIntensity = 0) {
            const radSq = radius * radius;
            for (let i = 0; i < vertexCount; i++) {
                const dx = origX[i] - xzX;
                const dz = origZ[i] - xzZ;
                const distSq = dx*dx + dz*dz;
                if (distSq < radSq) {
                    const factor = (1 - Math.sqrt(distSq)/radius) * intensity;
                    yExtra[i] += factor * 0.22;
                    if (yExtra[i] > 0.72) yExtra[i] = 0.72;
                    if (colorIntensity > 0) {
                        colorHeat[i] += factor * colorIntensity * 0.14;
                        if (colorHeat[i] > 1.0) colorHeat[i] = 1.0;
                    }
                }
            }
        }
        
        function addTouchRipple(x, z, strength) {
            applyTouchInfluence(x, z, 1.15, strength, 0.14);
            touchTrail.push({ x, z, strength: strength * 0.75, age: 1.0 });
            if (touchTrail.length > 40) touchTrail.shift();
        }
        
        // Gestão de eventos
        let pointerMap = new Map();
        let pressTimers = new Map();
        
        function getIntersectPoint(clientX, clientY) {
            const raycaster = new THREE.Raycaster();
            const mouseVec = new THREE.Vector2(
                (clientX / renderer.domElement.clientWidth) * 2 - 1,
                -(clientY / renderer.domElement.clientHeight) * 2 + 1
            );
            raycaster.setFromCamera(mouseVec, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 1.3);
            const point = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, point)) {
                return { x: point.x, z: point.z, valid: Math.abs(point.x) < 4.5 && Math.abs(point.z) < 4.5 };
            }
            return { x: 0, z: 0, valid: false };
        }
        
        function onPointerMove(clientX, clientY, id) {
            const { x, z, valid } = getIntersectPoint(clientX, clientY);
            if (!valid) return;
            applyTouchInfluence(x, z, 1.0, 0.20, 0.04);
            touchTrail.push({ x, z, strength: 0.28, age: 1.0 });
            if (touchTrail.length > 45) touchTrail.shift();
        }
        
        function onPointerDown(clientX, clientY, id) {
            const { x, z, valid } = getIntersectPoint(clientX, clientY);
            if (!valid) return;
            addTouchRipple(x, z, 0.50);
            const timer = setTimeout(() => {
                applyTouchInfluence(x, z, 1.4, 0.45, 0.60);
                coreLight.intensity = 1.3;
                setTimeout(() => { coreLight.intensity = 0.9; }, 400);
            }, 500);
            pressTimers.set(id, timer);
            pointerMap.set(id, { x, z });
        }
        
        function onPointerUp(id) {
            if (pressTimers.has(id)) {
                clearTimeout(pressTimers.get(id));
                pressTimers.delete(id);
            }
            pointerMap.delete(id);
        }
        
        // Eventos
        renderer.domElement.addEventListener('mousemove', (e) => {
            onPointerMove(e.clientX, e.clientY, 'mouse');
            document.getElementById('poeticNote')?.classList.add('fade-out');
        });
        renderer.domElement.addEventListener('mousedown', (e) => onPointerDown(e.clientX, e.clientY, 'mouse'));
        window.addEventListener('mouseup', () => onPointerUp('mouse'));
        
        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                onPointerMove(touch.clientX, touch.clientY, touch.identifier);
            }
            const ripple = document.getElementById('touchRipple');
            if (ripple && e.touches.length) {
                ripple.style.display = 'block';
                ripple.style.left = e.touches[0].clientX + 'px';
                ripple.style.top = e.touches[0].clientY + 'px';
            }
        });
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                onPointerDown(touch.clientX, touch.clientY, touch.identifier);
            }
            document.getElementById('poeticNote')?.classList.add('fade-out');
            const ripple = document.getElementById('touchRipple');
            if (ripple) ripple.style.display = 'block';
        });
        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                onPointerUp(e.changedTouches[i].identifier);
            }
            if (e.touches.length === 0) {
                document.getElementById('touchRipple')?.setAttribute('style', 'display: none');
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            const ripple = document.getElementById('touchRipple');
            if (ripple && ripple.style.display === 'block') {
                ripple.style.left = e.clientX + 'px';
                ripple.style.top = e.clientY + 'px';
            }
        });
        
        // --- LOOP PRINCIPAL APRIMORADO ---
        let lastTimestamp = 0;
        
        function updateInteractionsDecay() {
            for (let i = 0; i < vertexCount; i++) {
                yExtra[i] *= 0.993;
                if (Math.abs(yExtra[i]) < 0.002) yExtra[i] = 0;
                if (colorHeat[i] > 0) {
                    colorHeat[i] *= 0.995;
                    if (colorHeat[i] < 0.01) colorHeat[i] = 0;
                }
            }
            for (let i = 0; i < touchTrail.length; i++) {
                touchTrail[i].age *= 0.96;
                touchTrail[i].strength *= 0.97;
            }
            touchTrail = touchTrail.filter(t => t.age > 0.05);
        }
        
        function updateFabricDynamicColor() {
            let avgHeat = 0;
            let countHeat = 0;
            for (let i = 0; i < vertexCount; i++) {
                if (colorHeat[i] > 0.01) {
                    avgHeat += colorHeat[i];
                    countHeat++;
                }
            }
            const heatFactor = countHeat > 0 ? Math.min(avgHeat / countHeat, 1.0) : 0;
            const r = 0.25 + heatFactor * 0.75;
            const g = 0.45 + heatFactor * 0.45;
            const b = 0.85 - heatFactor * 0.55;
            fabricMaterial.color.setRGB(r, g, b);
            fabricMaterial.emissiveIntensity = 0.32 + heatFactor * 0.60;
            coreLight.color.setHSL(0.56 - heatFactor * 0.22, 1.0, 0.62);
        }
        
        function updateParticles() {
            const posAttr = particleGeo.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                let y = posAttr[i*3+1];
                y += particleSpeeds[i];
                if (y > 3.3) {
                    y = -0.5;
                    const newR = Math.random() * 4.8;
                    const newAng = Math.random() * Math.PI * 2;
                    posAttr[i*3] = Math.cos(newAng) * newR;
                    posAttr[i*3+2] = Math.sin(newAng) * newR;
                    particleSpeeds[i] = 0.008 + Math.random() * 0.017;
                }
                posAttr[i*3+1] = y;
                posAttr[i*3] += Math.sin(time + i) * 0.0009;
                posAttr[i*3+2] += Math.cos(time * 0.92 + i) * 0.0009;
            }
            particleGeo.attributes.position.needsUpdate = true;
        }
        
        function animate(currentTime) {
            const delta = Math.min(0.033, (currentTime - lastTimestamp) / 1000);
            lastTimestamp = currentTime;
            
            time += 0.016;
            evolveFlowParameters(delta);
            updateInteractionsDecay();
            
            // Recalcular altura de todos os vértices
            for (let i = 0; i < vertexCount; i++) {
                const x = origX[i];
                const z = origZ[i];
                const xw = x + Math.sin(z * 0.52 + time * 0.42) * warpX;
                const zw = z + Math.cos(x * 0.52 + time * 0.38) * warpZ;
                let baseY = computeFluxHeight(xw, zw, time, i);
                baseY += yExtra[i] * 0.92;
                for (let trail of touchTrail) {
                    const dx = x - trail.x;
                    const dz = z - trail.z;
                    const dist = Math.hypot(dx, dz);
                    if (dist < 0.90) {
                        baseY += (1 - dist / 0.90) * trail.strength * 0.20 * trail.age;
                    }
                }
                if (baseY < 0.65) baseY = 0.65;
                if (baseY > 2.45) baseY = 2.45;
                yArray[i*3+1] = baseY;
            }
            positionAttr.needsUpdate = true;
            geometry.computeVertexNormals();
            
            updateFabricDynamicColor();
            updateParticles();
            
            // Animação da textura
            fabricTexture.offset.x += 0.00045;
            fabricTexture.offset.y += 0.00035;
            
            // Luzes dançantes aprimoradas
            windLight.position.x = Math.sin(time * 0.92) * 3.0;
            windLight.position.z = Math.cos(time * 1.12) * 2.7;
            windLight.position.y = 1.5 + Math.sin(time * 1.75) * 1.0;
            windLight.intensity = 0.75 + Math.sin(time * 2.15) * 0.30;
            coreLight.intensity = 0.8 + Math.sin(time * 1.95) * 0.28 + (pointerMap.size > 0 ? 0.15 : 0);
            
            controls.update();
            effectComposer.render();
            
            requestAnimationFrame(animate);
        }
        
        requestAnimationFrame(animate);
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        setTimeout(() => {
            const note = document.getElementById('poeticNote');
            if (note) note.classList.add('fade-out');
        }, 6000);
        
        console.log('✨ Fluxos Aprimorado | O tecido dança eternamente com movimento hipnotizante e fluido.');
    </script>
</body>
</html>
