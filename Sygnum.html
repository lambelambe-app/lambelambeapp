<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <!-- METADADOS PARA CLASSIFICAÇÃO DE CONTEÚDO - SEGURANÇA PARA CRIANÇAS -->
    <meta name="rating" content="General">
    <meta name="distribution" content="Global">
    <meta name="audience" content="Everyone">
    <meta name="content-language" content="pt-br">
    <meta name="googlebot" content="index, follow">
    <meta name="age-rating" content="General Audiences">
    <meta name="category" content="Puzzle Game">
    <meta name="suitable-for-children" content="yes">
    <meta name="child-directed" content="true">
    <meta name="max-ad-content-rating" content="G">
    
    <title>Symbolum - Sudoku de Símbolos (Phaser 2D)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1e3c2c 0%, #2a4a35 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', monospace;
            padding: 20px;
            margin: 0;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fef7e0;
            border-radius: 48px;
            padding: 20px 20px 25px 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }

        #game-container {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
        }

        .safety-note {
            text-align: center;
            font-size: 0.7rem;
            color: #3b5c3a;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #d4c9a6;
            font-weight: 500;
        }

        .privacy-link {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 8px;
        }
        .privacy-link a {
            color: #2c5e2a;
            text-decoration: none;
            font-weight: bold;
        }
        .privacy-link a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 700px) {
            .game-wrapper {
                padding: 12px;
            }
        }
    </style>
    <!-- Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<div class="game-wrapper">
    <div id="game-container"></div>
    <div class="safety-note">✔️ Jogo seguro para todas as idades | Sem anúncios inadequados | Apenas diversão e lógica</div>
    <div class="privacy-link">
        <a href="#" target="_blank">🔒 Política de Privacidade</a> – Este app não coleta dados pessoais.
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURAÇÃO DE SEGURANÇA PARA CRIANÇAS (COPPA/GDPR)
    // ============================================================
    (function() {
        window.google_tag_for_child_directed_treatment = 1;
        window.google_tag_for_under_age_of_consent = 1;
        window.google_max_ad_content_rating = "G";
        if (typeof googletag !== 'undefined' && googletag.pubads) {
            try {
                googletag.pubads().setTagForChildDirectedTreatment(1);
                googletag.pubads().setMaxAdContentRating('G');
                googletag.pubads().setRequestNonPersonalizedAds(1);
            } catch(e) {}
        }
        window.SYMBOLUM_CHILD_SAFE = true;
        window.SYMBOLUM_AGE_RATING = "G";
        console.log("[Symbolum] Modo seguro para crianças ativado.");
    })();

    // ==================== CONFIGURAÇÕES DO JOGO ====================
    const SYMBOLS = ["@", "#", "$", "%", "&", "?", "*", "+", "~"];
    const SIZE = 9;
    const BOX_SIZE = 3;
    const CELL_SIZE = 60;        // 60x60 pixels
    const GRID_SIZE = CELL_SIZE * SIZE;  // 540x540
    const PALETTE_Y = GRID_SIZE + 70;     // posição Y da paleta
    const STATUS_Y = PALETTE_Y + 85;      // posição do texto de status
    
    // Estado do jogo
    let board = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    let solution = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    let fixedCells = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
    let selectedRow = -1, selectedCol = -1;
    let currentGameOver = false;
    
    // Referências globais da cena
    let scene = null;
    let gridGraphics = [];     // armazenar objetos gráficos das células
    let statusText = null;
    let paletteButtons = [];
    let activePaletteIndex = -1;
    
    // ==================== FUNÇÕES DE LÓGICA DO SUDOKU ====================
    function isValidPlacement(boardTemp, row, col, symbol) {
        for (let c = 0; c < SIZE; c++) {
            if (c !== col && boardTemp[row][c] === symbol) return false;
        }
        for (let r = 0; r < SIZE; r++) {
            if (r !== row && boardTemp[r][col] === symbol) return false;
        }
        const startRow = Math.floor(row / BOX_SIZE) * BOX_SIZE;
        const startCol = Math.floor(col / BOX_SIZE) * BOX_SIZE;
        for (let r = startRow; r < startRow + BOX_SIZE; r++) {
            for (let c = startCol; c < startCol + BOX_SIZE; c++) {
                if ((r !== row || c !== col) && boardTemp[r][c] === symbol) return false;
            }
        }
        return true;
    }
    
    function findEmpty(boardArr) {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                if (boardArr[i][j] === "") return [i, j];
            }
        }
        return null;
    }
    
    function solveSudoku(boardArr) {
        const emptySpot = findEmpty(boardArr);
        if (!emptySpot) return true;
        const [row, col] = emptySpot;
        const shuffledSymbols = [...SYMBOLS];
        for (let i = shuffledSymbols.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledSymbols[i], shuffledSymbols[j]] = [shuffledSymbols[j], shuffledSymbols[i]];
        }
        for (let sym of shuffledSymbols) {
            if (isValidPlacement(boardArr, row, col, sym)) {
                boardArr[row][col] = sym;
                if (solveSudoku(boardArr)) return true;
                boardArr[row][col] = "";
            }
        }
        return false;
    }
    
    function generateFullSolution() {
        let full = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        // fallback inicial para garantir que o solver tenha algo
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                full[i][j] = SYMBOLS[(i * 3 + j) % SYMBOLS.length];
            }
        }
        solveSudoku(full);
        return full;
    }
    
    function generateNewPuzzle() {
        // Gera solução completa aleatória
        let fullSolution = generateFullSolution();
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                solution[i][j] = fullSolution[i][j];
            }
        }
        
        // Cria o puzzle removendo células
        let puzzleBoard = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                puzzleBoard[i][j] = solution[i][j];
            }
        }
        
        const cellsToRemove = 48 + Math.floor(Math.random() * 12);
        let removed = 0;
        while (removed < cellsToRemove) {
            const row = Math.floor(Math.random() * SIZE);
            const col = Math.floor(Math.random() * SIZE);
            if (puzzleBoard[row][col] !== "") {
                puzzleBoard[row][col] = "";
                removed++;
            }
        }
        
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                board[i][j] = puzzleBoard[i][j];
                fixedCells[i][j] = (puzzleBoard[i][j] !== "");
            }
        }
        
        currentGameOver = false;
        selectedRow = -1;
        selectedCol = -1;
        if (scene) {
            updateAllCellsVisual();
            updateStatusMessage("Novo desafio! Clique em uma célula e depois num símbolo.");
        }
    }
    
    function checkVictory() {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") return false;
                if (!isValidPlacement(board, i, j, val)) return false;
            }
        }
        return true;
    }
    
    // ==================== EFEITOS VISUAIS (CONFETES) ====================
    function launchSymbolConfetti() {
        if (!scene) return;
        const particles = scene.add.particles(0, 0, 'confettiEmitter', {
            frame: false,
            lifespan: 2500,
            speedY: { min: 200, max: 400 },
            speedX: { min: -150, max: 150 },
            scale: { start: 0.8, end: 0.1 },
            alpha: { start: 1, end: 0 },
            tint: [0xffaa44, 0xff6644, 0x44ffaa, 0xff44aa, 0xaaff44],
            emitting: false
        });
        // Cria partículas personalizadas com símbolos (usando texto dinâmico)
        // Abordagem mais simples: criar textos animados caindo (como no original)
        const container = document.createElement('div');
        container.style.position = 'fixed';
        container.style.top = '0';
        container.style.left = '0';
        container.style.width = '100%';
        container.style.height = '100%';
        container.style.pointerEvents = 'none';
        container.style.zIndex = '9999';
        document.body.appendChild(container);
        
        for (let i = 0; i < 80; i++) {
            const symbol = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
            const el = document.createElement('div');
            el.textContent = symbol;
            el.style.position = 'absolute';
            el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
            el.style.fontWeight = 'bold';
            el.style.fontFamily = 'monospace';
            el.style.left = Math.random() * 100 + '%';
            el.style.top = '-10%';
            el.style.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
            el.style.textShadow = '0 0 4px gold';
            el.style.opacity = '0.9';
            el.style.animation = `fallSymbol ${1.5 + Math.random() * 1.5}s linear forwards`;
            container.appendChild(el);
            
            setTimeout(() => {
                if (el.parentNode) el.remove();
            }, 3000);
        }
        setTimeout(() => {
            if (container.parentNode) container.remove();
        }, 3200);
        
        // Adiciona keyframes dinamicamente se não existirem
        if (!document.querySelector('#confetti-keyframes')) {
            const style = document.createElement('style');
            style.id = 'confetti-keyframes';
            style.textContent = `
                @keyframes fallSymbol {
                    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
        }
    }
    
    // ==================== ATUALIZAÇÃO VISUAL DO GRID (PHASER) ====================
    function updateAllCellsVisual() {
        if (!scene) return;
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const cellObj = gridGraphics[i][j];
                const value = board[i][j];
                const isFixed = fixedCells[i][j];
                const isSelected = (selectedRow === i && selectedCol === j);
                let hasConflict = false;
                if (value !== "" && !isFixed) {
                    if (!isValidPlacement(board, i, j, value)) hasConflict = true;
                }
                
                // Atualiza cor de fundo
                let bgColor = 0xffffff;
                if (isFixed) bgColor = 0xe8e0d0;
                else if (hasConflict) bgColor = 0xf8d7da;
                else if (isSelected) bgColor = 0xffe0a3;
                else bgColor = 0xffffff;
                
                // Destaque de linha/coluna/quando selecionado
                if (!isSelected && selectedRow !== -1 && selectedCol !== -1) {
                    if (i === selectedRow || j === selectedCol) bgColor = 0xf9f0df;
                    const sRowBlock = Math.floor(selectedRow / BOX_SIZE) * BOX_SIZE;
                    const sColBlock = Math.floor(selectedCol / BOX_SIZE) * BOX_SIZE;
                    if (i >= sRowBlock && i < sRowBlock+BOX_SIZE && j >= sColBlock && j < sColBlock+BOX_SIZE) {
                        if (!(i === selectedRow || j === selectedCol)) bgColor = 0xefe0bd;
                    }
                }
                
                cellObj.bgRect.setFillStyle(bgColor);
                // Atualiza texto
                cellObj.text.setText(value === "" ? "·" : value);
                cellObj.text.setColor(value === "" ? "#8b7a5b" : (isFixed ? "#3b2a1f" : "#2c3e2f"));
                if (hasConflict && !isFixed && value !== "") {
                    cellObj.text.setColor("#c0392b");
                    cellObj.text.setStyle({ fontStyle: "italic", textDecoration: "line-through" });
                } else {
                    cellObj.text.setStyle({ fontStyle: "normal", textDecoration: "none" });
                }
                // Borda extra para célula selecionada
                if (isSelected) {
                    cellObj.bgRect.setStrokeStyle(3, 0xf39c12);
                } else {
                    cellObj.bgRect.setStrokeStyle(1, 0xaaaaaa);
                }
            }
        }
        if (currentGameOver) {
            statusText.setText("🏆 VITÓRIA! Parabéns! 🏆");
            statusText.setColor("#b8860b");
        }
    }
    
    function updateStatusMessage(msg) {
        if (!scene) return;
        if (!currentGameOver) {
            statusText.setText(msg);
            statusText.setColor("#2c3e2f");
        } else {
            statusText.setText("🎉 Vitória! Clique em NOVO para continuar! 🎉");
            statusText.setColor("#b8860b");
        }
    }
    
    // Coloca um símbolo na célula selecionada
    function placeSymbol(symbol) {
        if (currentGameOver) {
            updateStatusMessage("Jogo finalizado! Clique em NOVO JOGO.");
            return;
        }
        if (selectedRow === -1 || selectedCol === -1) {
            updateStatusMessage("Primeiro, clique em uma célula vazia ou editável.");
            return;
        }
        const row = selectedRow;
        const col = selectedCol;
        if (fixedCells[row][col]) {
            updateStatusMessage(`Célula fixa não pode ser alterada.`);
            return;
        }
        
        board[row][col] = symbol;
        const isValidMove = isValidPlacement(board, row, col, symbol);
        if (!isValidMove) {
            updateStatusMessage(`⚠️ Conflito! O símbolo ${symbol} está em conflito.`);
        } else {
            updateStatusMessage(`Símbolo ${symbol} inserido!`);
        }
        
        updateAllCellsVisual();
        if (checkVictory()) {
            currentGameOver = true;
            updateStatusMessage("");
            statusText.setText("🎉✨ VITÓRIA! ✨🎉");
            statusText.setColor("#d4a017");
            launchSymbolConfetti();
            updateAllCellsVisual();
        }
    }
    
    function clearSelectedCell() {
        if (currentGameOver) {
            updateStatusMessage("Já venceu! Inicie um novo.");
            return;
        }
        if (selectedRow === -1 || selectedCol === -1) {
            updateStatusMessage("Selecione uma célula para limpar.");
            return;
        }
        if (fixedCells[selectedRow][selectedCol]) {
            updateStatusMessage("Célula fixa original não pode ser limpa!");
            return;
        }
        if (board[selectedRow][selectedCol] !== "") {
            board[selectedRow][selectedCol] = "";
            updateStatusMessage(`Célula limpa.`);
            updateAllCellsVisual();
            if (checkVictory()) {
                currentGameOver = true;
                launchSymbolConfetti();
                updateAllCellsVisual();
            }
        } else {
            updateStatusMessage("Célula já está vazia.");
        }
    }
    
    function checkBoardErrors() {
        if (currentGameOver) {
            updateStatusMessage("Já venceu! Reinicie para testar outro.");
            return;
        }
        let hasAnyEmpty = false;
        let conflictCount = 0;
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") hasAnyEmpty = true;
                else if (!isValidPlacement(board, i, j, val)) conflictCount++;
            }
        }
        if (conflictCount === 0 && !hasAnyEmpty) {
            updateStatusMessage("🎉✅ Perfeito! Você completou corretamente! Vitória! ✅🎉");
            currentGameOver = true;
            launchSymbolConfetti();
            updateAllCellsVisual();
        } else if (conflictCount === 0 && hasAnyEmpty) {
            updateStatusMessage("✅ Nenhum conflito encontrado! Continue preenchendo.");
        } else {
            updateStatusMessage(`⚠️ Atenção: ${conflictCount} célula(s) em conflito! ⚠️`);
        }
        updateAllCellsVisual();
    }
    
    // ==================== CRIAÇÃO DA CENA PHASER ====================
    class SymbolumGame extends Phaser.Scene {
        constructor() {
            super({ key: 'SymbolumScene' });
        }
        
        preload() {
            // Não precisa carregar assets externos
        }
        
        create() {
            scene = this;
            
            // Fundo da área de jogo
            this.add.rectangle(0, 0, GRID_SIZE, GRID_SIZE + 180, 0xfef7e0).setOrigin(0, 0);
            
            // Desenhar linhas do grid (bordas grossas)
            const graphics = this.add.graphics();
            graphics.lineStyle(2, 0x333333);
            for (let i = 0; i <= SIZE; i++) {
                const lineWidth = (i % BOX_SIZE === 0) ? 3 : 1;
                graphics.lineStyle(lineWidth, 0x333333);
                graphics.beginPath();
                graphics.moveTo(i * CELL_SIZE, 0);
                graphics.lineTo(i * CELL_SIZE, GRID_SIZE);
                graphics.stroke();
                graphics.moveTo(0, i * CELL_SIZE);
                graphics.lineTo(GRID_SIZE, i * CELL_SIZE);
                graphics.stroke();
            }
            
            // Inicializa grid de células interativas
            gridGraphics = [];
            for (let row = 0; row < SIZE; row++) {
                gridGraphics[row] = [];
                for (let col = 0; col < SIZE; col++) {
                    const x = col * CELL_SIZE;
                    const y = row * CELL_SIZE;
                    const bgRect = this.add.rectangle(x + CELL_SIZE/2, y + CELL_SIZE/2, CELL_SIZE-2, CELL_SIZE-2, 0xffffff)
                        .setOrigin(0.5).setInteractive({ useHandCursor: true })
                        .setStrokeStyle(1, 0xaaaaaa);
                    
                    const text = this.add.text(x + CELL_SIZE/2, y + CELL_SIZE/2, "", {
                        fontSize: '32px',
                        fontFamily: 'monospace',
                        fontWeight: 'bold',
                        color: '#2c3e2f'
                    }).setOrigin(0.5);
                    
                    // Evento de clique na célula
                    bgRect.on('pointerdown', () => {
                        if (currentGameOver) {
                            updateStatusMessage("Jogo concluído! Comece uma nova partida.");
                            return;
                        }
                        if (fixedCells[row][col]) {
                            selectedRow = row;
                            selectedCol = col;
                            updateStatusMessage(`Célula fixa: ${board[row][col]} (não editável)`);
                            updateAllCellsVisual();
                        } else {
                            selectedRow = row;
                            selectedCol = col;
                            updateStatusMessage(`Célula selecionada. Clique num símbolo.`);
                            updateAllCellsVisual();
                        }
                    });
                    
                    gridGraphics[row][col] = { bgRect, text };
                }
            }
            
            // Criação da paleta de símbolos
            const paletteStartX = (GRID_SIZE - (SYMBOLS.length * 48)) / 2;
            paletteButtons = [];
            SYMBOLS.forEach((sym, idx) => {
                const btnX = paletteStartX + idx * 48 + 24;
                const btnY = PALETTE_Y;
                const btnBg = this.add.rectangle(btnX, btnY, 44, 44, 0xf0e6d2)
                    .setOrigin(0.5).setInteractive({ useHandCursor: true })
                    .setStrokeStyle(1, 0xb0a07c);
                const btnText = this.add.text(btnX, btnY, sym, {
                    fontSize: '28px',
                    fontFamily: 'monospace',
                    fontWeight: 'bold',
                    color: '#2d3e2b'
                }).setOrigin(0.5);
                
                btnBg.on('pointerdown', () => {
                    if (activePaletteIndex !== -1) {
                        // reset visual do anterior
                        if (paletteButtons[activePaletteIndex]) {
                            paletteButtons[activePaletteIndex].bg.setFillStyle(0xf0e6d2);
                        }
                    }
                    activePaletteIndex = idx;
                    btnBg.setFillStyle(0xffb347);
                    placeSymbol(sym);
                    // reseta destaque após curto tempo
                    setTimeout(() => {
                        if (activePaletteIndex === idx) {
                            btnBg.setFillStyle(0xf0e6d2);
                            activePaletteIndex = -1;
                        }
                    }, 200);
                });
                paletteButtons.push({ bg: btnBg, text: btnText, symbol: sym });
            });
            
            // Botão de limpar (apagar)
            const eraseX = paletteStartX + SYMBOLS.length * 48 + 30;
            const eraseBg = this.add.rectangle(eraseX, PALETTE_Y, 44, 44, 0xd9c8aa)
                .setOrigin(0.5).setInteractive({ useHandCursor: true })
                .setStrokeStyle(1, 0x8b7a5b);
            const eraseText = this.add.text(eraseX, PALETTE_Y, "⌫", {
                fontSize: '28px',
                fontFamily: 'monospace',
                color: '#3b2a1f'
            }).setOrigin(0.5);
            eraseBg.on('pointerdown', () => {
                clearSelectedCell();
                eraseBg.setFillStyle(0xc2aa7a);
                setTimeout(() => eraseBg.setFillStyle(0xd9c8aa), 150);
            });
            
            // Botão NOVO JOGO
            const newBtnX = GRID_SIZE/2 - 100;
            const newBtn = this.add.rectangle(newBtnX, PALETTE_Y + 55, 90, 40, 0x4a6741)
                .setOrigin(0.5).setInteractive({ useHandCursor: true });
            const newText = this.add.text(newBtnX, PALETTE_Y + 55, "NOVO", {
                fontSize: '20px',
                fontWeight: 'bold',
                color: '#ffffff'
            }).setOrigin(0.5);
            newBtn.on('pointerdown', () => {
                generateNewPuzzle();
                selectedRow = -1;
                selectedCol = -1;
                currentGameOver = false;
                updateAllCellsVisual();
                updateStatusMessage("Novo jogo! Selecione uma célula.");
                newBtn.setFillStyle(0x6b8c5c);
                setTimeout(() => newBtn.setFillStyle(0x4a6741), 150);
            });
            
            // Botão VERIFICAR
            const checkBtnX = GRID_SIZE/2 + 100;
            const checkBtn = this.add.rectangle(checkBtnX, PALETTE_Y + 55, 100, 40, 0x4a6741)
                .setOrigin(0.5).setInteractive({ useHandCursor: true });
            const checkText = this.add.text(checkBtnX, PALETTE_Y + 55, "VERIFICAR", {
                fontSize: '18px',
                fontWeight: 'bold',
                color: '#ffffff'
            }).setOrigin(0.5);
            checkBtn.on('pointerdown', () => {
                checkBoardErrors();
                checkBtn.setFillStyle(0x6b8c5c);
                setTimeout(() => checkBtn.setFillStyle(0x4a6741), 150);
            });
            
            // Texto de status
            statusText = this.add.text(GRID_SIZE/2, STATUS_Y, "Clique em uma célula e num símbolo", {
                fontSize: '16px',
                fontWeight: 'bold',
                fontFamily: 'monospace',
                color: '#2c3e2f',
                backgroundColor: '#f0ede0',
                padding: { x: 10, y: 5 },
                align: 'center'
            }).setOrigin(0.5);
            statusText.setBackgroundColor('#f0ede0');
            
            // Inicializar o jogo
            generateNewPuzzle();
            updateAllCellsVisual();
        }
    }
    
    // Configuração do Phaser
    const config = {
        type: Phaser.AUTO,
        parent: 'game-container',
        width: GRID_SIZE,
        height: GRID_SIZE + 160,
        backgroundColor: '#fef7e0',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        scene: SymbolumGame,
        input: {
            activePointers: 2
        }
    };
    
    window.addEventListener('load', () => {
        new Phaser.Game(config);
