<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- METADADOS DE SEGURANÇA PARA CRIANÇAS -->
    <meta name="rating" content="General">
    <meta name="audience" content="Everyone">
    <meta name="child-directed" content="true">
    <meta name="max-ad-content-rating" content="G">
    
    <title>Symbolum - Sudoku de Símbolos (Phaser 2D)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1e3c2c 0%, #2a4a35 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', monospace;
            padding: 16px;
        }

        .game-wrapper {
            background: #fef7e0;
            border-radius: 40px;
            padding: 20px 20px 25px 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-container {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 540px;
            margin: 0 auto;
        }

        .safety-note {
            text-align: center;
            font-size: 0.7rem;
            color: #3b5c3a;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #d4c9a6;
            font-weight: 500;
        }

        .privacy-link {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 8px;
        }
        .privacy-link a {
            color: #2c5e2a;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<div class="game-wrapper">
    <div id="game-container"></div>
    <div class="safety-note">✔️ Jogo seguro para todas as idades | Sem anúncios inadequados | Apenas lógica e diversão</div>
    <div class="privacy-link">
        <a href="#" target="_blank">🔒 Política de Privacidade</a> – Este app não coleta dados pessoais.
    </div>
</div>

<script>
    (function() {
        // Sinalização para anúncios seguros (COPPA/GDPR)
        window.google_tag_for_child_directed_treatment = 1;
        window.google_tag_for_under_age_of_consent = 1;
        window.google_max_ad_content_rating = "G";
        window.SYMBOLUM_CHILD_SAFE = true;
    })();

    // ==================== CONFIGURAÇÕES ====================
    const SYMBOLS = ["@", "#", "$", "%", "&", "?", "*", "+", "~"];
    const SIZE = 9;
    const BOX_SIZE = 3;
    const CELL_SIZE = 60;        // 60x60
    const GRID_SIZE = CELL_SIZE * SIZE;  // 540
    const UI_TOP_OFFSET = 0;
    const PALETTE_Y = GRID_SIZE + 60;
    const STATUS_Y = PALETTE_Y + 70;
    const GAME_HEIGHT = GRID_SIZE + 140;

    // Estado do jogo
    let board = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    let solution = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
    let fixedCells = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
    let selectedRow = -1, selectedCol = -1;
    let currentGameOver = false;
    let sceneRef = null;
    let gridCells = [];     // armazena objetos { bg, text }
    let statusText = null;

    // ========== LÓGICA DO SUDOKU ==========
    function isValidPlacement(boardTemp, row, col, symbol) {
        for (let c = 0; c < SIZE; c++) {
            if (c !== col && boardTemp[row][c] === symbol) return false;
        }
        for (let r = 0; r < SIZE; r++) {
            if (r !== row && boardTemp[r][col] === symbol) return false;
        }
        const startRow = Math.floor(row / BOX_SIZE) * BOX_SIZE;
        const startCol = Math.floor(col / BOX_SIZE) * BOX_SIZE;
        for (let r = startRow; r < startRow + BOX_SIZE; r++) {
            for (let c = startCol; c < startCol + BOX_SIZE; c++) {
                if ((r !== row || c !== col) && boardTemp[r][c] === symbol) return false;
            }
        }
        return true;
    }

    function findEmpty(boardArr) {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                if (boardArr[i][j] === "") return [i, j];
            }
        }
        return null;
    }

    function solveSudoku(boardArr) {
        const emptySpot = findEmpty(boardArr);
        if (!emptySpot) return true;
        const [row, col] = emptySpot;
        const shuffled = [...SYMBOLS];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        for (let sym of shuffled) {
            if (isValidPlacement(boardArr, row, col, sym)) {
                boardArr[row][col] = sym;
                if (solveSudoku(boardArr)) return true;
                boardArr[row][col] = "";
            }
        }
        return false;
    }

    function generateFullSolution() {
        let full = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                full[i][j] = SYMBOLS[(i * 3 + j) % SYMBOLS.length];
            }
        }
        solveSudoku(full);
        return full;
    }

    function generateNewPuzzle() {
        let fullSolution = generateFullSolution();
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                solution[i][j] = fullSolution[i][j];
            }
        }
        let puzzleBoard = Array(SIZE).fill().map(() => Array(SIZE).fill(""));
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                puzzleBoard[i][j] = solution[i][j];
            }
        }
        const cellsToRemove = 48 + Math.floor(Math.random() * 12);
        let removed = 0;
        while (removed < cellsToRemove) {
            const row = Math.floor(Math.random() * SIZE);
            const col = Math.floor(Math.random() * SIZE);
            if (puzzleBoard[row][col] !== "") {
                puzzleBoard[row][col] = "";
                removed++;
            }
        }
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                board[i][j] = puzzleBoard[i][j];
                fixedCells[i][j] = (puzzleBoard[i][j] !== "");
            }
        }
        currentGameOver = false;
        selectedRow = -1;
        selectedCol = -1;
        if (sceneRef) {
            updateAllCellsVisual();
            updateStatusMessage("Novo jogo! Toque em uma célula e depois em um símbolo.");
        }
    }

    function checkVictory() {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") return false;
                if (!isValidPlacement(board, i, j, val)) return false;
            }
        }
        return true;
    }

    // ========== EFEITO DE CONFETE ==========
    function launchConfetti() {
        if (!sceneRef) return;
        // cria partículas simples com texto
        const container = document.createElement('div');
        container.style.position = 'fixed';
        container.style.top = '0';
        container.style.left = '0';
        container.style.width = '100%';
        container.style.height = '100%';
        container.style.pointerEvents = 'none';
        container.style.zIndex = '9999';
        document.body.appendChild(container);
        
        for (let i = 0; i < 80; i++) {
            const symbol = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
            const el = document.createElement('div');
            el.textContent = symbol;
            el.style.position = 'absolute';
            el.style.fontSize = (1 + Math.random() * 1.6) + 'rem';
            el.style.fontWeight = 'bold';
            el.style.fontFamily = 'monospace';
            el.style.left = Math.random() * 100 + '%';
            el.style.top = '-10%';
            el.style.color = `hsl(${Math.random() * 360}, 85%, 65%)`;
            el.style.textShadow = '0 0 3px gold';
            el.style.opacity = '0.9';
            el.style.animation = `fallAnim ${1.5 + Math.random() * 1.8}s linear forwards`;
            container.appendChild(el);
        }
        
        if (!document.querySelector('#confetti-style')) {
            const style = document.createElement('style');
            style.id = 'confetti-style';
            style.textContent = `
                @keyframes fallAnim {
                    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
        }
        
        setTimeout(() => {
            if (container.parentNode) container.remove();
        }, 3200);
    }

    // ========== ATUALIZAÇÃO VISUAL ==========
    function updateAllCellsVisual() {
        if (!sceneRef) return;
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const cell = gridCells[i][j];
                const value = board[i][j];
                const isFixed = fixedCells[i][j];
                const isSelected = (selectedRow === i && selectedCol === j);
                let hasConflict = false;
                if (value !== "" && !isFixed) {
                    if (!isValidPlacement(board, i, j, value)) hasConflict = true;
                }
                
                let bgColor = 0xffffff;
                if (isFixed) bgColor = 0xe8e0d0;
                else if (hasConflict) bgColor = 0xf8d7da;
                else if (isSelected) bgColor = 0xffe0a3;
                
                if (!isSelected && selectedRow !== -1 && selectedCol !== -1) {
                    if (i === selectedRow || j === selectedCol) bgColor = 0xf9f0df;
                    const sRowBlock = Math.floor(selectedRow / BOX_SIZE) * BOX_SIZE;
                    const sColBlock = Math.floor(selectedCol / BOX_SIZE) * BOX_SIZE;
                    if (i >= sRowBlock && i < sRowBlock+BOX_SIZE && j >= sColBlock && j < sColBlock+BOX_SIZE) {
                        if (!(i === selectedRow || j === selectedCol)) bgColor = 0xefe0bd;
                    }
                }
                
                cell.bg.setFillStyle(bgColor);
                if (isSelected) {
                    cell.bg.setStrokeStyle(3, 0xf39c12);
                } else {
                    cell.bg.setStrokeStyle(1, 0xaaaaaa);
                }
                
                cell.text.setText(value === "" ? "·" : value);
                if (value === "") cell.text.setColor("#8b7a5b");
                else if (isFixed) cell.text.setColor("#3b2a1f");
                else if (hasConflict) cell.text.setColor("#c0392b");
                else cell.text.setColor("#2c3e2f");
                
                if (hasConflict && !isFixed && value !== "") {
                    cell.text.setStyle({ fontStyle: "italic", textDecoration: "line-through" });
                } else {
                    cell.text.setStyle({ fontStyle: "normal", textDecoration: "none" });
                }
            }
        }
        if (currentGameOver) {
            statusText.setText("🏆 VITÓRIA! Parabéns! 🏆");
            statusText.setColor("#b8860b");
        }
    }
    
    function updateStatusMessage(msg) {
        if (!sceneRef) return;
        if (!currentGameOver) {
            statusText.setText(msg);
            statusText.setColor("#2c3e2f");
        } else {
            statusText.setText("🎉 Vitória! Clique em NOVO para continuar!");
            statusText.setColor("#b8860b");
        }
    }
    
    function placeSymbol(symbol) {
        if (currentGameOver) {
            updateStatusMessage("Jogo finalizado! Clique em NOVO JOGO.");
            return;
        }
        if (selectedRow === -1 || selectedCol === -1) {
            updateStatusMessage("Primeiro, toque em uma célula vazia ou editável.");
            return;
        }
        if (fixedCells[selectedRow][selectedCol]) {
            updateStatusMessage(`Célula fixa não pode ser alterada.`);
            return;
        }
        const row = selectedRow, col = selectedCol;
        board[row][col] = symbol;
        const valid = isValidPlacement(board, row, col, symbol);
        if (!valid) {
            updateStatusMessage(`⚠️ Conflito! Símbolo ${symbol} em conflito.`);
        } else {
            updateStatusMessage(`Símbolo ${symbol} inserido!`);
        }
        updateAllCellsVisual();
        if (checkVictory()) {
            currentGameOver = true;
            updateStatusMessage("");
            statusText.setText("🎉✨ VITÓRIA! ✨🎉");
            launchConfetti();
            updateAllCellsVisual();
        }
    }
    
    function clearSelected() {
        if (currentGameOver) {
            updateStatusMessage("Já venceu! Inicie um novo.");
            return;
        }
        if (selectedRow === -1 || selectedCol === -1) {
            updateStatusMessage("Selecione uma célula para limpar.");
            return;
        }
        if (fixedCells[selectedRow][selectedCol]) {
            updateStatusMessage("Célula fixa não pode ser limpa.");
            return;
        }
        if (board[selectedRow][selectedCol] !== "") {
            board[selectedRow][selectedCol] = "";
            updateStatusMessage("Célula limpa.");
            updateAllCellsVisual();
            if (checkVictory()) {
                currentGameOver = true;
                launchConfetti();
                updateAllCellsVisual();
            }
        } else {
            updateStatusMessage("Célula já está vazia.");
        }
    }
    
    function checkErrors() {
        if (currentGameOver) {
            updateStatusMessage("Já venceu! Reinicie para testar outro.");
            return;
        }
        let empty = false, conflicts = 0;
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = board[i][j];
                if (val === "") empty = true;
                else if (!isValidPlacement(board, i, j, val)) conflicts++;
            }
        }
        if (conflicts === 0 && !empty) {
            updateStatusMessage("🎉✅ Perfeito! Você venceu! ✅🎉");
            currentGameOver = true;
            launchConfetti();
            updateAllCellsVisual();
        } else if (conflicts === 0 && empty) {
            updateStatusMessage("✅ Nenhum conflito! Continue preenchendo.");
        } else {
            updateStatusMessage(`⚠️ ${conflicts} célula(s) em conflito!`);
        }
        updateAllCellsVisual();
    }
    
    // ========== CENA PRINCIPAL PHASER ==========
    class SymbolumGame extends Phaser.Scene {
        constructor() {
            super({ key: "SymbolumGame" });
        }
        
        create() {
            sceneRef = this;
            // Fundo claro
            this.add.rectangle(0, 0, GRID_SIZE, GAME_HEIGHT, 0xfef7e0).setOrigin(0, 0);
            
            // Desenha linhas do grid
            const graphics = this.add.graphics();
            for (let i = 0; i <= SIZE; i++) {
                const thickness = (i % BOX_SIZE === 0) ? 3 : 1;
                graphics.lineStyle(thickness, 0x333333);
                graphics.beginPath();
                graphics.moveTo(i * CELL_SIZE, 0);
                graphics.lineTo(i * CELL_SIZE, GRID_SIZE);
                graphics.stroke();
                graphics.moveTo(0, i * CELL_SIZE);
                graphics.lineTo(GRID_SIZE, i * CELL_SIZE);
                graphics.stroke();
            }
            
            // Cria células interativas
            gridCells = [];
            for (let row = 0; row < SIZE; row++) {
                gridCells[row] = [];
                for (let col = 0; col < SIZE; col++) {
                    const x = col * CELL_SIZE;
                    const y = row * CELL_SIZE;
                    const bg = this.add.rectangle(x + CELL_SIZE/2, y + CELL_SIZE/2, CELL_SIZE-2, CELL_SIZE-2, 0xffffff)
                        .setOrigin(0.5)
                        .setInteractive({ useHandCursor: true })
                        .setStrokeStyle(1, 0xaaaaaa);
                    const text = this.add.text(x + CELL_SIZE/2, y + CELL_SIZE/2, "", {
                        fontSize: "32px",
                        fontFamily: "monospace",
                        fontWeight: "bold"
                    }).setOrigin(0.5);
                    
                    bg.on("pointerdown", () => {
                        if (currentGameOver) {
                            updateStatusMessage("Jogo concluído! Comece um novo.");
                            return;
                        }
                        if (fixedCells[row][col]) {
                            selectedRow = row;
                            selectedCol = col;
                            updateStatusMessage(`Célula fixa: ${board[row][col]} (não editável)`);
                            updateAllCellsVisual();
                        } else {
                            selectedRow = row;
                            selectedCol = col;
                            updateStatusMessage(`Célula (${row+1},${col+1}) selecionada. Toque num símbolo.`);
                            updateAllCellsVisual();
                        }
                    });
                    
                    gridCells[row][col] = { bg, text };
                }
            }
            
            // Paleta de símbolos
            const startX = (GRID_SIZE - (SYMBOLS.length * 50)) / 2;
            SYMBOLS.forEach((sym, idx) => {
                const btnX = startX + idx * 50 + 25;
                const btnY = PALETTE_Y;
                const btnBg = this.add.rectangle(btnX, btnY, 46, 46, 0xf0e6d2)
                    .setOrigin(0.5)
                    .setInteractive({ useHandCursor: true })
                    .setStrokeStyle(1, 0xb0a07c);
                const btnText = this.add.text(btnX, btnY, sym, {
                    fontSize: "28px",
                    fontFamily: "monospace",
                    fontWeight: "bold",
                    color: "#2d3e2b"
                }).setOrigin(0.5);
                
                btnBg.on("pointerdown", () => {
                    btnBg.setFillStyle(0xffb347);
                    placeSymbol(sym);
                    this.time.delayedCall(150, () => { if (btnBg) btnBg.setFillStyle(0xf0e6d2); });
                });
            });
            
            // Botão Apagar
            const eraseX = startX + SYMBOLS.length * 50 + 35;
            const eraseBg = this.add.rectangle(eraseX, PALETTE_Y, 46, 46, 0xd9c8aa)
                .setOrigin(0.5).setInteractive({ useHandCursor: true }).setStrokeStyle(1, 0x8b7a5b);
            const eraseText = this.add.text(eraseX, PALETTE_Y, "⌫", { fontSize: "28px", fontFamily: "monospace", color: "#3b2a1f" }).setOrigin(0.5);
            eraseBg.on("pointerdown", () => {
                clearSelected();
                eraseBg.setFillStyle(0xc2aa7a);
                this.time.delayedCall(150, () => eraseBg.setFillStyle(0xd9c8aa));
            });
            
            // Botão NOVO
            const newX = GRID_SIZE/2 - 100;
            const newBg = this.add.rectangle(newX, PALETTE_Y + 55, 100, 42, 0x4a6741).setOrigin(0.5).setInteractive({ useHandCursor: true });
            const newTxt = this.add.text(newX, PALETTE_Y + 55, "NOVO", { fontSize: "20px", fontWeight: "bold", color: "#fff" }).setOrigin(0.5);
            newBg.on("pointerdown", () => {
                generateNewPuzzle();
                selectedRow = -1;
                selectedCol = -1;
                currentGameOver = false;
                updateAllCellsVisual();
                newBg.setFillStyle(0x6b8c5c);
                this.time.delayedCall(150, () => newBg.setFillStyle(0x4a6741));
            });
            
            // Botão VERIFICAR
            const checkX = GRID_SIZE/2 + 100;
            const checkBg = this.add.rectangle(checkX, PALETTE_Y + 55, 110, 42, 0x4a6741).setOrigin(0.5).setInteractive({ useHandCursor: true });
            const checkTxt = this.add.text(checkX, PALETTE_Y + 55, "VERIFICAR", { fontSize: "18px", fontWeight: "bold", color: "#fff" }).setOrigin(0.5);
            checkBg.on("pointerdown", () => {
                checkErrors();
                checkBg.setFillStyle(0x6b8c5c);
                this.time.delayedCall(150, () => checkBg.setFillStyle(0x4a6741));
            });
            
            // Status
            statusText = this.add.text(GRID_SIZE/2, STATUS_Y, "Toque numa célula e num símbolo", {
                fontSize: "16px",
                fontWeight: "bold",
                fontFamily: "monospace",
                backgroundColor: "#f0ede0",
                padding: { x: 10, y: 5 },
                color: "#2c3e2f"
            }).setOrigin(0.5);
            
            generateNewPuzzle();
            updateAllCellsVisual();
        }
    }
    
    const config = {
        type: Phaser.AUTO,
        parent: "game-container",
        width: GRID_SIZE,
        height: GAME_HEIGHT,
        backgroundColor: "#fef7e0",
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
            width: GRID_SIZE,
            height: GAME_HEIGHT
        },
        input: {
            touch: true,
            mouse: true,
            activePointers: 2
        },
        scene: SymbolumGame
    };
    
    window.addEventListener("load", () => {
        new Phaser.Game(config);
    });
</script>
</body>
</html>
