<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tecido Sensitivo | Museu do Amanhã - Interação etérea</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', 'Poppins', sans-serif;
        }
        /* Instruções sutis e minimalistas que desaparecem após interação */
        .instruction {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            color: rgba(180, 220, 255, 0.7);
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            width: fit-content;
            margin: 0 auto;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: opacity 1s ease;
            font-family: monospace;
        }
        .instruction.fade-out {
            opacity: 0;
        }
        @media (max-width: 700px) {
            .instruction { font-size: 10px; bottom: 15px; }
        }
        /* pequeno marcador de toque ativo (estético) */
        .touch-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100,200,255,0.5) 0%, rgba(100,200,255,0) 70%);
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: transform 0.05s;
            will-change: left, top;
        }
    </style>
</head>
<body>
    <div class="instruction" id="instruction">✨ toque ou mova o mouse sobre o tecido | pressione e arraste para esculpir | toque sustentado muda a cor ✨</div>
    <div id="touchRing" class="touch-cursor" style="display: none;"></div>

    <!-- Importação do Three.js e extras -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- INICIALIZAÇÃO ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020c1a);
        scene.fog = new THREE.FogExp2(0x020c1a, 0.006);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.5, 4.2, 6.8);
        camera.lookAt(0, 1.4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);

        // Pós-processamento bloom
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.4, 0.25);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.7;
        bloomPass.radius = 0.6;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // Controles orbitais (para explorar, mas com sensação tátil também)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.enablePan = true;
        controls.panSpeed = 0.8;
        controls.target.set(0, 1.4, 0);

        // --- LUZES CÊNICAS ---
        const ambientLight = new THREE.AmbientLight(0x223344, 0.55);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        mainLight.position.set(4, 7, 3);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x4488cc, 0.5);
        fillLight.position.set(0, -0.5, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x88aaff, 0.6);
        backLight.position.set(-2, 2.2, -3.5);
        scene.add(backLight);
        const movingColorLight = new THREE.PointLight(0x44ccff, 0.75);
        movingColorLight.castShadow = false;
        scene.add(movingColorLight);
        const vortexGlow = new THREE.PointLight(0x00aaff, 0.8);
        vortexGlow.position.set(0, -0.3, 0);
        vortexGlow.distance = 6;
        scene.add(vortexGlow);

        // Elementos de chão e referência
        const gridHelper = new THREE.GridHelper(14, 24, 0x44aaff, 0x336699);
        gridHelper.position.y = -0.08;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        const shadowPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(11, 11),
            new THREE.ShadowMaterial({ opacity: 0.35, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = -0.1;
        shadowPlane.receiveShadow = true;
        scene.add(shadowPlane);
        
        // anel decorativo
        const ringGlow = new THREE.Mesh(
            new THREE.RingGeometry(1.3, 2.5, 32),
            new THREE.MeshStandardMaterial({ color: 0x2a8eff, emissive: 0x004466, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
        );
        ringGlow.rotation.x = -Math.PI / 2;
        ringGlow.position.y = -0.09;
        scene.add(ringGlow);

        // --- TECIDO (GEOMETRIA DE MALHA FINA) ---
        const width = 7.0;
        const depth = 7.0;
        const segments = 160; // malha suave para ondulações orgânicas
        const geometry = new THREE.PlaneGeometry(width, depth, segments, segments);
        const positions = geometry.attributes.position.array;
        // guardar coordenadas originais X e Z (após deitar o plano)
        const origX = [];
        const origZ = [];
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const z = positions[i+1];
            positions[i] = x;
            positions[i+1] = 0;
            positions[i+2] = z;
            origX.push(x);
            origZ.push(z);
        }
        geometry.computeVertexNormals();
        
        // Textura do tecido (fibra dinâmica)
        const canvasTex = document.createElement('canvas');
        canvasTex.width = 512;
        canvasTex.height = 512;
        const ctx = canvasTex.getContext('2d');
        const updateTexture = () => {
            ctx.fillStyle = '#0a2a44';
            ctx.fillRect(0, 0, canvasTex.width, canvasTex.height);
            ctx.strokeStyle = '#88ccff';
            ctx.lineWidth = 1.8;
            for (let i = 0; i < 300; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 7, 0);
                ctx.lineTo(i * 7 + 20, canvasTex.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * 7);
                ctx.lineTo(canvasTex.width, i * 7 + 15);
                ctx.stroke();
            }
            ctx.fillStyle = '#cceeff88';
            for (let p = 0; p < 2000; p++) {
                ctx.fillRect(Math.random() * canvasTex.width, Math.random() * canvasTex.height, 1.2, 1.2);
            }
            const grad = ctx.createLinearGradient(0, 0, canvasTex.width, canvasTex.height);
            grad.addColorStop(0, 'rgba(80, 160, 255, 0.25)');
            grad.addColorStop(1, 'rgba(20, 80, 140, 0.45)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvasTex.width, canvasTex.height);
            fabricTexture.needsUpdate = true;
        };
        const fabricTexture = new THREE.CanvasTexture(canvasTex);
        updateTexture();
        
        const fabricMaterial = new THREE.MeshStandardMaterial({
            map: fabricTexture,
            color: 0x77bbff,
            emissive: 0x115588,
            emissiveIntensity: 0.3,
            roughness: 0.4,
            metalness: 0.65,
            transparent: true,
            opacity: 0.88,
            side: THREE.DoubleSide
        });
        
        const fabricMesh = new THREE.Mesh(geometry, fabricMaterial);
        fabricMesh.castShadow = true;
        fabricMesh.receiveShadow = false;
        scene.add(fabricMesh);
        
        // --- SISTEMA DE PARTÍCULAS (vento ascendente) ---
        const particleCount = 2200;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleData = [];
        for (let i = 0; i < particleCount; i++) {
            const r = Math.random() * 4.2;
            const ang = Math.random() * Math.PI * 2;
            const x = Math.cos(ang) * r;
            const z = Math.sin(ang) * r;
            particlePositions[i*3] = x;
            particlePositions[i*3+1] = Math.random() * 2.5;
            particlePositions[i*3+2] = z;
            particleData.push({ speed: 0.006 + Math.random() * 0.012, radius: r });
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88ccff, size: 0.04, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.6 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // --- INTERATIVIDADE TÁTIL: RASTREAMENTO DE TOQUE/MOUSE ---
        // Estruturas para armazenar interações
        let activePointers = new Map(); // guarda posição x,z e tempo de pressionado
        let drawTrail = []; // para efeito de desenho livre (forma temporária)
        let lastMovePos = { x: 0, z: 0, time: 0 };
        let sustainedColorMap = new Map(); // vértice -> intensidade de cor quente
        let waveInfluence = new Array(geometry.attributes.position.count).fill(0); // perturbação adicional por interação
        
        // Mapeamento vértices para influência rápida
        const vertexCount = geometry.attributes.position.count;
        const origXArr = origX;
        const origZArr = origZ;
        const yBaseExtra = new Array(vertexCount).fill(0); // para elevação por pressão
        
        // Cache de posições para otimização
        const vertexPositions = [];
        for (let i = 0; i < vertexCount; i++) {
            vertexPositions.push({ x: origXArr[i], z: origZArr[i] });
        }
        
        // Função para encontrar vértices dentro do raio de interação
        function applyInfluence(xzX, xzZ, radius, intensity, type = 'push', extraColor = 0) {
            const radiusSq = radius * radius;
            for (let i = 0; i < vertexCount; i++) {
                const dx = vertexPositions[i].x - xzX;
                const dz = vertexPositions[i].z - xzZ;
                const distSq = dx*dx + dz*dz;
                if (distSq < radiusSq) {
                    const factor = (1 - Math.sqrt(distSq)/radius) * intensity;
                    if (type === 'push') {
                        // elevação suave
                        yBaseExtra[i] += factor * 0.12;
                        if (yBaseExtra[i] > 0.55) yBaseExtra[i] = 0.55;
                    } else if (type === 'drag') {
                        yBaseExtra[i] += factor * 0.18;
                        if (yBaseExtra[i] > 0.7) yBaseExtra[i] = 0.7;
                    } else if (type === 'color') {
                        // acumula cor quente
                        let curr = sustainedColorMap.get(i) || 0;
                        curr += factor * 0.08;
                        if (curr > 1.2) curr = 1.2;
                        sustainedColorMap.set(i, curr);
                    }
                }
            }
        }
        
        // Onda de vento baseada em velocidade do mouse/toque
        let lastPointerPos = { x: 0, z: 0 };
        let lastPointerTime = 0;
        
        function handlePointerMove(x, y, pointerId, isMovingFast = false) {
            // converter coordenadas de tela para mundo no plano do tecido (Y aproximado)
            const raycaster = new THREE.Raycaster();
            const mouseVec = new THREE.Vector2((x / renderer.domElement.clientWidth) * 2 - 1, -(y / renderer.domElement.clientHeight) * 2 + 1);
            raycaster.setFromCamera(mouseVec, camera);
            const planeZ = new THREE.Plane(new THREE.Vector3(0, 1, 0), 1.2);
            const intersectPoint = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(planeZ, intersectPoint)) {
                const ix = intersectPoint.x;
                const iz = intersectPoint.z;
                if (Math.abs(ix) < 3.8 && Math.abs(iz) < 3.8) {
                    // aplicar ondulação por proximidade
                    applyInfluence(ix, iz, 1.1, 0.28, 'push');
                    
                    // rastro de vento (velocidade)
                    if (lastPointerPos.x !== 0 || lastPointerPos.z !== 0) {
                        const dx = ix - lastPointerPos.x;
                        const dz = iz - lastPointerPos.z;
                        const speed = Math.sqrt(dx*dx + dz*dz);
                        if (speed > 0.05) {
                            const intensityWind = Math.min(speed * 1.5, 0.55);
                            applyInfluence(ix, iz, 1.4, intensityWind, 'push');
                            // adicional de onda viajante nos vértices opostos
                            for (let i = 0; i < vertexCount; i++) {
                                const vx = vertexPositions[i].x;
                                const vz = vertexPositions[i].z;
                                const proj = (dx * (vx - ix) + dz * (vz - iz)) / (speed + 0.001);
                                if (proj > 0 && proj < 1.2) {
                                    yBaseExtra[i] += intensityWind * 0.09 * (1 - proj/1.2);
                                }
                            }
                        }
                    }
                    lastPointerPos = { x: ix, z: iz };
                    lastPointerTime = performance.now();
                    
                    // Desenho livre: adiciona ao traço para formas temporárias
                    drawTrail.push({ x: ix, z: iz, life: 1.0 });
                    if (drawTrail.length > 35) drawTrail.shift();
                }
            }
        }
        
        // Sustained touch: quando segura por > 0.6s, aplica cor
        let pressTimers = new Map();
        function handlePointerDown(x, y, pointerId) {
            const raycaster = new THREE.Raycaster();
            const mouseVec = new THREE.Vector2((x / renderer.domElement.clientWidth) * 2 - 1, -(y / renderer.domElement.clientHeight) * 2 + 1);
            raycaster.setFromCamera(mouseVec, camera);
            const planeZ = new THREE.Plane(new THREE.Vector3(0, 1, 0), 1.2);
            const intersectPoint = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(planeZ, intersectPoint)) {
                const ix = intersectPoint.x;
                const iz = intersectPoint.z;
                if (Math.abs(ix) < 3.8 && Math.abs(iz) < 3.8) {
                    const timer = setTimeout(() => {
                        // toque sustentado: aplica mudança de cor
                        applyInfluence(ix, iz, 1.3, 0.65, 'color');
                        // efeito visual adicional de pulsação
                        vortexGlow.intensity = 1.2;
                        setTimeout(() => { vortexGlow.intensity = 0.7; }, 300);
                    }, 550);
                    pressTimers.set(pointerId, timer);
                    // também inicia um "drag" de pressão imaginária
                    activePointers.set(pointerId, { x: ix, z: iz, press: true });
                }
            }
        }
        
        function handlePointerUp(pointerId) {
            if (pressTimers.has(pointerId)) {
                clearTimeout(pressTimers.get(pointerId));
                pressTimers.delete(pointerId);
            }
            activePointers.delete(pointerId);
            // dissipação suave dos picos de pressão será natural ao longo do tempo
        }
        
        // Eventos para mouse e toque
        renderer.domElement.addEventListener('mousemove', (e) => {
            handlePointerMove(e.clientX, e.clientY, 'mouse', true);
            if (window.innerWidth > 768) document.getElementById('instruction')?.classList.add('fade-out');
        });
        renderer.domElement.addEventListener('mousedown', (e) => {
            handlePointerDown(e.clientX, e.clientY, 'mouse');
        });
        window.addEventListener('mouseup', () => handlePointerUp('mouse'));
        
        // Toque multi-touch
        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                handlePointerMove(touch.clientX, touch.clientY, touch.identifier, true);
            }
        });
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                handlePointerDown(touch.clientX, touch.clientY, touch.identifier);
            }
            document.getElementById('instruction')?.classList.add('fade-out');
            // mostrar anel tátil
            const ring = document.getElementById('touchRing');
            if (ring) ring.style.display = 'block';
        });
        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                handlePointerUp(e.changedTouches[i].identifier);
            }
            if (e.touches.length === 0) {
                document.getElementById('touchRing')?.setAttribute('style', 'display: none');
            }
        });
        
        // atualizar anel visual de toque
        function updateTouchRing() {
            if (!renderer.domElement) return;
            const ring = document.getElementById('touchRing');
            if (!ring) return;
            // acompanha o primeiro toque ativo
            if (activePointers.size > 0 || pressTimers.size > 0) {
                // pegar posição aproximada do mouse/touch (simplificado)
                ring.style.display = 'block';
                // posição real obtida do ultimo evento? usaremos evento global; simularemos via mousemove
                // melhor usar um tracker separado
            } else {
                ring.style.display = 'none';
            }
        }
        
        // --- ANIMAÇÃO E SIMULAÇÃO DAS ONDAS, FORMAS E CORES ---
        let globalTime = 0;
        const positionAttribute = geometry.attributes.position;
        const yArray = positionAttribute.array;
        
        // Função de base + interações e desenho livre (forma por desenho livre)
        function computeHeightWithInteractions(x, z, t, idx) {
            // Ondas base etéreas
            let y = 1.38;
            y += Math.sin(x * 0.85 + t) * Math.cos(z * 0.7 + t * 0.9) * 0.27;
            y += Math.sin(x * 1.7 - t * 1.2) * 0.18;
            y += Math.cos(z * 1.55 + t * 1.15) * 0.16;
            y += Math.sin((x * 1.3 + z * 0.9) * 1.0 + t * 1.4) * 0.14;
            y += Math.sin(x * 2.4 + t * 2.1) * Math.cos(z * 2.2) * 0.07;
            
            // Respiração ambiente (intensificada se não houver interação recente)
            const breath = Math.sin(t * 0.5) * 0.045;
            y += breath;
            
            // Adiciona influência por interação de pressão/arrasto
            let extra = yBaseExtra[idx] || 0;
            y += extra;
            
            // Forma por desenho livre (interpola a partir do traço do mouse)
            if (drawTrail.length > 2) {
                let shapeInfluence = 0;
                for (let seg of drawTrail) {
                    const dx = x - seg.x;
                    const dz = z - seg.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    if (dist < 0.85) {
                        shapeInfluence += (1 - dist/0.85) * seg.life * 0.24;
                    }
                }
                y += shapeInfluence;
            }
            
            // Limite mínimo para não tocar o chão
            if (y < 0.68) y = 0.68;
            if (y > 2.25) y = 2.25;
            return y;
        }
        
        // Decaimento gradual das interações e cor
        function decayInteractions() {
            for (let i = 0; i < vertexCount; i++) {
                if (yBaseExtra[i] > 0) yBaseExtra[i] *= 0.985;
                if (yBaseExtra[i] < 0.01) yBaseExtra[i] = 0;
                // Decaimento da cor sustentada
                if (sustainedColorMap.has(i)) {
                    let val = sustainedColorMap.get(i);
                    val *= 0.992;
                    if (val <= 0.02) sustainedColorMap.delete(i);
                    else sustainedColorMap.set(i, val);
                }
            }
            // Decaimento do traço de desenho livre
            for (let i = 0; i < drawTrail.length; i++) {
                drawTrail[i].life *= 0.97;
            }
            drawTrail = drawTrail.filter(p => p.life > 0.02);
            // Reset da posição do mouse se inativo
            if (performance.now() - lastPointerTime > 800) {
                lastPointerPos = { x: 0, z: 0 };
            }
        }
        
        // Atualizar cores do material baseado em mapa de calor
        function updateFabricColor() {
            if (sustainedColorMap.size === 0) {
                fabricMaterial.color.setHex(0x77bbff);
                fabricMaterial.emissiveIntensity = 0.28;
                return;
            }
            // média da intensidade de cor para tom quente
            let sum = 0;
            for (let val of sustainedColorMap.values()) sum += val;
            let avg = sum / sustainedColorMap.size;
            let r = 0.4 + avg * 0.6;
            let g = 0.4 + avg * 0.3;
            let b = 0.7 - avg * 0.4;
            fabricMaterial.color.setRGB(r, g, b);
            fabricMaterial.emissiveIntensity = 0.3 + avg * 0.4;
        }
        
        // --- SISTEMA DE PARTÍCULAS DE VENTO E LUZ ---
        let pTime = 0;
        function updateParticles() {
            const posAttr = particleGeo.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                let y = posAttr[i*3+1];
                y += particleData[i].speed;
                if (y > 2.9) {
                    y = -0.3;
                    const newR = Math.random() * 4.2;
                    const newAng = Math.random() * Math.PI * 2;
                    posAttr[i*3] = Math.cos(newAng) * newR;
                    posAttr[i*3+2] = Math.sin(newAng) * newR;
                    particleData[i].speed = 0.007 + Math.random() * 0.014;
                }
                posAttr[i*3+1] = y;
                // pequeno movimento espiral
                posAttr[i*3] += (Math.sin(pTime + i) * 0.001);
                posAttr[i*3+2] += (Math.cos(pTime * 0.9 + i) * 0.001);
            }
            particleGeo.attributes.position.needsUpdate = true;
            pTime += 0.02;
        }
        
        // LUZ DINÂMICA
        let lightTime = 0;
        
        // --- LOOP PRINCIPAL ---
        function animate() {
            globalTime += 0.016;
            lightTime += 0.012;
            
            // Decaimento de interações
            decayInteractions();
            
            // Atualiza geometria do tecido
            for (let i = 0; i < vertexCount; i++) {
                const x = origXArr[i];
                const z = origZArr[i];
                const newY = computeHeightWithInteractions(x, z, globalTime, i);
                yArray[i*3+1] = newY;
            }
            positionAttribute.needsUpdate = true;
            geometry.computeVertexNormals();
            
            // Atualizar cor baseada em toque sustentado
            updateFabricColor();
            
            // Animar textura do tecido
            fabricTexture.offset.x += 0.0005;
            fabricTexture.offset.y += 0.0003;
            
            // Movimento da luz de realce
            movingColorLight.position.x = Math.sin(lightTime) * 3.2;
            movingColorLight.position.z = Math.cos(lightTime * 1.2) * 3.0;
            movingColorLight.position.y = 1.5 + Math.sin(lightTime * 1.5) * 0.7;
            vortexGlow.intensity = 0.65 + Math.sin(globalTime * 2.2) * 0.25;
            
            // Partículas ascendentes
            updateParticles();
            
            // Atualizar controles e anel tátil
            controls.update();
            effectComposer.render();
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // fade da instrução após alguns segundos
        setTimeout(() => {
            const instr = document.getElementById('instruction');
            if (instr) instr.classList.add('fade-out');
        }, 5000);
        
        // Feedback sutil do toque: movendo anel visual
        document.addEventListener('mousemove', (e) => {
            const ring = document.getElementById('touchRing');
            if (ring && ring.style.display === 'block') {
                ring.style.left = e.clientX + 'px';
                ring.style.top = e.clientY + 'px';
            }
        });
        document.addEventListener('touchmove', (e) => {
            const ring = document.getElementById('touchRing');
            if (ring && ring.style.display === 'block' && e.touches.length) {
                ring.style.left = e.touches[0].clientX + 'px';
                ring.style.top = e.touches[0].clientY + 'px';
            }
        });
        
        console.log('Tecido Sensitivo Inicializado — Interaja com toque/mouse e veja a matéria viva');
    </script>
</body>
</html>
