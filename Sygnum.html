<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fluxos | Quatro Oceanos – Museu do Amanhã</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', 'Poppins', sans-serif;
            background-color: #000000;
        }
        .info-text {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            color: rgba(150, 200, 255, 0.5);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 2px;
            font-family: monospace;
        }
        .touch-ripple {
            position: fixed;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100,200,255,0.5) 0%, rgba(100,200,255,0) 70%);
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="info-text">QUATRO OCEANOS | FOUR OCEANS</div>
    <div id="touchRipple" class="touch-ripple" style="display: none;"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CENA MINIMALISTA E DRAMÁTICA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.008);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5.5);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, precision: 'highp' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.4;
        document.body.appendChild(renderer.domElement);

        // Controles orbitais suaves
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.6;
        controls.zoomSpeed = 0.8;
        controls.enablePan = false;
        controls.target.set(0, 2, 0);

        // --- ILUMINAÇÃO DRAMÁTICA E MINIMALISTA ---
        const ambientLight = new THREE.AmbientLight(0x0a1a2a, 0.3);
        scene.add(ambientLight);
        
        // Luz principal frontal
        const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
        mainLight.position.set(2, 4, 3);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);
        
        // Luz de preenchimento azulada
        const fillLight = new THREE.PointLight(0x4488ff, 0.5);
        fillLight.position.set(-2, 2, 2);
        scene.add(fillLight);
        
        // Luz de fundo
        const backLight = new THREE.PointLight(0x2266ff, 0.4);
        backLight.position.set(0, 3, -3);
        scene.add(backLight);

        // --- CRIAÇÃO DOS DOIS TECIDOS (BRANCO E AZUL) ---
        function createFabric(color, initialY, xOffset) {
            // Geometria: fita longa e retangular
            const width = 1.2;
            const height = 5.5;
            const widthSegments = 12;
            const heightSegments = 120;
            
            const geometry = new THREE.PlaneGeometry(width, height, widthSegments, heightSegments);
            
            // Armazenar posições originais
            const positions = geometry.attributes.position.array;
            const origX = [];
            const origY = [];
            const origZ = [];
            
            for (let i = 0; i < positions.length; i += 3) {
                origX.push(positions[i]);
                origY.push(positions[i+1]);
                origZ.push(positions[i+2]);
            }
            
            // Material translúcido
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.4,
                roughness: 0.3,
                metalness: 0.1,
                transparent: true,
                opacity: 0.85,
                side: THREE.DoubleSide,
                wireframe: false
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.x = xOffset;
            mesh.position.y = initialY;
            mesh.castShadow = true;
            mesh.receiveShadow = false;
            
            return {
                mesh,
                geometry,
                positions,
                origX,
                origY,
                origZ,
                material,
                vertexCount: geometry.attributes.position.count
            };
        }

        const fabricWhite = createFabric(0xffffff, 2.5, -0.6);
        const fabricBlue = createFabric(0x0088ff, 2.5, 0.6);
        
        scene.add(fabricWhite.mesh);
        scene.add(fabricBlue.mesh);

        // --- ANIMAÇÃO DOS TECIDOS ---
        let time = 0;
        
        function animateFabric(fabric, timeOffset, spiralIntensity) {
            const posAttr = fabric.geometry.attributes.position;
            const pos = posAttr.array;
            
            for (let i = 0; i < fabric.vertexCount; i++) {
                const x = fabric.origX[i];
                const y = fabric.origY[i];
                const z = fabric.origZ[i];
                
                // Movimento vertical principal (subida/descida)
                const verticalWave = Math.sin(time * 0.8 + timeOffset) * 1.2;
                
                // Movimento em espiral (vórtice)
                const spiralAngle = (y / 5.5) * Math.PI * 4 + time * 1.2 + timeOffset;
                const spiralRadius = Math.sin(time * 0.6 + timeOffset) * 0.35 + 0.15;
                const spiralX = Math.cos(spiralAngle) * spiralRadius;
                const spiralZ = Math.sin(spiralAngle) * spiralRadius;
                
                // Ondulações ao longo do comprimento
                const waveFreq = 3;
                const waveAmplitude = Math.sin(time * 1.1 + timeOffset) * 0.12;
                const wave = Math.sin((y / 5.5) * waveFreq * Math.PI + time * 1.5) * waveAmplitude;
                
                // Aplicar transformações
                pos[i*3] = x + spiralX + wave;
                pos[i*3+1] = y + verticalWave;
                pos[i*3+2] = z + spiralZ;
            }
            
            posAttr.needsUpdate = true;
            fabric.geometry.computeVertexNormals();
        }

        // --- LOOP DE ANIMAÇÃO ---
        function animate() {
            time += 0.016;
            
            // Animar os dois tecidos com defasagem
            animateFabric(fabricWhite, 0, 1.0);
            animateFabric(fabricBlue, Math.PI, 0.9);
            
            // Fazer as cores pulsarem levemente
            const pulse = Math.sin(time * 0.5) * 0.15 + 0.85;
            fabricWhite.material.opacity = pulse;
            fabricBlue.material.opacity = pulse;
            
            // Fazer as luzes dançarem
            mainLight.intensity = 0.7 + Math.sin(time * 0.7) * 0.15;
            fillLight.intensity = 0.4 + Math.sin(time * 0.6 + 1) * 0.15;
            
            controls.update();
            renderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        animate();

        // --- RESPONSIVIDADE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('✨ Fluxos | Quatro Oceanos - Simulação fiel da instalação do Museu do Amanhã');
    </script>
</body>
</html>
