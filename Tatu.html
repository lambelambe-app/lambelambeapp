<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Caranguejo Uçá - Chuva de Frutas Tropicais</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
        }
        body {
            background: linear-gradient(145deg, #0a2f3a, #064e3b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        canvas {
            background-color: #6ab0de;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            cursor: pointer;
            display: block;
        }
        .touch-controls {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 60px;
        }
        .ctrl-btn {
            background: #f4a261;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 40px;
            box-shadow: 0 4px 0 #8b3c1c;
            transition: 0.05s linear;
            cursor: pointer;
            color: #2d3e2b;
        }
        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #8b3c1c;
        }
        .jump-btn {
            background: #6ab04c;
            box-shadow: 0 4px 0 #2c5a2e;
        }
        .info {
            background: #fef5e0cc;
            border-radius: 40px;
            padding: 6px 18px;
            font-weight: bold;
            text-align: center;
        }
        @media (max-width: 700px) {
            .ctrl-btn { font-size: 1.4rem; padding: 6px 16px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="900" height="650" style="width:100%; height:auto; max-width:900px; aspect-ratio:900/650"></canvas>
    <div class="touch-controls">
        <button class="ctrl-btn" id="btnLeft">◀ ESQ</button>
        <button class="ctrl-btn jump-btn" id="btnJump">PULAR ▲</button>
        <button class="ctrl-btn" id="btnRight">DIR ▶</button>
    </div>
    <div class="info">
        🦀 Caranguejo gigante | Frutas: Manga, Goiaba, Acerola (+12) | Pimenta Malagueta (-10) | Velocidade aumenta com o tempo!
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const W = 900, H = 650;
        canvas.width = W;
        canvas.height = H;
        
        // Chão
        const GROUND_Y = H - 70;
        
        // Caranguejo (tamanho triplo)
        const CRAB_WIDTH = 210;
        const CRAB_HEIGHT = 210;
        let crabX = W/2 - CRAB_WIDTH/2;
        let crabY = GROUND_Y - CRAB_HEIGHT + 8;  // ajuste fino para tocar a areia
        let crabVelX = 0;
        let crabVelY = 0;
        let isOnGround = true;
        let facingRight = true;
        const GRAVITY = 0.8;
        const JUMP_POWER = -12;
        const MOVE_SPEED = 6.5;
        
        // Itens
        let items = [];
        const ITEM_SIZE = 52;
        let spawnCounter = 0;
        let spawnDelay = 28;  // inicialmente mais espaçado
        
        // Frutas específicas (sem texto dentro, apenas emoji)
        const fruitList = [
            { name: 'Manga', emoji: '🥭', color: '#F4A300', value: 12 },
            { name: 'Goiaba', emoji: '🟢', color: '#6B8E23', value: 12 },
            { name: 'Acerola', emoji: '🍒', color: '#E53935', value: 12 }
        ];
        const pepper = { name: 'Pimenta Malagueta', emoji: '🌶️', color: '#B71C1C', value: -10 };
        
        // Pontuação
        let score = 0;
        let gameOver = false;
        
        // Controles
        let leftPressed = false, rightPressed = false, jumpRequested = false;
        
        // Efeitos
        let dustParticles = [];
        let floatingTexts = [];
        
        // Nuvens móveis
        let clouds = [
            { x: 100, y: 60, width: 120, height: 60, speed: 0.3 },
            { x: 400, y: 90, width: 150, height: 70, speed: 0.5 },
            { x: 700, y: 40, width: 100, height: 50, speed: 0.4 },
            { x: 200, y: 140, width: 130, height: 55, speed: 0.2 },
            { x: 600, y: 120, width: 110, height: 55, speed: 0.6 }
        ];
        
        // Velocidade da chuva (queda dos itens) - começa baixo e aumenta
        let currentFallSpeed = 2.2;
        const MAX_FALL_SPEED = 6.2;
        let speedIncreaseCounter = 0;
        const SPEED_INCREASE_INTERVAL = 25; // a cada 25 itens coletados, aumenta velocidade
        
        // Carregar imagem do caranguejo
        const crabImg = new Image();
        crabImg.src = 'https://raw.githubusercontent.com/lambelambe-app/lambelambeapp/refs/heads/main/caranguejo.png';
        let crabLoaded = false;
        crabImg.onload = () => { crabLoaded = true; };
        
        function drawCloud(x, y, w, h) {
            ctx.fillStyle = 'rgba(255,255,240,0.9)';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(x + w*0.2, y + h*0.5, w*0.3, h*0.7, 0, 0, Math.PI*2);
            ctx.ellipse(x + w*0.5, y + h*0.3, w*0.4, h*0.6, 0, 0, Math.PI*2);
            ctx.ellipse(x + w*0.8, y + h*0.5, w*0.3, h*0.7, 0, 0, Math.PI*2);
            ctx.fill();
        }
        
        function spawnItem() {
            if (gameOver) return;
            const isFruit = Math.random() < 0.7;
            let itemData;
            if (isFruit) {
                const fruit = fruitList[Math.floor(Math.random() * fruitList.length)];
                itemData = {
                    name: fruit.name,
                    emoji: fruit.emoji,
                    bgColor: fruit.color,
                    value: fruit.value,
                    type: 'fruit'
                };
            } else {
                itemData = {
                    name: pepper.name,
                    emoji: pepper.emoji,
                    bgColor: pepper.color,
                    value: pepper.value,
                    type: 'pepper'
                };
            }
            
            items.push({
                x: Math.random() * (W - ITEM_SIZE - 20) + 10,
                y: -ITEM_SIZE,
                width: ITEM_SIZE,
                height: ITEM_SIZE,
                ...itemData
            });
        }
        
        function addFloatingText(x, y, text, color) {
            floatingTexts.push({
                x: x, y: y, text: text, color: color, life: 60
            });
        }
        
        function addDust(x, y) {
            if (Math.abs(crabVelX) > 1 && isOnGround) {
                dustParticles.push({
                    x: x + (facingRight ? -10 : CRAB_WIDTH+10),
                    y: y + CRAB_HEIGHT - 15,
                    life: 15,
                    size: 5
                });
            }
        }
        
        function update() {
            if (gameOver) return;
            
            // Movimento horizontal
            if (leftPressed) {
                crabVelX = -MOVE_SPEED;
                if (isOnGround) addDust(crabX, crabY);
                facingRight = false;
            } else if (rightPressed) {
                crabVelX = MOVE_SPEED;
                if (isOnGround) addDust(crabX, crabY);
                facingRight = true;
            } else {
                crabVelX *= 0.92;
            }
            
            crabX += crabVelX;
            if (crabX < 5) crabX = 5;
            if (crabX + CRAB_WIDTH > W - 5) crabX = W - CRAB_WIDTH - 5;
            
            // Pulo
            if (jumpRequested && isOnGround) {
                crabVelY = JUMP_POWER;
                isOnGround = false;
                jumpRequested = false;
                for(let i=0;i<5;i++) addDust(crabX, crabY);
            }
            crabVelY += GRAVITY;
            crabY += crabVelY;
            if (crabY + CRAB_HEIGHT >= GROUND_Y) {
                crabY = GROUND_Y - CRAB_HEIGHT;
                crabVelY = 0;
                isOnGround = true;
            } else {
                isOnGround = false;
            }
            
            // Atualizar itens com velocidade variável (chuva que acelera)
            for (let i=0; i<items.length; i++) {
                items[i].y += currentFallSpeed;
            }
            
            // Colisão
            const crabRect = {
                x: crabX + 30, y: crabY + 30,
                w: CRAB_WIDTH - 60, h: CRAB_HEIGHT - 50
            };
            for (let i=items.length-1; i>=0; i--) {
                const item = items[i];
                const itemRect = {
                    x: item.x, y: item.y,
                    w: ITEM_SIZE, h: ITEM_SIZE
                };
                if (crabRect.x < itemRect.x + itemRect.w &&
                    crabRect.x + crabRect.w > itemRect.x &&
                    crabRect.y < itemRect.y + itemRect.h &&
                    crabRect.y + crabRect.h > itemRect.y) {
                    
                    score += item.value;
                    const textColor = item.value > 0 ? '#C9FF9B' : '#FFB7A0';
                    addFloatingText(item.x + ITEM_SIZE/2, item.y, item.name, textColor);
                    
                    // Aumenta a velocidade da chuva a cada 25 itens coletados (acumula)
                    if (item.value > 0) {
                        speedIncreaseCounter++;
                        if (speedIncreaseCounter >= SPEED_INCREASE_INTERVAL && currentFallSpeed < MAX_FALL_SPEED) {
                            currentFallSpeed = Math.min(MAX_FALL_SPEED, currentFallSpeed + 0.35);
                            speedIncreaseCounter = 0;
                        }
                    }
                    
                    items.splice(i,1);
                    if (score <= -45) gameOver = true;
                }
            }
            
            // Remover itens fora da tela
            items = items.filter(item => item.y < H + 100);
            
            // Spawn em chuva (delay também pode diminuir gradualmente, mas mantemos fixo para não ficar louco)
            spawnCounter++;
            if (spawnCounter >= spawnDelay) {
                spawnCounter = 0;
                spawnItem();
                // spawnDelay fica entre 22 e 35 frames
                spawnDelay = Math.floor(Math.random() * 18) + 22;
            }
            
            // Poeira
            for (let i=0; i<dustParticles.length; i++) {
                dustParticles[i].life--;
                dustParticles[i].x += (Math.random() - 0.5) * 1.5;
                dustParticles[i].y += 1;
            }
            dustParticles = dustParticles.filter(p => p.life > 0);
            
            // Textos flutuantes
            for (let i=0; i<floatingTexts.length; i++) {
                floatingTexts[i].life--;
                floatingTexts[i].y -= 1.5;
            }
            floatingTexts = floatingTexts.filter(t => t.life > 0);
            
            // Nuvens
            for (let cloud of clouds) {
                cloud.x += cloud.speed;
                if (cloud.x > W + 100) cloud.x = -150;
                if (cloud.x < -150) cloud.x = W + 100;
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, W, H);
            
            // Céu
            ctx.fillStyle = '#6ab0de';
            ctx.fillRect(0, 0, W, H);
            
            // Nuvens
            for (let cloud of clouds) {
                drawCloud(cloud.x, cloud.y, cloud.width, cloud.height);
            }
            
            // Chão (areia)
            ctx.fillStyle = '#c2a15b';
            ctx.fillRect(0, GROUND_Y + 5, W, H - GROUND_Y + 5);
            ctx.fillStyle = '#e0b87a';
            for(let i=0;i<20;i++) ctx.fillRect(i*50, GROUND_Y-3, 25, 6);
            // Conchas
            ctx.fillStyle = '#D2B48C';
            for(let i=0;i<12;i++) {
                ctx.beginPath();
                ctx.ellipse(40 + i*70, GROUND_Y+15, 6, 4, 0, 0, Math.PI*2);
                ctx.fill();
            }
            
            // Itens (apenas emoji, sem texto)
            for (let item of items) {
                const x = item.x, y = item.y, size = ITEM_SIZE;
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(x + size/2, y + size/2, size/2 - 2, 0, Math.PI*2);
                ctx.fillStyle = item.bgColor;
                ctx.fill();
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.font = `${size - 12}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText(item.emoji, x + size/2, y + size/2);
            }
            
            // Caranguejo com flip
            if (crabLoaded) {
                ctx.save();
                if (!facingRight) {
                    ctx.translate(crabX + CRAB_WIDTH/2, crabY + CRAB_HEIGHT/2);
                    ctx.scale(-1, 1);
                    ctx.drawImage(crabImg, -CRAB_WIDTH/2, -CRAB_HEIGHT/2, CRAB_WIDTH, CRAB_HEIGHT);
                    ctx.restore();
                } else {
                    ctx.drawImage(crabImg, crabX, crabY, CRAB_WIDTH, CRAB_HEIGHT);
                }
            } else {
                ctx.fillStyle = '#d9534f';
                ctx.fillRect(crabX, crabY, CRAB_WIDTH, CRAB_HEIGHT);
                ctx.fillStyle = '#fff';
                ctx.font = '50px sans-serif';
                ctx.fillText('🦀', crabX + CRAB_WIDTH/2 - 30, crabY + CRAB_HEIGHT/2 + 15);
            }
            
            // Poeira
            for (let dust of dustParticles) {
                ctx.fillStyle = `rgba(160, 120, 60, ${dust.life/15})`;
                ctx.beginPath();
                ctx.arc(dust.x, dust.y, dust.size * (dust.life/15), 0, Math.PI*2);
                ctx.fill();
            }
            
            // Textos flutuantes (nome da fruta/pimenta ao coletar)
            for (let txt of floatingTexts) {
                ctx.font = 'bold 20px "Segoe UI"';
                ctx.fillStyle = txt.color;
                ctx.shadowBlur = 3;
                ctx.fillText(txt.text, txt.x - 30, txt.y - 20);
            }
            ctx.shadowBlur = 0;
            
            // Pontuação em PRETO (conforme solicitado)
            ctx.font = 'bold 34px "Fredoka One", cursive';
            ctx.fillStyle = '#000000';
            ctx.fillText(`🐚 ${score}`, 20, 55);
            
            // Aviso de perigo
            if (score <= -20 && !gameOver) {
                ctx.font = 'bold 22px monospace';
                ctx.fillStyle = '#FF0000';
                ctx.fillText('⚠️ CUIDADO! MUITAS PIMENTAS! ⚠️', W/2-180, 80);
            }
            
            // Game Over
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, W, H);
                ctx.font = 'bold 48px "Fredoka One", cursive';
                ctx.fillStyle = '#F4C542';
                ctx.fillText('GAME OVER', W/2-150, H/2-60);
                ctx.font = '32px monospace';
                ctx.fillStyle = '#FFDE9E';
                ctx.fillText(`Pontuação final: ${score}`, W/2-150, H/2+20);
                ctx.font = '26px sans-serif';
                ctx.fillStyle = '#fff';
                ctx.fillText('Clique no botão "RECOMEÇAR" abaixo', W/2-200, H/2+100);
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function restartGame() {
            gameOver = false;
            score = 0;
            items = [];
            crabX = W/2 - CRAB_WIDTH/2;
            crabY = GROUND_Y - CRAB_HEIGHT + 8;
            crabVelX = 0;
            crabVelY = 0;
            isOnGround = true;
            spawnCounter = 0;
            leftPressed = false;
            rightPressed = false;
            jumpRequested = false;
            floatingTexts = [];
            dustParticles = [];
            currentFallSpeed = 2.2;
            speedIncreaseCounter = 0;
            clouds = [
                { x: 100, y: 60, width: 120, height: 60, speed: 0.3 },
                { x: 400, y: 90, width: 150, height: 70, speed: 0.5 },
                { x: 700, y: 40, width: 100, height: 50, speed: 0.4 },
                { x: 200, y: 140, width: 130, height: 55, speed: 0.2 },
                { x: 600, y: 120, width: 110, height: 55, speed: 0.6 }
            ];
        }
        
        // Controles
        window.addEventListener('keydown', (e) => {
            if (gameOver) return;
            if (e.key === 'ArrowLeft') { leftPressed = true; e.preventDefault(); }
            if (e.key === 'ArrowRight') { rightPressed = true; e.preventDefault(); }
            if (e.key === 'ArrowUp' || e.key === ' ') { jumpRequested = true; e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') leftPressed = false;
            if (e.key === 'ArrowRight') rightPressed = false;
        });
        
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnJump = document.getElementById('btnJump');
        
        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); leftPressed = true; });
        btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); leftPressed = false; });
        btnLeft.addEventListener('mousedown', () => { leftPressed = true; });
        btnLeft.addEventListener('mouseup', () => { leftPressed = false; });
        
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); rightPressed = true; });
        btnRight.addEventListener('touchend', (e) => { e.preventDefault(); rightPressed = false; });
        btnRight.addEventListener('mousedown', () => { rightPressed = true; });
        btnRight.addEventListener('mouseup', () => { rightPressed = false; });
        
        btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); if(!gameOver) jumpRequested = true; });
        btnJump.addEventListener('mousedown', () => { if(!gameOver) jumpRequested = true; });
        
        const restartBtn = document.createElement('button');
        restartBtn.textContent = '🔄 RECOMEÇAR JOGO 🔄';
        restartBtn.style.cssText = 'background:#f4a261; border:none; font-size:1.2rem; padding:8px 24px; border-radius:40px; margin-top:10px; cursor:pointer; font-weight:bold;';
        restartBtn.onclick = () => restartGame();
        document.querySelector('.game-wrapper').appendChild(restartBtn);
        
        gameLoop();
        for(let i=0;i<4;i++) spawnItem();
    })();
</script>
</body>
</html>
