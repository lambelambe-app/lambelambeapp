<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚽ CREST EVOLUTION | História dos Escudos de Futebol</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a1a1f 0%, #1a2a2f 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 1.5rem;
            color: #f0f0f0;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #8aa0a8;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* grid de clubes */
        .clubs-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .club-card {
            background: rgba(30, 45, 50, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 1.5rem;
            padding: 0.7rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .club-card:hover {
            transform: translateY(-3px);
            background: rgba(50, 70, 75, 0.9);
            border-color: #FFD700;
        }

        .club-card.active {
            background: linear-gradient(135deg, #2c5f2d, #1a3a2a);
            border-color: #FFD700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .club-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: contain;
            background: white;
            padding: 4px;
        }

        .club-name {
            font-weight: 600;
            font-size: 1rem;
        }

        /* painel principal do escudo */
        .crest-panel {
            background: rgba(20, 35, 40, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,215,0,0.15);
        }

        .crest-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .crest-image {
            width: 100%;
            max-width: 320px;
            margin-bottom: 1rem;
        }

        .crest-image img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
            border-radius: 2rem;
            background: rgba(255,255,255,0.05);
            padding: 1rem;
        }

        .version-badge {
            background: #FFD70020;
            backdrop-filter: blur(4px);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #FFD700;
            margin-bottom: 0.5rem;
        }

        .year {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        /* navegação */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .nav-btn {
            background: #FFD700;
            border: none;
            color: #1a2a2f;
            font-weight: bold;
            padding: 0.7rem 1.8rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .nav-btn:hover {
            background: #FFA500;
            transform: scale(1.02);
        }

        /* timeline */
        .timeline {
            margin-top: 1.5rem;
        }

        .timeline-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #FFD700;
            margin-bottom: 1rem;
            text-align: center;
        }

        .timeline-strip {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
        }

        .timeline-node {
            background: rgba(40, 60, 65, 0.8);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .timeline-node.active-node {
            background: #FFD700;
            color: #1a2a2f;
            font-weight: bold;
            border-color: #fff;
        }

        .timeline-node:hover {
            background: #FFD70080;
            color: #1a2a2f;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #6a8a95;
        }

        @media (max-width: 680px) {
            .club-name {
                display: none;
            }
            .club-card {
                padding: 0.5rem;
            }
            .year {
                font-size: 1.3rem;
            }
            .crest-panel {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">

        <h1>⚡ CREST EVOLUTION</h1>
        <p>Linha do tempo histórica dos escudos de futebol</p>
    </div>

    <div class="clubs-grid" id="clubsGrid"></div>

    <div class="crest-panel">
        <div class="crest-display" id="crestDisplay"></div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn">◀ ANTERIOR</button>
            <button class="nav-btn" id="nextBtn">PRÓXIMO ▶</button>
        </div>
    </div>

    <div class="timeline">
        <div class="timeline-title">📅 EVOLUÇÃO HISTÓRICA</div>
        <div class="timeline-strip" id="timelineStrip"></div>
    </div>
    <footer>Acervo histórico de escudos · Fontes: Wikimedia, Clubes Oficiais, Museu do Futebol</footer>
</div>

    // Estado da aplicação
    let currentClub = "flamengo";
    let currentIndex = 0;

    function getCurrentClubData() {
        return clubsData[currentClub];
    }

    function getCurrentVersion() {
        return getCurrentClubData().versions[currentIndex];
    }

    function getTotalVersions() {
        return getCurrentClubData().versions.length;
    }

    // Helper para carregar imagem com fallback
    function loadImageWithFallback(imgElement, primaryUrl, fallbackUrl) {
        imgElement.onerror = function() {
            if (imgElement.src !== fallbackUrl) {
                imgElement.src = fallbackUrl;
            } else {
                imgElement.src = "https://placehold.co/400x400/2c5f2d/FFD700?text=" + encodeURIComponent(getCurrentClubData().short);
            }
        };
        imgElement.src = primaryUrl;
    }

    function renderCrest() {
        const version = getCurrentVersion();
        const club = getCurrentClubData();
        const html = `
            <div class="crest-image">
                <img id="mainCrestImg" alt="${club.name} - ${version.title}">
            </div>
            <div class="version-badge">${version.title}</div>
            <div class="year">${version.year}</div>
        `;
        document.getElementById("crestDisplay").innerHTML = html;
        
        const img = document.getElementById("mainCrestImg");
        if (img) {
            loadImageWithFallback(img, version.imgUrl, version.fallback);
        }
    }

    function renderTimeline() {
        const versions = getCurrentClubData().versions;
        const container = document.getElementById("timelineStrip");
        let html = "";
        versions.forEach((ver, idx) => {
            const activeClass = idx === currentIndex ? "active-node" : "";
            html += `<div class="timeline-node ${activeClass}" data-index="${idx}">${ver.year}</div>`;
        });
        container.innerHTML = html;
        
        document.querySelectorAll(".timeline-node").forEach(node => {
            node.addEventListener("click", (e) => {
                const idx = parseInt(node.dataset.index, 10);
                if (!isNaN(idx) && idx !== currentIndex) {
                    currentIndex = idx;
                    renderAll();
                }
            });
        });
    }

    function renderClubsGrid() {
        const grid = document.getElementById("clubsGrid");
        const clubsList = [
            { key: "flamengo", name: "Flamengo", avatar: clubsData.flamengo.avatar },
            { key: "manchester", name: "Man United", avatar: clubsData.manchester.avatar },
            { key: "realmadrid", name: "Real Madrid", avatar: clubsData.realmadrid.avatar },
            { key: "juventus", name: "Juventus", avatar: clubsData.juventus.avatar },
            { key: "bayern", name: "Bayern", avatar: clubsData.bayern.avatar },
            { key: "barcelona", name: "Barcelona", avatar: clubsData.barcelona.avatar }
        ];
        
        let html = "";
        clubsList.forEach(club => {
            const activeClass = currentClub === club.key ? "active" : "";
            html += `
                <div class="club-card ${activeClass}" data-club="${club.key}">
                    <img class="club-avatar" src="${club.avatar}" alt="${club.name}" onerror="this.src='https://placehold.co/40x40/333/FFD700?text=${club.name.charAt(0)}'">
                    <span class="club-name">${club.name}</span>
                </div>
            `;
        });
        grid.innerHTML = html;
        
        document.querySelectorAll(".club-card").forEach(card => {
            card.addEventListener("click", () => {
                const clubKey = card.dataset.club;
                if (clubKey !== currentClub) {
                    currentClub = clubKey;
                    currentIndex = 0;
                    renderAll();
                }
            });
        });
    }

    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            renderAll();
        }
    }

    function goNext() {
        if (currentIndex < getTotalVersions() - 1) {
            currentIndex++;
            renderAll();
        }
    }

    function renderAll() {
        renderCrest();
        renderTimeline();
        renderClubsGrid();
    }

    document.getElementById("prevBtn").addEventListener("click", goPrev);
    document.getElementById("nextBtn").addEventListener("click", goNext);
    
    renderAll();
</script>
</body>
</html>
